<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0B0B0C;--card:#161617;--border:#2A2A2C;--gold:#F3C774;--green:#24C464;--muted:#9CA3AF}
*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif}
body{background:var(--bg);color:#fff;padding:22px}
.avatar{width:96px;height:96px;margin:20px auto 14px;border-radius:50%;border:3px solid var(--gold);display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,var(--gold)22%,transparent 22%);box-shadow:0 0 32px rgba(243,199,116,.35)}
.avatar span{font-size:44px;font-weight:700;color:var(--gold)}
.name{text-align:center;font-size:26px;font-weight:600}
.bal{display:block;width:max-content;margin:12px auto;padding:6px 18px;border:1px solid var(--green);border-radius:999px;color:var(--green);font-weight:600;font-size:15px}
.card{background:var(--card);border:1px solid var(--border);border-radius:24px;overflow:hidden;margin:26px 0}
.row{display:flex;align-items:center;justify-content:space-between;padding:20px 18px;border-top:1px solid var(--border)}
.row:first-child{border:0}
.l{display:flex;align-items:center}
.icon{width:44px;height:44px;border-radius:12px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin-right:16px;font-size:20px}
.txt{font-size:18px}
.val{color:var(--muted);font-size:16px;margin-right:10px}
.sec{color:var(--muted);letter-spacing:1px;font-size:13px;margin:24px 0 12px}
.wallets{display:flex;gap:12px}
.wall{flex:1;border:1px solid var(--border);border-radius:16px;padding:14px;display:flex;align-items:center;gap:12px}
.dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.mm{background:#E88C2B}.bn{background:#F2C029}
nav{position:fixed;left:0;right:0;bottom:0;background:#0F0F10;border-top:1px solid #1F1F22;display:flex;justify-content:space-around;padding:12px 0}
nav div{font-size:11px;text-align:center;color:#8B8B8F}
nav div.active{color:var(--gold)}
nav div.active::before{content:"";display:block;height:3px;background:var(--gold);margin-bottom:6px;border-radius:2px}
.sp{height:96px}
</style>
</head>
<body>
<div class="avatar"><span>R</span></div>
<div class="name">Akash Sharma</div>
<div class="bal">≈ ₹84 INR</div>
<div class="card">
<div class="row"><div class="l"><div class="icon">👤</div><div class="txt">My Profile</div></div>›</div>
<div class="row"><div class="l"><div class="icon">🛡</div><div class="txt">Security</div></div>›</div>
<div class="row"><div class="l"><div class="icon">🔔</div><div class="txt">Notifications</div></div>›</div>
<div class="row"><div class="l"><div class="icon">🌐</div><div class="txt">Language</div></div><div><span class="val">English</span>›</div></div>
<div class="row"><div class="l"><div class="icon">❓</div><div class="txt">Help & Support</div></div>›</div>
<div class="row"><div class="l"><div class="icon">📄</div><div class="txt">Privacy Policy</div></div>›</div>
</div>
<div class="sec">CONNECTED WALLETS</div>
<div class="wallets"><div class="wall"><div class="dot mm">M</div>MetaMask</div><div class="wall"><div class="dot bn">B</div>Binance</div></div>
<div class="sp"></div>
<nav><div>Home</div><div>Tasks</div><div>Referral</div><div>Ranking</div><div class="active">Settings</div></nav>
</body>
</html>
