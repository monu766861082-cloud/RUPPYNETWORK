<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RUPPY Admin Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: Arial; 
      background: #0a0a0a; 
      color: #fff; 
      padding: 20px;
    }
    .admin-header {
      background: #F3C774;
      color: #000;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;
    }
    .admin-header h1 {
      font-size: 28px;
      font-weight: 900;
    }
    .filter-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .search-box {
      flex: 1;
    }
    .search-box input {
      width: 100%;
      padding: 14px;
      background: #1a1a1a;
      border: 2px solid #F3C774;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
    }
    .filter-btn {
      padding: 14px 20px;
      background: #1a1a1a;
      border: 2px solid #F3C774;
      border-radius: 8px;
      color: #F3C774;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .filter-btn.active {
      background: #F3C774;
      color: #000;
    }
    .bulk-action {
      background: #1a1a1a;
      border: 2px solid #4CAF50;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      display: none;
    }
    .bulk-action.show {
      display: block;
    }
    .bulk-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .bulk-row input {
      flex: 1;
      padding: 12px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-size: 16px;
    }
    .bulk-btn {
      padding: 12px 24px;
      background: #4CAF50;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      font-size: 16px;
    }
    .user-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .user-card.zero-balance {
      border: 1px solid #f44336;
    }
    .user-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .user-name {
      font-size: 18px;
      font-weight: 700;
      color: #F3C774;
    }
    .user-email {
      font-size: 12px;
      color: #888;
    }
    .user-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }
    .stat-box {
      background: #0a0a0a;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
    }
    .stat-label {
      font-size: 11px;
      color: #888;
    }
    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #F3C774;
    }
    .stat-value.zero {
      color: #f44336;
    }
    .action-row {
      display: flex;
      gap: 8px;
    }
    .action-row input {
      flex: 1;
      padding: 10px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
    }
    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-add {
      background: #4CAF50;
      color: #fff;
    }
    .btn-remove {
      background: #f44336;
      color: #fff;
    }
    .btn-set {
      background: #F3C774;
      color: #000;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
    }
    .stats-header {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: #1a1a1a;
      padding: 16px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid #F3C774;
    }
    .stat-card-value {
      font-size: 24px;
      font-weight: 900;
      color: #F3C774;
    }
    .stat-card-label {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
    .selected-count {
      color: #F3C774;
      font-weight: 700;
      margin-left: 10px;
    }
  </style>
</head>
<body>

  <div class="admin-header">
    <h1>🔥 RUPPY ADMIN PANEL</h1>
    <div style="font-size:14px;margin-top:8px">Full Control - Add/Edit Tokens</div>
  </div>

  <div class="stats-header">
    <div class="stat-card">
      <div class="stat-card-value" id="totalUsers">0</div>
      <div class="stat-card-label">Total Users</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-value" id="totalTokens">0</div>
      <div class="stat-card-label">Total RUPY</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-value" id="totalReferrals">0</div>
      <div class="stat-card-label">Total Referrals</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-value" id="zeroBalanceCount">0</div>
      <div class="stat-card-label">Zero Balance</div>
    </div>
  </div>

  <div class="filter-row">
    <div class="search-box">
      <input type="text" id="searchUser" placeholder="🔍 Search by Name, Email, or Code..." onkeyup="filterUsers()">
    </div>
    <button class="filter-btn" id="filterZeroBtn" onclick="toggleZeroFilter()">💰 Show Zero Balance</button>
  </div>

  <div class="bulk-action" id="bulkActionBox">
    <div class="bulk-row">
      <input type="number" id="bulkAmount" placeholder="Amount to Add" value="100">
      <button class="bulk-btn" onclick="bulkAddTokens()">⚡ Add to All Zero Balance Users <span class="selected-count" id="selectedCount">0</span></button>
    </div>
  </div>

  <div id="usersList" class="loading">Loading users...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, update, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDQC0WsVPr63y2xvFMSifnkjAB3TTVcIxU",
      authDomain: "ruppynetwork-50362.firebaseapp.com",
      databaseURL: "https://ruppynetwork-50362-default-rtdb.firebaseio.com",
      projectId: "ruppynetwork-50362",
      storageBucket: "ruppynetwork-50362.appspot.com",
      messagingSenderId: "132064610854",
      appId: "1:132064610854:web:3c217eaf3618007f5934e7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const ADMIN_EMAIL = "farmanking7867@gmail.com";

    let allUsers = [];
    let showZeroOnly = false;

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        alert("Login Required!");
        window.location.href = "login.html";
        return;
      }
      
      if (user.email !== ADMIN_EMAIL) {
        alert("❌ Access Denied! Admin Only");
        window.location.href = "index.html";
        return;
      }

      loadAllUsers();
    });

    async function loadAllUsers() {
      try {
        const usersRef = ref(db, 'users');
        const snapshot = await get(usersRef);
        
        if (snapshot.exists()) {
          allUsers = [];
          let totalTokens = 0;
          let totalRefs = 0;
          let zeroCount = 0;

          snapshot.forEach((child) => {
            const userData = child.val();
            userData.uid = child.key;
            allUsers.push(userData);
            
            const bal = Number(userData.balance) || 0;
            totalTokens += bal;
            totalRefs += Number(userData.totalReferrals) || 0;
            if (bal === 0) zeroCount++;
          });

          document.getElementById('totalUsers').textContent = allUsers.length;
          document.getElementById('totalTokens').textContent = totalTokens.toLocaleString();
          document.getElementById('totalReferrals').textContent = totalRefs;
          document.getElementById('zeroBalanceCount').textContent = zeroCount;
          document.getElementById('selectedCount').textContent = zeroCount;

          renderUsers(allUsers);
        } else {
          document.getElementById('usersList').innerHTML = '<div class="loading">No users found</div>';
        }
      } catch (error) {
        console.error('Load Error:', error);
        document.getElementById('usersList').innerHTML = '<div class="loading">Error loading users</div>';
      }
    }

    function renderUsers(users) {
      let displayUsers = users;
      
      if (showZeroOnly) {
        displayUsers = users.filter(u => (Number(u.balance) || 0) === 0);
      }

      const html = displayUsers.map(user => {
        const bal = Number(user.balance) || 0;
        const isZero = bal === 0;
        return `
        <div class="user-card ${isZero ? 'zero-balance' : ''}" data-uid="${user.uid}">
          <div class="user-info">
            <div>
              <div class="user-name">${user.name || 'No Name'}</div>
              <div class="user-email">${user.email || 'No Email'}</div>
              <div class="user-email">Code: ${user.myReferralCode || 'N/A'}</div>
            </div>
          </div>
          
          <div class="user-stats">
            <div class="stat-box">
              <div class="stat-label">Balance</div>
              <div class="stat-value ${isZero ? 'zero' : ''}">${bal}</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">Total Refs</div>
              <div class="stat-value">${Number(user.totalReferrals) || 0}</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">Active Refs</div>
              <div class="stat-value">${Number(user.activeReferrals) || 0}</div>
            </div>
          </div>

          <div class="action-row">
            <input type="number" id="amount-${user.uid}" placeholder="Amount" value="100">
            <button class="btn btn-add" onclick="addTokens('${user.uid}')">+ Add</button>
            <button class="btn btn-remove" onclick="removeTokens('${user.uid}')">- Remove</button>
            <button class="btn btn-set" onclick="setTokens('${user.uid}')">Set</button>
          </div>
        </div>
      `}).join('');
      
      document.getElementById('usersList').innerHTML = html || '<div class="loading">No users found</div>';
    }

    window.filterUsers = function() {
      const search = document.getElementById('searchUser').value.toLowerCase();
      let filtered = allUsers.filter(u => 
        (u.name || '').toLowerCase().includes(search) ||
        (u.email || '').toLowerCase().includes(search) ||
        (u.myReferralCode || '').toLowerCase().includes(search)
      );
      renderUsers(filtered);
    }

    window.toggleZeroFilter = function() {
      showZeroOnly = !showZeroOnly;
      const btn = document.getElementById('filterZeroBtn');
      const bulkBox = document.getElementById('bulkActionBox');
      
      if (showZeroOnly) {
        btn.classList.add('active');
        btn.textContent = '👥 Show All Users';
        bulkBox.classList.add('show');
      } else {
        btn.classList.remove('active');
        btn.textContent = '💰 Show Zero Balance';
        bulkBox.classList.remove('show');
      }
      renderUsers(allUsers);
    }

    window.bulkAddTokens = async function() {
      const amount = Number(document.getElementById('bulkAmount').value) || 0;
      if (amount <= 0) return alert('Enter valid amount');
      
      const zeroUsers = allUsers.filter(u => (Number(u.balance) || 0) === 0);
      if (zeroUsers.length === 0) return alert('No zero balance users found');
      
      if (!confirm(`Add ${amount} RUPY to ${zeroUsers.length} users?`)) return;
      
      const updates = {};
      zeroUsers.forEach(user => {
        updates[`users/${user.uid}/balance`] = amount;
      });
      
      await update(ref(db), updates);
      alert(`✅ Added ${amount} RUPY to ${zeroUsers.length} users`);
      await loadAllUsers();
    }

    window.addTokens = async function(uid) {
      const amount = Number(document.getElementById(`amount-${uid}`).value) || 0;
      if (amount <= 0) return alert('Enter valid amount');
      
      const user = allUsers.find(u => u.uid === uid);
      const currentBal = Number(user.balance) || 0;
      const newBalance = currentBal + amount;
      
      await set(ref(db, `users/${uid}/balance`), newBalance);
      alert(`✅ Added ${amount} RUPY to ${user.name}. New Balance: ${newBalance}`);
      await loadAllUsers();
    }

    window.removeTokens = async function(uid) {
      const amount = Number(document.getElementById(`amount-${uid}`).value) || 0;
      if (amount <= 0) return alert('Enter valid amount');
      
      const user = allUsers.find(u => u.uid === uid);
      const currentBal = Number(user.balance) || 0;
      const newBalance = Math.max(0, currentBal - amount);
      
      await set(ref(db, `users/${uid}/balance`), newBalance);
      alert(`✅ Removed ${amount} RUPY from ${user.name}. New Balance: ${newBalance}`);
      await loadAllUsers();
    }

    window.setTokens = async function(uid) {
      const amount = Number(document.getElementById(`amount-${uid}`).value) || 0;
      if (amount < 0) return alert('Enter valid amount');
      
      const user = allUsers.find(u => u.uid === uid);
      
      await set(ref(db, `users/${uid}/balance`), amount);
      alert(`✅ Set ${user.name} balance to ${amount} RUPY`);
      await loadAllUsers();
    }
  </script>

</body>
</html>
