<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RUPPY Admin Panel - SECURE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; background: #0a0a0a; color: #fff; padding: 20px; }
    #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .login-box { background: #1a1a1a; border: 3px solid #F3C774; border-radius: 16px; padding: 40px; text-align: center; max-width: 400px; }
    .login-box h2 { color: #F3C774; font-size: 28px; margin-bottom: 20px; }
    .login-btn { background: #F3C774; color: #000; padding: 16px 40px; border: none; border-radius: 8px; font-size: 18px; font-weight: 900; cursor: pointer; margin-top: 20px; }
    .admin-header { background: #F3C774; color: #000; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; display: none; }
    .admin-header h1 { font-size: 28px; font-weight: 900; }
    .logout-btn { background: #f44336; color: #fff; padding: 8px 16px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; display: none; }
    .tab-btn { flex: 1; padding: 14px; background: #1a1a1a; border: 2px solid #F3C774; border-radius: 8px; color: #F3C774; font-weight: 700; cursor: pointer; text-align: center; }
    .tab-btn.active { background: #F3C774; color: #000; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .user-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .user-card.new-user { border: 2px solid #4CAF50; box-shadow: 0 0 10px #4CAF50; }
    .user-name { font-size: 18px; font-weight: 700; color: #F3C774; }
    .user-email { font-size: 12px; color: #888; }
    .referrer-info { font-size: 13px; color: #4CAF50; margin-top: 4px; }
    .new-badge { background: #4CAF50; color: #fff; padding: 2px 8px; border-radius: 12px; font-size: 11px; margin-left: 8px; }
    .loading { text-align: center; padding: 40px; color: #888; }
    .search-box input { width: 100%; padding: 14px; background: #1a1a1a; border: 2px solid #F3C774; border-radius: 8px; color: #fff; font-size: 16px; margin-bottom: 20px; }
    #debug { position: fixed; bottom: 10px; left: 10px; background: #333; color: #F3C774; padding: 10px; border-radius: 8px; font-size: 12px; display: none; }
  </style>
</head>
<body>

  <div id="loginScreen">
    <div class="login-box">
      <h2>🔐 ADMIN LOGIN</h2>
      <p style="color:#888;margin-bottom:20px">RUPPY Network Admin Panel</p>
      <button class="login-btn" onclick="doLogin()">🔑 Login with Google</button>
    </div>
  </div>

  <div id="debug"></div>

  <div id="adminPanel" style="display:none">
    <div class="admin-header" id="adminHeader">
      <h1>🔥 RUPPY ADMIN PANEL</h1>
      <div style="font-size:12px;margin-top:8px;color:#000">Logged in: <span id="adminEmail"></span></div>
      <button class="logout-btn" onclick="doLogout()">🚪 Logout</button>
    </div>

    <div class="tabs" id="tabs">
      <div class="tab-btn active" onclick="switchTab('users')">👥 Users Management</div>
      <div class="tab-btn" onclick="switchTab('newusers')">🆕 New Users</div>
    </div>

    <div id="usersTab" class="tab-content active">
      <div id="usersList" class="loading">Loading users...</div>
    </div>

    <div id="newUsersTab" class="tab-content">
      <div class="search-box">
        <input type="text" id="searchNewUser" placeholder="🔍 Search new users..." onkeyup="filterNewUsers()">
      </div>
      <div id="newUsersList" class="loading">Loading new users...</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithRedirect, GoogleAuthProvider, getRedirectResult, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDQC0WsVPr63y2xvFMSifnkjAB3TTVcIxU",
      authDomain: "ruppynetwork-50362.firebaseapp.com",
      databaseURL: "https://ruppynetwork-50362-default-rtdb.firebaseio.com",
      projectId: "ruppynetwork-50362",
      storageBucket: "ruppynetwork-50362.appspot.com",
      messagingSenderId: "132064610854",
      appId: "1:132064610854:web:3c217eaf3618007f5934e7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const ADMIN_EMAIL = "farmanking7867@gmail.com";
    let allUsers = [];
    let newUsers = [];

    function showDebug(msg) {
      const debug = document.getElementById('debug');
      debug.style.display = 'block';
      debug.textContent = msg;
      setTimeout(() => debug.style.display = 'none', 3000);
    }

    // FIXED LOGIN - No popup, uses redirect
    window.doLogin = function() {
      showDebug('Redirecting to Google...');
      signInWithRedirect(auth, provider);
    }

    window.doLogout = function() {
      signOut(auth).then(() => location.reload());
    }

    // Check if coming back from Google login
    getRedirectResult(auth).then((result) => {
      if (result && result.user) {
        checkAdmin(result.user);
      }
    }).catch((error) => {
      console.error('Login Error:', error);
      alert('Login Failed: ' + error.message);
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        checkAdmin(user);
      } else {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('adminPanel').style.display = 'none';
      }
    });

    function checkAdmin(user) {
      if (user.email !== ADMIN_EMAIL) {
        alert("❌ Access Denied!");
        signOut(auth);
      } else {
        showDebug('Admin Verified');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminHeader').style.display = 'block';
        document.getElementById('tabs').style.display = 'flex';
        document.getElementById('adminEmail').textContent = user.email;
        loadAllUsers();
        loadNewUsers();
      }
    }

    window.switchTab = function(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      if (tab === 'users') {
        document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
        document.getElementById('usersTab').classList.add('active');
      } else {
        document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
        document.getElementById('newUsersTab').classList.add('active');
        loadNewUsers();
      }
    }

    async function loadAllUsers() {
      const snapshot = await get(ref(db, 'users'));
      if (snapshot.exists()) {
        allUsers = [];
        snapshot.forEach((child) => {
          const userData = child.val();
          userData.uid = child.key;
          allUsers.push(userData);
        });
        renderUsers(allUsers);
      }
    }

    async function loadNewUsers() {
      const usersQuery = query(ref(db, 'users'), orderByChild('joinedAt'), limitToLast(50));
      const snapshot = await get(usersQuery);
      if (snapshot.exists()) {
        newUsers = [];
        snapshot.forEach((child) => {
          const userData = child.val();
          userData.uid = child.key;
          newUsers.unshift(userData);
        });
        renderNewUsers(newUsers);
      }
    }

    function renderUsers(users) {
      const html = users.map(user => `
        <div class="user-card">
          <div class="user-name">${user.name || 'No Name'}</div>
          <div class="user-email">${user.email || 'No Email'}</div>
          <div class="referrer-info">🔗 Referred by: ${user.referredBy || 'None'}</div>
        </div>
      `).join('');
      document.getElementById('usersList').innerHTML = html || '<div class="loading">No users found</div>';
    }

    function renderNewUsers(users) {
      const now = Date.now();
      const html = users.map(user => {
        const isNew = user.joinedAt && (now - user.joinedAt < 86400000);
        const referrer = allUsers.find(u => u.myReferralCode === user.referredBy);
        const referrerName = referrer ? referrer.name : user.referredBy || 'None';
        
        return `
        <div class="user-card ${isNew ? 'new-user' : ''}">
          <div class="user-name">
            ${user.name || 'No Name'} 
            ${isNew ? '<span class="new-badge">NEW</span>' : ''}
          </div>
          <div class="user-email">${user.email || 'No Email'}</div>
          <div class="user-email">Joined: ${user.joinedAt ? new Date(user.joinedAt).toLocaleString() : 'N/A'}</div>
          <div class="referrer-info">🔗 Referred by: <strong>${referrerName}</strong> (${user.referredBy || 'None'})</div>
        </div>
        `;
      }).join('');
      document.getElementById('newUsersList').innerHTML = html || '<div class="loading">No new users found</div>';
    }

    window.filterNewUsers = function() {
      const search = document.getElementById('searchNewUser').value.toLowerCase();
      let filtered = newUsers.filter(u => 
        (u.name || '').toLowerCase().includes(search) ||
        (u.email || '').toLowerCase().includes(search) ||
        (u.referredBy || '').toLowerCase().includes(search)
      );
      renderNewUsers(filtered);
    }
  </script>
</body>
</html>
