<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RUPPY - Notifications</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}
body{background:#0a0a0a;color:#fff;padding-bottom:70px}
.hub-header{position:sticky;top:0;background:#0a0a0a;padding:16px 20px;z-index:100;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;gap:12px}
.back-arrow{background:none;border:none;color:#FFD700;font-size:24px;cursor:pointer}
.hub-header h1{font-size:24px;font-weight:800;background:linear-gradient(90deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.notif-item{background:#111;border:1px solid #222;border-radius:16px;padding:14px;margin:12px 20px;display:flex;align-items:center;gap:12px}
.notif-icon{width:40px;height:40px;border-radius:10px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:18px}
.notif-text{flex:1;font-size:14px;line-height:1.4}
.notif-text b{color:#FFD700}
.notif-time{font-size:11px;color:#666;margin-top:4px}
.ruppy-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:1px solid #222;height:65px;display:flex;justify-content:space-around;align-items:center;z-index:999}
.nav-btn{background:none;border:none;color:#FFE55C;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;opacity:0.7;font-size:10px;text-decoration:none}
.nav-btn.active{color:#FFD700;opacity:1}
.nav-btn svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2}
</style>
</head>
<body>
<div class="hub-header"><button class="back-arrow" onclick="location.href='community-home.html'">←</button><h1>Notifications</h1></div>
<div style="padding:20px 0">
  <div class="notif-item"><div class="notif-icon">❤️</div><div class="notif-text"><b>Rahul</b> liked your post<div class="notif-time">2 hours ago</div></div></div>
  <div class="notif-item"><div class="notif-icon">💬</div><div class="notif-text"><b>Priya</b> commented: "Nice pic!"<div class="notif-time">5 hours ago</div></div></div>
  <div class="notif-item"><div class="notif-icon">🎁</div><div class="notif-text">You earned <b>+10 RUPPY</b> tokens<div class="notif-time">1 day ago</div></div></div>
</div>
<div class="ruppy-nav">
  <a href="community-home.html" class="nav-btn"><svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 22"></polyline></svg><span>Home</span></a>
  <a href="community-friend.html" class="nav-btn"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg><span>Friend</span></a>
  <a href="community-notification.html" class="nav-btn active"><svg viewBox="0 0 24 24"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span>Notif</span></a>
  <a href="community-profile.html" class="nav-btn"><svg viewBox="0 0 24 24"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span>Profile</span></a>
</div>
</body>
</html>
