<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ruppy Referral</title>

<!-- ✅ Auto Sense वाला config.js - छेड़ा नहीं -->
<script type="module" src="config.js?v=2"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;padding-bottom:80px}
.hdr{padding:20px;font-size:28px;font-weight:bold}
.uid-box{padding:0 20px;margin-bottom:8px;font-size:14px;color:#999}
.uid-box span{color:#d4a017;font-weight:bold}
.card{border:1px solid #a87128;border-radius:14px;padding:16px;margin:16px;box-shadow:0 0 10px #a87128}
.card h3{margin:0 0 8px;color:#ccc}
.card .amt{font-size:36px;font-weight:bold;display:flex;align-items:center;gap:10px}
.card .amt span{color:#d4a017}

.r-coin {width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#FFB84D,#F3C774,#D4A017);display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#000;box-shadow:0 0 12px rgba(243,199,116,0.6),inset 0 2px 4px rgba(255,255,255,0.3);border:1px solid #FFA500;position:relative;flex-shrink:0}
.r-coin::after {content:'';position:absolute;inset:-2px;border-radius:50%;background:radial-gradient(circle,#FF6B00 0%,transparent 70%);opacity:0.4;filter:blur(3px);z-index:-1}

.tag{background:#093;display:inline-block;padding:4px 10px;border-radius:6px;margin-top:8px;color:#0f0}
.inv{border:1px solid #444;border-radius:14px;padding:16px;margin:16px}
.inv label{display:block;margin-bottom:8px;color:#ccc}.inpbx{display:flex;gap:8px}
.inp{flex:1;border:1px solid #444;border-radius:10px;padding:12px;text-align:center;font-size:18px;font-weight:bold;color:#d4a017;background:#111}
.cp{width:48px;height:48px;border:1px solid #a87128;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.bt{background:#d4a017;color:#000;font-weight:bold;border:none;border-radius:10px;padding:14px;width:100%;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}
.sts{display:flex;gap:12px;padding:0 16px;margin-bottom:12px}
.bx{flex:1;border:1px solid #333;border-radius:10px;padding:16px;text-align:center}
.bx .v{font-size:24px;font-weight:bold}.bx .l{display:block;margin-top:4px;color:#aaa}
.team{padding:0 16px;font-size:18px;font-weight:bold;color:#d4a017;margin-top:20px}

/* NEW: Team Table CSS - बस ये Add किया */
.team-table{margin:16px;border:1px solid #333;border-radius:10px;overflow:hidden}
.team-table table{width:100%;border-collapse:collapse;font-size:13px}
.team-table th{background:#1a1a1a;color:#d4a017;padding:12px 8px;text-align:left;border-bottom:1px solid #333}
.team-table td{padding:10px 8px;border-bottom:1px solid #222;color:#ccc}
.team-table tr:last-child td{border-bottom:none}
.status-active{color:#0f0;font-weight:bold}
.status-inactive{color:#f33}
.no-data{text-align:center;padding:20px;color:#666}

.nav{position:fixed;bottom:0;left:0;right:0;background:#0d0d0d;border-top:1px solid #222;display:flex;justify-content:space-around;padding:8px 0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:#666;text-decoration:none;font-size:11px;cursor:pointer;padding:5px 0;width:16.6%;position:relative}
.nav-item.active{color:#FFA500}
.nav-item.active::after{content:'';position:absolute;bottom:2px;width:30px;height:2px;background:#FFA500;border-radius:2px}
.nav-item.icon{font-size:20px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1a5c1a;color:#4ade80;padding:12px 20px;border-radius:8px;font-size:14px;display:none;z-index:999}
</style>
</head>
<body>
<div class="hdr">Referral Program</div>
<div class="uid-box">ID: <span id="shortUserId">Loading...</span></div>

<div class="card">
  <h3>Referral Rewards</h3>
  <div class="amt">
    <div class="r-coin">R</div>
    <span id="teamReward">0</span> <span>RUP</span>
  </div>
  <div class="tag">+50 RUP Per Refer</div>
</div>

<div class="inv">
  <label>YOUR INVITE CODE</label>
  <div class="inpbx">
    <div class="inp" id="inviteCode">Loading...</div>
    <div class="cp" onclick="copy()">⧉</div>
  </div>
  <button class="bt" onclick="invite()">✨ INVITE FRIENDS</button>
</div>

<div class="sts">
  <div class="bx"><span class="v" id="totalCount">0</span><span class="l">TOTAL</span></div>
  <div class="bx"><span class="v" id="activeCount" style="color:#0f0">0</span><span class="l">ACTIVE</span></div>
  <div class="bx"><span class="v" id="inactiveCount" style="color:#f33">0</span><span class="l">INACTIVE</span></div>
</div>

<div class="team">👥 My Team</div>
<div class="team-table">
  <table id="teamTable">
    <thead>
      <tr>
        <th>Sr</th>
        <th>Name</th>
        <th>Gmail</th>
        <th>Join Date</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="teamTableBody">
      <tr><td colspan="5" class="no-data">Loading team...</td></tr>
    </tbody>
  </table>
</div>

<div class="nav">
  <div class="nav-item" onclick="goPage('app.html')">
    <div class="icon">🏠</div>
    <span>Home</span>
  </div>
  <div class="nav-item" onclick="goPage('tasks.html')">
    <div class="icon">📋</div>
    <span>Tasks</span>
  </div>
  <div class="nav-item active">
    <div class="icon">👥</div>
    <span>Referral</span>
  </div>
  <div class="nav-item" onclick="goPage('ranking.html')">
    <div class="icon">🏆</div>
    <span>Ranking</span>
  </div>
  <div class="nav-item" onclick="goPage('community.html')">
    <div class="icon">📝</div>
    <span>Feed</span>
  </div>
  <div class="nav-item" onclick="goPage('settings.html')">
    <div class="icon">⚙️</div>
    <span>Settings</span>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
// ✅ Auto Sense Same है - config.js को छेड़ा नहीं
async function init(){
  console.log('⏳ Waiting for config.js...');
  let attempts = 0;
  while(!window.userData?.referralCode && attempts < 50) {
    await new Promise(r => setTimeout(r, 100));
    attempts++;
  }
  const userData = window.userData;
  
  console.log('✅ config.js loaded:', userData);
  
  if(!userData?.uid){
    document.getElementById('inviteCode').innerText = 'LOGIN-FIRST';
    showToast('Please login first', 'error');
    setTimeout(() => window.location.href = 'index.html', 1500);
    return;
  }
  
  const inviteCode = userData.referralCode;
  const shortId = `RUP-${userData.uid.substring(0,4).toUpperCase()}`;
  
  document.getElementById('inviteCode').innerText = inviteCode || 'NOT-FOUND';
  document.getElementById('shortUserId').innerText = shortId;
  
  updateTeamStats();
  loadTeamTable();
}

// ✅ NEW: Team Table Load करने का Function
async function loadTeamTable(){
  try {
    const res = await fetch(`/api/get-team.php?uid=${window.userData.uid}`);
    const data = await res.json();
    
    let tbody = document.getElementById('teamTableBody');
    tbody.innerHTML = '';
    
    if(data.team && data.team.length > 0){
      data.team.forEach((user, index) => {
        let statusClass = user.isActive ? 'status-active' : 'status-inactive';
        let statusText = user.isActive ? 'Active 🟢' : 'Inactive 🔴';
        tbody.innerHTML += `
          <tr>
            <td>${index + 1}</td>
            <td>${user.name}</td>
            <td>${user.email}</td>
            <td>${user.joinDate}</td>
            <td class="${statusClass}">${statusText}</td>
          </tr>
        `;
      });
    } else {
      tbody.innerHTML = '<tr><td colspan="5" class="no-data">No referrals yet</td></tr>';
    }
  } catch(e) {
    console.log('Team load error:', e);
    document.getElementById('teamTableBody').innerHTML = '<tr><td colspan="5" class="no-data">Error loading team</td></tr>';
  }
}

// ✅ CHANGED: 2% हटाकर 50 RUP Per Refer किया
function updateTeamStats(){
  let userData = window.userData;
  let team = userData.team || [];
  let now = Date.now();
  let sevenDays = 7*24*60*60*1000;

  let total = team.length;
  let active = team.filter(t => now - (t.lastMine || 0) < sevenDays).length;
  let inactive = total - active;

  // 50 RUP PER REFER - Hand to Hand
  let totalReferralReward = total * 50;

  document.getElementById('teamReward').innerText = totalReferralReward;
  document.getElementById('totalCount').innerText = total;
  document.getElementById('activeCount').innerText = active;
  document.getElementById('inactiveCount').innerText = inactive;
}

function copy(){
  let inviteCode = window.userData.referralCode;
  navigator.clipboard.writeText(inviteCode);
  showToast('Invite Code Copied!');
}

function invite(){
  let inviteCode = window.userData.referralCode;
  let text = `Join RUPPY Network & get 50 RUP Bonus! 💰\nUse my code: ${inviteCode}\nhttps://ruppynetwork.vercel.app?ref=${inviteCode}`;
  
  if(navigator.share){
    navigator.share({
      title: 'Join RUPPY Network',
      text: text,
      url: `https://ruppynetwork.vercel.app?ref=${inviteCode}`
    });
  } else {
    navigator.clipboard.writeText(text);
    showToast('Invite Link Copied!');
  }
}

function showToast(msg){
  let t = document.getElementById('toast');
  t.innerText = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

function goPage(page){
  window.location.href = page;
}

window.addEventListener('storage', function(e){
  if(e.key === 'ruppy_user_cache') {
    init();
  }
});

init();
</script>
</body>
</html>
