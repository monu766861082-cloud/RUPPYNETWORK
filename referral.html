<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ruppy Referral</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;padding-bottom:80px}
.hdr{padding:20px;font-size:28px;font-weight:bold}
.card{border:1px solid #a87128;border-radius:14px;padding:16px;margin:16px;box-shadow:0 0 10px #a87128}
.card h3{margin:0 0 8px;color:#ccc}
.card .amt{font-size:36px;font-weight:bold;display:flex;align-items:center;gap:10px}
.card .amt span{color:#d4a017}
.logo{width:36px;height:36px;border-radius:50%;object-fit:cover}
.tag{background:#093;display:inline-block;padding:4px 10px;border-radius:6px;margin-top:8px;color:#0f0}
.inv{border:1px solid #444;border-radius:14px;padding:16px;margin:16px}
.inv label{display:block;margin-bottom:8px;color:#ccc}.inpbx{display:flex;gap:8px}
.inp{flex:1;border:1px solid #444;border-radius:10px;padding:12px;text-align:center;font-size:18px;font-weight:bold;color:#d4a017;background:#111}
.cp{width:48px;height:48px;border:1px solid #a87128;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.bt{background:#d4a017;color:#000;font-weight:bold;border:none;border-radius:10px;padding:14px;width:100%;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}
.sts{display:flex;gap:12px;padding:0 16px;margin-bottom:12px}
.bx{flex:1;border:1px solid #333;border-radius:10px;padding:16px;text-align:center}
.bx .v{font-size:24px;font-weight:bold}.bx .l{display:block;margin-top:4px;color:#aaa}
.team{padding:0 16px;font-size:18px;font-weight:bold;color:#d4a017}

/* Bottom Nav - 6 ICONS WITH FEED */
.nav{position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:1px solid #222;height:60px;display:flex;justify-content:space-around;align-items:center;z-index:999;padding:0 5px}
.nav-btn{background:none;border:none;color:#6B7280;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px 8px;border-radius:12px;transition:0.2s}
.nav-btn.active{color:#FFA500}
.nav-btn svg{width:22px;height:22px;stroke-width:2;fill:none;stroke:currentColor}
.nav-btn.active svg{fill:#FFA500;stroke:#FFA500}
.nav-btn span{font-size:9px;font-weight:600}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1a5c1a;color:#4ade80;padding:12px 20px;border-radius:8px;font-size:14px;display:none;z-index:999}
</style>
</head>
<body>
<div class="hdr">Referral Program</div>

<div class="card">
  <h3>Team Rewards</h3>
  <div class="amt">
    <img src="cropped_circle_image.png" class="logo" alt="RUPPY">
    <span id="teamReward">0</span> <span>RUPPY</span>
  </div>
  <div class="tag">+2% bonus from team</div>
</div>

<div class="inv">
  <label>YOUR INVITE CODE</label>
  <div class="inpbx">
    <div class="inp" id="inviteCode">Loading...</div>
    <div class="cp" onclick="copy()">⧉</div>
  </div>
  <button class="bt" onclick="invite()">✨ INVITE FRIENDS</button>
</div>

<div class="sts">
  <div class="bx"><span class="v" id="totalCount">0</span><span class="l">TOTAL</span></div>
  <div class="bx"><span class="v" id="activeCount" style="color:#0f0">0</span><span class="l">ACTIVE</span></div>
  <div class="bx"><span class="v" id="inactiveCount" style="color:#f33">0</span><span class="l">INACTIVE</span></div>
</div>

<div class="team">👥 My Team</div>

<!-- Bottom Nav - AB 6 ICONS HAIN -->
<div class="nav">
  <button class="nav-btn" onclick="location.href='app.html'">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path><polyline points="9 22 9 12 15 22"></polyline></svg>
    <span>Home</span>
  </button>
  <button class="nav-btn" onclick="location.href='tasks.html'">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
    <span>Tasks</span>
  </button>
  <button class="nav-btn active" onclick="location.href='referral.html'">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
    <span>Referral</span>
  </button>
  <button class="nav-btn" onclick="location.href='ranking.html'">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 0 001.946-.806 3.42 0 014.438 0 3.42 0 001.946.806 3.42 0 013.138 3.42 0 00.806 1.946 3.42 0 010 4.438 3.42 0 00-.806 1.946 3.42 0 01-3.138 3.42 0 00-1.946.806 3.42 0 01-4.438 0 3.42 0 00-1.946-.806 3.42 0 01-3.138 3.42 0 00-.806-1.946 3.42 0 010-4.438 3.42 0 00.806-1.946 3.42 0 013.138-3.138z"></path></svg>
    <span>Ranking</span>
  </button>
  <button class="nav-btn" onclick="location.href='community.html'">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path></svg>
    <span>Feed</span>
  </button>
  <button class="nav-btn" onclick="location.href='settings.html'">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37a1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
    <span>Settings</span>
  </button>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
let userData = JSON.parse(localStorage.getItem('ruppy_user')) || {
  userId: '',
  name: 'User',
  balance: 0,
  lastMine: 0,
  lastGift: 0,
  boostCount: 0,
  boostResetTime: Date.now(),
  team: [],
  lastTeamRewardCheck: 0,
  teamRewardEarned: 0
};

// Fix: Generate User ID if missing
if(!userData.userId || userData.userId === 'undefined'){
  userData.userId = 'ab' + Math.floor(Math.random()*9000000+1000000);
  localStorage.setItem('ruppy_user', JSON.stringify(userData));
}

// Fix: Invite Code = User ID for consistency
let inviteCode = userData.userId;
localStorage.setItem('ruppy_inviteCode', inviteCode);
document.getElementById('inviteCode').innerText = inviteCode;

let team = userData.team || [];
let now = Date.now();
let oneDay = 24*60*60*1000;

let total = team.length;
let active = team.filter(t => now - t.lastMine < oneDay).length;
let inactive = total - active;

let teamCollected24h = team.reduce((sum, t) => {
  if(now - t.lastMine < oneDay) return sum + (t.lastMinedAmount || 0);
  return sum;
}, 0);

let newTeamReward = Math.floor(teamCollected24h * 0.02);

if(now - userData.lastTeamRewardCheck > oneDay){
  userData.balance += newTeamReward;
  userData.lastTeamRewardCheck = now;
  userData.teamRewardEarned += newTeamReward;
  localStorage.setItem('ruppy_user', JSON.stringify(userData));
}

document.getElementById('teamReward').innerText = userData.teamRewardEarned || 0;
document.getElementById('totalCount').innerText = total;
document.getElementById('activeCount').innerText = active;
document.getElementById('inactiveCount').innerText = inactive;

function copy(){
  navigator.clipboard.writeText(inviteCode);
  showToast('Invite Code Copied!');
}

function invite(){
  let text = `Join RUPPY Network & start playing! 💰\nUse my code: ${inviteCode}\nhttps://ruppynetwork.vercel.app?ref=${inviteCode}`;
  
  if(navigator.share){
    navigator.share({
      title: 'Join RUPPY Network',
      text: text,
      url: `https://ruppynetwork.vercel.app?ref=${inviteCode}`
    });
  } else {
    navigator.clipboard.writeText(text + '\n\nShare on: WhatsApp, Facebook, Instagram, Telegram');
    showToast('Invite Link Copied! Share on WhatsApp/Facebook/Instagram/Telegram');
  }
}

function showToast(msg){
  let t = document.getElementById('toast');
  t.innerText = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

window.addEventListener('storage', function(e){
  if(e.key === 'ruppy_user') location.reload();
});
</script>
</body>
</html>
