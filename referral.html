<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ruppy Referral</title>
<script type="module" src="config.js?v=2"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;padding-bottom:80px}
.hdr{padding:20px;font-size:28px;font-weight:bold}
.uid-box{padding:0 20px;margin-bottom:8px;font-size:14px;color:#999}
.uid-box span{color:#d4a017;font-weight:bold}
.card{border:1px solid #a87128;border-radius:14px;padding:16px;margin:16px;box-shadow:0 0 10px #a87128}
.card h3{margin:0 0 8px;color:#ccc}
.card .amt{font-size:36px;font-weight:bold;display:flex;align-items:center;gap:10px}
.card .amt span{color:#d4a017}
.r-coin {width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#FFB84D,#F3C774,#D4A017);display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#000;box-shadow:0 0 12px rgba(243,199,116,0.6),inset 0 2px 4px rgba(255,255,255,0.3);border:1px solid #FFA500;position:relative;flex-shrink:0}
.r-coin::after {content:'';position:absolute;inset:-2px;border-radius:50%;background:radial-gradient(circle,#FF6B00 0%,transparent 70%);opacity:0.4;filter:blur(3px);z-index:-1}
.tag{background:#093;display:inline-block;padding:4px 10px;border-radius:6px;margin-top:8px;color:#0f0}
.inv{border:1px solid #444;border-radius:14px;padding:16px;margin:16px}
.inv label{display:block;margin-bottom:8px;color:#ccc}.inpbx{display:flex;gap:8px}
.inp{flex:1;border:1px solid #444;border-radius:10px;padding:12px;text-align:center;font-size:18px;font-weight:bold;color:#d4a017;background:#111}
.cp{width:48px;height:48px;border:1px solid #a87128;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.bt{background:#d4a017;color:#000;font-weight:bold;border:none;border-radius:10px;padding:14px;width:100%;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}

/* ✅ NEW: APPLY CODE BOX */
.apply-box{border:1px solid #a87128;border-radius:14px;padding:16px;margin:16px;background:#0a0a0a;box-shadow:0 0 10px #a87128}
.apply-box label{display:block;margin-bottom:8px;color:#d4a017;font-weight:bold;text-align:center}
.apply-inp{width:100%;border:1px solid #a87128;border-radius:10px;padding:12px;text-align:center;font-size:18px;font-weight:bold;color:#d4a017;background:#111;box-sizing:border-box;text-transform:uppercase;margin-bottom:12px}
.apply-bt{background:#093;color:#0f0;font-weight:bold;border:none;border-radius:10px;padding:14px;width:100%;cursor:pointer;font-size:16px}

/* ✅ CLICKABLE BUTTONS */
.sts{display:flex;gap:12px;padding:0 16px;margin-bottom:12px}
.bx{flex:1;border:1px solid #333;border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:0.2s}
.bx:hover{border-color:#d4a017;transform:scale(1.05)}
.bx.active{border-color:#d4a017;background:#1a1a1a}
.bx .v{font-size:24px;font-weight:bold}.bx .l{display:block;margin-top:4px;color:#aaa}

.team{padding:0 16px;font-size:18px;font-weight:bold;color:#d4a017;margin-top:20px;display:none}
.team-table{margin:16px;border:1px solid #333;border-radius:10px;overflow:hidden;display:none}
.team-table.show{display:block}
.team-table table{width:100%;border-collapse:collapse;font-size:13px}
.team-table th{background:#1a1a1a;color:#d4a017;padding:12px 8px;text-align:left;border-bottom:1px solid #333}
.team-table td{padding:10px 8px;border-bottom:1px solid #222;color:#ccc}
.team-table tr:last-child td{border-bottom:none}
.status-active{color:#0f0;font-weight:bold}
.status-inactive{color:#f33}
.no-data{text-align:center;padding:20px;color:#666}

.nav{position:fixed;bottom:0;left:0;right:0;background:#0d0d0d;border-top:1px solid #222;display:flex;justify-content:space-around;padding:8px 0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:#666;text-decoration:none;font-size:11px;cursor:pointer;padding:5px 0;width:16.6%;position:relative}
.nav-item.active{color:#FFA500}
.nav-item.active::after{content:'';position:absolute;bottom:2px;width:30px;height:2px;background:#FFA500;border-radius:2px}
.nav-item.icon{font-size:20px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1a5c1a;color:#4ade80;padding:12px 20px;border-radius:8px;font-size:14px;display:none;z-index:999}
.toast.error{background:#5c1a1a;color:#ff4d4d}
</style>
</head>
<body>
<div class="hdr">Referral Program</div>
<div class="uid-box">ID: <span id="shortUserId">Loading...</span></div>

<div class="card">
  <h3>Referral Rewards</h3>
  <div class="amt">
    <div class="r-coin">R</div>
    <span id="teamReward">0</span> <span>RUP</span>
  </div>
  <div class="tag">+50 RUP Per Refer</div>
</div>

<!-- ✅ NEW: REFERRAL CODE APPLY BOX -->
<div class="apply-box" id="applyBox">
  <label>🔥 ENTER REFERRAL CODE 🔥</label>
  <input type="text" class="apply-inp" id="applyCodeInput" placeholder="RUP-XXXXXX" maxlength="10">
  <button class="apply-bt" onclick="applyReferralCode()">✅ APPLY CODE & GIVE 50 RUP</button>
</div>

<div class="inv">
  <label>YOUR INVITE CODE</label>
  <div class="inpbx">
    <div class="inp" id="inviteCode">Loading...</div>
    <div class="cp" onclick="copy()">⧉</div>
  </div>
  <button class="bt" onclick="invite()">✨ INVITE FRIENDS</button>
</div>

<!-- ✅ CLICKABLE BOXES -->
<div class="sts">
  <div class="bx" onclick="showList('total')" id="totalBox">
    <span class="v" id="totalCount">0</span><span class="l">TOTAL</span>
  </div>
  <div class="bx" onclick="showList('active')" id="activeBox">
    <span class="v" id="activeCount" style="color:#0f0">0</span><span class="l">ACTIVE</span>
  </div>
  <div class="bx" onclick="showList('inactive')" id="inactiveBox">
    <span class="v" id="inactiveCount" style="color:#f33">0</span><span class="l">INACTIVE</span>
  </div>
</div>

<!-- ✅ TABLE HIDDEN BY DEFAULT -->
<div class="team" id="teamTitle">👥 My Team</div>
<div class="team-table" id="teamTable">
  <table>
    <thead>
      <tr>
        <th>Sr</th>
        <th>Name</th>
        <th>Gmail</th>
        <th>Join Date</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="teamTableBody">
      <tr><td colspan="5" class="no-data">Click above to view list</td></tr>
    </tbody>
  </table>
</div>

<div class="nav">
  <div class="nav-item" onclick="goPage('app.html')"><div class="icon">🏠</div><span>Home</span></div>
  <div class="nav-item" onclick="goPage('tasks.html')"><div class="icon">📋</div><span>Tasks</span></div>
  <div class="nav-item active"><div class="icon">👥</div><span>Referral</span></div>
  <div class="nav-item" onclick="goPage('ranking.html')"><div class="icon">🏆</div><span>Ranking</span></div>
  <div class="nav-item" onclick="goPage('community.html')"><div class="icon">📝</div><span>Feed</span></div>
  <div class="nav-item" onclick="goPage('settings.html')"><div class="icon">⚙️</div><span>Settings</span></div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
let currentFilter = 'none';
let teamData = [];

async function init(){
  let attempts = 0;
  while(!window.userData && attempts < 50) {
    await new Promise(r => setTimeout(r, 100));
    attempts++;
  }
  
  const userData = window.userData;
  if(!userData?.uid){
    document.getElementById('inviteCode').innerText = 'LOGIN-FIRST';
    document.getElementById('shortUserId').innerText = 'LOGIN-FIRST';
    document.getElementById('applyBox').style.display = 'none';
    return;
  }

  // ✅ अगर पहले से Refer किया है तो Apply Box Hide कर दो
  if(userData.referredBy){
    document.getElementById('applyBox').style.display = 'none';
  }
  
  const inviteCode = userData.myReferralCode || `RUP-${userData.uid.substring(0,6).toUpperCase()}`;
  const shortId = `RUP-${userData.uid.substring(0,4).toUpperCase()}`;
  
  document.getElementById('inviteCode').innerText = inviteCode;
  document.getElementById('shortUserId').innerText = shortId;
  
  teamData = userData.team || [];
  updateTeamStats();
}

// ✅ NEW: REFERRAL CODE APPLY FUNCTION - config.js वाला Call करेगा
async function applyReferralCode(){
  const code = document.getElementById('applyCodeInput').value.trim().toUpperCase();
  
  if(!code){
    return showToast('Please enter code', 'error');
  }

  showToast('Checking code...');
  
  // config.js का Function Call कर
  const result = await window.applyReferralCodeManual(code);
  showToast(result.msg, result.success? 'success' : 'error');
  
  if(result.success){
    document.getElementById('applyBox').style.display = 'none';
    document.getElementById('applyCodeInput').value = '';
    setTimeout(() => window.location.reload(), 1500);
  }
}

// ✅ CLICK पे LIST दिखाओ
function showList(type){
  currentFilter = type;
  
  // Button Active Style
  document.querySelectorAll('.bx').forEach(b => b.classList.remove('active'));
  document.getElementById(type + 'Box').classList.add('active');
  
  // Table Show करो
  document.getElementById('teamTitle').style.display = 'block';
  document.getElementById('teamTable').classList.add('show');
  
  // Filter करके List बनाओ
  let filteredTeam = [];
  let now = Date.now();
  let sevenDays = 7*24*60*60*1000;
  
  if(type === 'total'){
    filteredTeam = teamData;
    document.getElementById('teamTitle').innerText = '👥 Total Users';
  } else if(type === 'active'){
    filteredTeam = teamData.filter(t => now - (t.lastMine || 0) < sevenDays);
    document.getElementById('teamTitle').innerText = '🟢 Active Users';
  } else if(type === 'inactive'){
    filteredTeam = teamData.filter(t => now - (t.lastMine || 0) >= sevenDays);
    document.getElementById('teamTitle').innerText = '🔴 Inactive Users';
  }
  
  renderTeamTable(filteredTeam);
}

function renderTeamTable(team){
  let tbody = document.getElementById('teamTableBody');
  tbody.innerHTML = '';
  
  if(team && team.length > 0){
    team.forEach((user, index) => {
      let now = Date.now();
      let sevenDays = 7*24*60*60*1000;
      let isActive = now - (user.lastMine || 0) < sevenDays;
      let statusClass = isActive? 'status-active' : 'status-inactive';
      let statusText = isActive? 'Active 🟢' : 'Inactive 🔴';
      let joinDate = user.created_at? new Date(user.created_at).toLocaleDateString('en-GB') : 'N/A';
      
      tbody.innerHTML += `
        <tr>
          <td>${index + 1}</td>
          <td>${user.name || 'User'}</td>
          <td>${user.email || 'N/A'}</td>
          <td>${joinDate}</td>
          <td class="${statusClass}">${statusText}</td>
        </tr>
      `;
    });
  } else {
    tbody.innerHTML = '<tr><td colspan="5" class="no-data">No users found</td></tr>';
  }
}

function updateTeamStats(){
  let team = teamData;
  let now = Date.now();
  let sevenDays = 7*24*60*60*1000;

  let total = team.length;
  let active = team.filter(t => now - (t.lastMine || 0) < sevenDays).length;
  let inactive = total - active;
  let totalReferralReward = (window.userData.teamRewardEarned || 0);

  document.getElementById('teamReward').innerText = totalReferralReward;
  document.getElementById('totalCount').innerText = total;
  document.getElementById('activeCount').innerText = active;
  document.getElementById('inactiveCount').innerText = inactive;
}

function copy(){
  let inviteCode = document.getElementById('inviteCode').innerText;
  if(inviteCode === 'LOGIN-FIRST') return showToast('Login first!', 'error');
  navigator.clipboard.writeText(inviteCode);
  showToast('Invite Code Copied!');
}

function invite(){
  let inviteCode = document.getElementById('inviteCode').innerText;
  if(inviteCode === 'LOGIN-FIRST') return showToast('Login first!', 'error');
  let text = `Join RUPPY Network & get 50 RUP Bonus! 💰\nUse my code: ${inviteCode}\nhttps://ruppynetwork.vercel.app`;
  
  if(navigator.share){
    navigator.share({title: 'Join RUPPY Network', text: text});
  } else {
    navigator.clipboard.writeText(text);
    showToast('Invite Link Copied!');
  }
}

function showToast(msg, type = 'success'){
  let t = document.getElementById('toast');
  t.innerText = msg;
  t.className = 'toast ' + type;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

function goPage(page){ window.location.href = page; }

window.addEventListener('storage', function(e){
  if(e.key === 'ruppy_user_cache') init();
});

init();
</script>
</body>
</html>
