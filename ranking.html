<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruppy Leaderboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { text-align: center; color: #667eea; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        .input-section { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        input { 
            flex: 1; 
            min-width: 150px;
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 8px;
            font-size: 16px;
        }
        button { 
            padding: 12px 24px; 
            background: #667eea; 
            color: white; 
            border: none; 
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover { background: #5568d3; }
        .leaderboard { margin-top: 20px; }
        .player { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 15px; 
            margin: 10px 0; 
            background: #f8f9fa; 
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .rank { 
            font-size: 24px; 
            font-weight: bold; 
            color: #667eea;
            min-width: 40px;
        }
        .name { flex: 1; margin-left: 15px; font-size: 18px; }
        .score { font-size: 20px; font-weight: bold; color: #764ba2; }
        .gold { border-left-color: #FFD700; }
        .silver { border-left-color: #C0C0C0; }
        .bronze { border-left-color: #CD7F32; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 Ruppy Leaderboard</h1>
        <p class="subtitle">Live Rankings</p>
        
        <div class="input-section">
            <input type="text" id="playerName" placeholder="Player Name">
            <input type="number" id="playerScore" placeholder="Score">
            <button onclick="addScore()">Add Score</button>
        </div>
        
        <div class="leaderboard" id="leaderboard">
            <p style="text-align:center;color:#999;">Loading...</p>
        </div>
    </div>

    <script type="module">
        // Import Firebase SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, query, orderByChild } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDQC0WsVPr63y2xvFMSifnkjAB3TTVcIxU",
            authDomain: "ruppynetwork-50362.firebaseapp.com",
            databaseURL: "https://ruppynetwork-50362-default-rtdb.firebaseio.com",
            projectId: "ruppynetwork-50362",
            storageBucket: "ruppynetwork-50362.firebasestorage.app",
            messagingSenderId: "132064610854",
            appId: "1:132064610854:web:3c217eaf3618007f5934e7"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const scoresRef = ref(database, 'scores');

        // Add score to database
        window.addScore = function() {
            const name = document.getElementById('playerName').value.trim();
            const score = parseInt(document.getElementById('playerScore').value);
            
            if (!name || !score) {
                alert('Please enter both name and score');
                return;
            }
            
            push(scoresRef, {
                name: name,
                score: score,
                timestamp: Date.now()
            });
            
            document.getElementById('playerName').value = '';
            document.getElementById('playerScore').value = '';
        }

        // Listen for real-time updates
        const scoresQuery = query(scoresRef, orderByChild('score'));
        onValue(scoresQuery, (snapshot) => {
            const leaderboard = document.getElementById('leaderboard');
            const scores = [];
            
            snapshot.forEach((child) => {
                scores.push(child.val());
            });
            
            // Sort descending
            scores.sort((a, b) => b.score - a.score);
            
            if (scores.length === 0) {
                leaderboard.innerHTML = '<p style="text-align:center;color:#999;">No scores yet. Add one!</p>';
                return;
            }
            
            leaderboard.innerHTML = scores.map((player, index) => {
                let rankClass = '';
                if (index === 0) rankClass = 'gold';
                else if (index === 1) rankClass = 'silver';
                else if (index === 2) rankClass = 'bronze';
                
                return `
                    <div class="player ${rankClass}">
                        <div class="rank">#${index + 1}</div>
                        <div class="name">${player.name}</div>
                        <div class="score">${player.score}</div>
                    </div>
                `;
            }).join('');
        });
    </script>
</body>
</html>
