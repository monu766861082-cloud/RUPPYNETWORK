<script>
// Clear old data once
if(!localStorage.getItem('fix_final_v1')){
  localStorage.clear();
  localStorage.setItem('fix_final_v1', 'done');
}

let userData = JSON.parse(localStorage.getItem('ruppy_user')) || {
  name: '',
  balance: 0,
  team: [],
  lastClaimWeek: 0
};

// Ask name only once if empty
if(!userData.name || userData.name.trim() === ''){
  let n = prompt('Enter your name:');
  userData.name = n && n.trim() ? n.trim() : 'Guest';
  localStorage.setItem('ruppy_user', JSON.stringify(userData));
}

let inviteCode = localStorage.getItem('ruppy_inviteCode') || 'RUPPY786';
let userName = userData.name;

function getReward(rank){
  if(rank === 1) return 1000;
  if(rank >= 2 && rank <= 10) return 800;
  if(rank >= 11 && rank <= 50) return 600;
  if(rank >= 51 && rank <= 100) return 500;
  if(rank >= 101 && rank <= 500) return 300;
  return 0;
}

function getWeekNumber(){
  let d = new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 4 - (d.getDay()||7));
  let yearStart = new Date(d.getFullYear(),0,1);
  return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
}

let allUsersData = JSON.parse(localStorage.getItem('ruppy_all_users')) || [];
let userPoints = (userData.team || []).length * 10;
let currentWeek = getWeekNumber();

// Add to leaderboard only if user has points
if(userPoints > 0){
  let existingUser = allUsersData.find(u => u.name === userName);
  if(existingUser){
    existingUser.refs = userData.team.length;
    existingUser.points = userPoints;
  } else {
    allUsersData.push({
      name: userName,
      refs: userData.team.length,
      points: userPoints,
      isUser: true
    });
  }
  localStorage.setItem('ruppy_all_users', JSON.stringify(allUsersData));
}

allUsersData.sort((a,b) => b.points - a.points);

// Show position only if user has points
let userRank = 0;
if(userPoints > 0){
  document.getElementById('pos').style.display = 'block';
  userRank = allUsersData.findIndex(u => u.isUser) + 1;
  document.getElementById('userRank').innerText = '#' + userRank;
  document.getElementById('userName').innerText = userName;
  document.getElementById('userPoints').innerText = userPoints;
  
  // Show claim card only for ranked users
  let userReward = getReward(userRank);
  if(userReward > 0){
    document.getElementById('claimCard').style.display = 'block';
    document.getElementById('claimText').innerHTML = `Rank #${userRank} Reward: <span style="color:var(--gold)">${userReward} RUPPY TOKEN</span>`;
    
    if(userData.lastClaimWeek === currentWeek){
      document.getElementById('claimBtn').innerText = 'CLAIMED ✓';
      document.getElementById('claimBtn').classList.add('claimed');
    }
  }
}

// Leaderboard list
let listHTML = '';
if(allUsersData.length === 0){
  listHTML = `<div class="empty">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 21h8M12 17v4M7 4h10l-1 7H8L7 4z"/><path d="M17 4v2a3 3 0 0 1-3 3H10a3 3 0 0 1-3-3V4"/></svg>
    <div>No users yet</div>
    <div style="font-size:12px;margin-top:4px">Start referring to appear on leaderboard</div>
  </div>`;
} else {
  allUsersData.forEach((u,i) => {
    let rank = i + 1;
    let reward = getReward(rank);
    let crown = rank === 1? '👑' : rank === 2? '🥈' : rank === 3? '🥉' : '#' + rank;
    let nameStyle = u.isUser? 'style="color:#1DBF5E"' : '';
    listHTML += `
    <div class="user">
      <div class="lf">
        <div class="ic">${crown}</div>
        <div>
          <div class="u-name" ${nameStyle}><img src="logo.png" class="logo" onerror="this.style.display='none'">${u.name}</div>
          <div class="u-sub">${u.refs} refs</div>
        </div>
      </div>
      <div class="lf" style="gap:28px">
        <div class="pts">${u.points}</div>
        <div class="amt">${reward}</div>
      </div>
    </div>`;
  });
}
document.getElementById('leaderboardList').innerHTML = listHTML;

function claimReward(){
  if(userPoints === 0){
    showToast('Refer first to get rank');
    return;
  }
  if(userData.lastClaimWeek === currentWeek){
    showToast('Already claimed this week');
    return;
  }
  let userReward = getReward(userRank);
  if(userReward === 0){
    showToast('Not in Top 500 yet');
    return;
  }
  
  userData.balance += userReward;
  userData.lastClaimWeek = currentWeek;
  localStorage.setItem('ruppy_user', JSON.stringify(userData));
  showToast(userReward + ' RUPPY TOKEN Claimed!');
  setTimeout(() => location.reload(), 1000);
}

function shareRefer(){
  let url = `https://ruppynetwork.vercel.app?ref=${inviteCode}`;
  let msg = `Join RUPPY Network & earn RUPPY TOKEN! Use my code: ${inviteCode}`;
  
  if (navigator.share) {
    navigator.share({
      title: 'RUPPY Network',
      text: msg,
      url: url
    }).catch(() => {
      navigator.clipboard.writeText(msg + '\n\n' + url);
      showToast('Link Copied!');
    });
  } else {
    navigator.clipboard.writeText(msg + '\n\n' + url);
    showToast('Link Copied!');
  }
}

function showToast(msg){
  let t = document.getElementById('toast');
  t.innerText = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

function goPage(page){ window.location.href = page; }

let lastUpdate = localStorage.getItem('ruppy_leaderboard_update') || 0;
if(Date.now() - lastUpdate > 24*60*60*1000){
  localStorage.setItem('ruppy_leaderboard_update', Date.now());
  location.reload();
}
</script>
