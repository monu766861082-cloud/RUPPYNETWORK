<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ruppy Network - Ranking</title>
<script type="module" src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}
body{background:#0a0a0a;color:#fff;padding-bottom:80px}
.header{padding:20px;text-align:center;border-bottom:1px solid #222;background:#0d0d0d;position:sticky;top:0;z-index:100}
.header h2{font-size:22px;font-weight:800;background:linear-gradient(90deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.timer-box{margin:15px 20px;background:linear-gradient(135deg,#1a1a1a,#0d0d0d);border:1px solid #FFD700;border-radius:16px;padding:16px;text-align:center}
.timer-box h3{font-size:14px;color:#888;margin-bottom:8px}
.timer-box.countdown{font-size:24px;font-weight:800;color:#FFD700}
.timer-box.reward{font-size:12px;color:#666;margin-top:5px}
.winner-banner{margin:15px 20px;background:#1a5c1a;border:1px solid #0f0;border-radius:16px;padding:12px;text-align:center;display:none}
.winner-banner h4{color:#0f0;font-size:14px;margin-bottom:5px}
.winner-banner p{color:#fff;font-size:12px}
.top3{display:flex;justify-content:center;gap:15px;padding:20px;align-items:flex-end}
.top-card{background:#111;border:1px solid #222;border-radius:20px;padding:15px;text-align:center;width:100px;position:relative}
.top-card.first{background:linear-gradient(135deg,#FFD700,#FFA500);transform:scale(1.1);border:none}
.top-card.claimed-badge{position:absolute;top:-8px;right:-8px;background:#0f0;color:#000;font-size:9px;font-weight:700;padding:3px 6px;border-radius:10px}
.top-card.rank{font-size:24px;margin-bottom:8px}
.top-card.dp{width:50px;height:50px;border-radius:50%;background:#1a1a1a;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;border:2px solid #333}
.top-card.first.dp{border-color:#000}
.top-card.dp img{width:100%;height:100%;object-fit:cover}
.top-card.name{font-size:12px;font-weight:600;color:#FFD700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-card.first.name{color:#000}
.top-card.score{font-size:11px;color:#666}
.top-card.first.score{color:#000}
.leaderboard{padding:0 20px}
.rank-item{background:#111;border:1px solid #222;border-radius:16px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:12px;position:relative}
.rank-item.current-user{border:2px solid #FFD700;background:linear-gradient(135deg,#1a1a1a,#0d0d0d)}
.rank-item.winner{border:2px solid #0f0;background:linear-gradient(135deg,#1a2a1a,#0d1a0d)}
.claimed-tag{position:absolute;top:8px;right:8px;background:#0f0;color:#000;font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px}
.rank-num{width:30px;height:30px;border-radius:8px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-weight:700;color:#FFD700;font-size:14px}
.rank-dp{width:40px;height:40px;border-radius:12px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid #333}
.rank-dp img{width:100%;height:100%;object-fit:cover}
.rank-info{flex:1}
.rank-info.name{font-size:14px;font-weight:600;margin-bottom:2px}
.rank-info.refs{font-size:12px;color:#666}
.rank-score{font-size:16px;font-weight:700;color:#FFD700}
.ruppy-nav{position:fixed;bottom:0;left:0;right:0;background:#0d0d0d;border-top:1px solid #222;display:flex;justify-content:space-around;padding:8px 0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:#666;text-decoration:none;font-size:10px;cursor:pointer;padding:5px 0;width:16.6%}
.nav-item.active{color:#FFD700}
.nav-item.active::after{content:'';width:30px;height:2px;background:#FFD700;margin-top:2px}
.nav-item.icon{font-size:20px}
.empty{text-align:center;padding:40px;color:#666}
</style>
</head>
<body>

<div class="header">
  <h2>🏆 Weekly Leaderboard</h2>
</div>

<div class="timer-box">
  <h3>⏰ Next Reward Distribution</h3>
  <div class="countdown" id="countdown">Loading...</div>
  <div class="reward">Top Users Get Auto Reward - Watch Your Rank</div>
</div>

<div class="winner-banner" id="winnerBanner">
  <h4>🎉 Last Week Winners - Auto Claimed</h4>
  <p id="winnerList">Loading...</p>
</div>

<div class="top3" id="top3"></div>

<div class="leaderboard" id="leaderboard">
  <div class="empty">Loading rankings...</div>
</div>

<div class="ruppy-nav">
  <div class="nav-item" onclick="location.href='index.html'">
    <div class="icon">🏠</div>
    <span>Home</span>
  </div>
  <div class="nav-item" onclick="location.href='tasks.html'">
    <div class="icon">📋</div>
    <span>Tasks</span>
  </div>
  <div class="nav-item" onclick="location.href='referral.html'">
    <div class="icon">👥</div>
    <span>Referral</span>
  </div>
  <div class="nav-item active">
    <div class="icon">🏆</div>
    <span>Ranking</span>
  </div>
  <div class="nav-item" onclick="location.href='community.html'">
    <div class="icon">📝</div>
    <span>Feed</span>
  </div>
  <div class="nav-item" onclick="location.href='settings.html'">
    <div class="icon">⚙️</div>
    <span>Settings</span>
  </div>
</div>

<script type="module">
import { getDatabase, ref, query, orderByChild, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const MAX_USERS = 500; // ✅ 500 Users तक दिखेंगे
const WEEKLY_REWARD = 500; // तू अपने हिसाब से Change कर लेना

function waitForConfig() {
  return new Promise(resolve => {
    if (window.userData) {
      resolve();
    } else {
      const interval = setInterval(() => {
        if (window.userData) {
          clearInterval(interval);
          resolve();
        }
      }, 100);
    }
  });
}

// ✅ 7 Days Timer - Sunday रात 12 बजे
function getNextSunday() {
  const now = new Date();
  const nextSunday = new Date();
  nextSunday.setDate(now.getDate() + (7 - now.getDay()) % 7);
  nextSunday.setHours(23, 59, 59, 999);
  if (now.getDay() === 0 && now.getHours() >= 23) {
    nextSunday.setDate(nextSunday.getDate() + 7);
  }
  return nextSunday;
}

function startCountdown() {
  const nextSunday = getNextSunday();

  function update() {
    const diff = nextSunday - new Date();
    if (diff <= 0) {
      document.getElementById('countdown').textContent = 'Distributing Rewards...';
      distributeRewards();
      return;
    }
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const secs = Math.floor((diff % (1000 * 60)) / 1000);
    document.getElementById('countdown').textContent = `${days}d ${hours}h ${mins}m ${secs}s`;
  }
  update();
  setInterval(update, 1000);
}

// ✅ AUTO CLAIM - Timer खत्म होते ही Top 10 को Reward
async function distributeRewards() {
  const db = getDatabase();
  const now = Date.now();
  const weekKey = `week_${Math.floor(now / (7 * 24 * 60 * 60 * 1000))}`;

  const distRef = ref(db, `weeklyDistribution/${weekKey}`);
  const distSnap = await get(distRef);
  if (distSnap.exists()) {
    showLastWinners(distSnap.val());
    return;
  }

  const usersRef = query(ref(db, 'users'), orderByChild('referralCount'));
  const snapshot = await get(usersRef);

  let users = [];
  if (snapshot.exists()) {
    snapshot.forEach(child => {
      const data = child.val();
      users.push({
        uid: child.key,
        name: data.name || 'User',
        referralCount: data.referralCount || 0
      });
    });
  }

  // तेरी Rank Logic Same रहेगी - बस Sort कर रहे हैं
  users.sort((a, b) => b.referralCount - a.referralCount);
  const winners = users.slice(0, 10);

  const updates = {};
  const winnerNames = [];

  for (let winner of winners) {
    if (winner.referralCount > 0) {
      const userRef = ref(db, `users/${winner.uid}`);
      const userSnap = await get(userRef);
      const userData = userSnap.val();

      updates[`users/${winner.uid}/balance`] = (userData.balance || 0) + WEEKLY_REWARD;
      updates[`users/${winner.uid}/lastWeeklyReward`] = now;
      updates[`users/${winner.uid}/weeklyRewardRank`] = winners.indexOf(winner) + 1;
      updates[`users/${winner.uid}/weeklyRewardAmount`] = WEEKLY_REWARD;

      winnerNames.push(`${winner.name} (#${winners.indexOf(winner) + 1})`);
    }
  }

  updates[`weeklyDistribution/${weekKey}`] = {
    timestamp: now,
    winners: winnerNames,
    distributed: true
  };

  await update(ref(db), updates);
  showLastWinners({ winners: winnerNames, timestamp: now });

  setTimeout(() => window.location.reload(), 3000);
}

async function showLastWinners(data) {
  const banner = document.getElementById('winnerBanner');
  const list = document.getElementById('winnerList');

  if (data && data.winners && data.winners.length > 0) {
    banner.style.display = 'block';
    list.textContent = data.winners.join(', ');
  }
}

async function loadLeaderboard() {
  await waitForConfig();
  const db = getDatabase();

  // ✅ सारे Users लाओ - No Limit, फिर 500 Slice करो
  const usersRef = query(ref(db, 'users'), orderByChild('referralCount'));
  const snapshot = await get(usersRef);

  let users = [];
  if (snapshot.exists()) {
    snapshot.forEach(child => {
      const data = child.val();
      users.push({
        uid: child.key,
        name: data.name || 'User',
        dp: data.dp || null,
        referralCount: data.referralCount || 0,
        balance: data.balance || 0,
        weeklyRewardRank: data.weeklyRewardRank || 0,
        weeklyRewardAmount: data.weeklyRewardAmount || 0,
        lastWeeklyReward: data.lastWeeklyReward || 0
      });
    });
  }

  // तेरी Rank Logic Same - बस Sort
  users.sort((a, b) => b.referralCount - a.referralCount);
  users = users.slice(0, MAX_USERS); // ✅ 500 तक

  // Check Last Week Winners
  const weekKey = `week_${Math.floor(Date.now() / (7 * 24 * 60 * 60 * 1000)) - 1}`;
  const distRef = ref(db, `weeklyDistribution/${weekKey}`);
  const distSnap = await get(distRef);
  if (distSnap.exists()) {
    showLastWinners(distSnap.val());
  }

  // Top 3 - तेरी Logic Same
  const top3Div = document.getElementById('top3');
  top3Div.innerHTML = '';

  const positions = [1, 0, 2];
  positions.forEach(i => {
    if (users[i]) {
      const user = users[i];
      const medals = ['🥈', '🥇', '🥉'];
      const isWinner = user.lastWeeklyReward && (Date.now() - user.lastWeeklyReward) < (7 * 24 * 60 * 60 * 1000);
      const card = document.createElement('div');
      card.className = `top-card ${i === 0? 'first' : ''}`;
      card.innerHTML = `
        ${isWinner? `<div class="claimed-badge">CLAIMED</div>` : ''}
        <div class="rank">${medals[i]}</div>
        <div class="dp">${user.dp? `<img src="${user.dp}">` : user.name[0].toUpperCase()}</div>
        <div class="name">${user.name}</div>
        <div class="score">${user.referralCount} Refs</div>
      `;
      top3Div.appendChild(card);
    }
  });

  // Full List - तेरी Rank Logic Same
  const lbDiv = document.getElementById('leaderboard');
  lbDiv.innerHTML = '';

  if (users.length === 0) {
    lbDiv.innerHTML = '<div class="empty">No rankings yet. Start referring!</div>';
    return;
  }

  users.forEach((user, index) => {
    const isCurrentUser = user.uid === window.userData?.uid;
    const isWinner = user.lastWeeklyReward && (Date.now() - user.lastWeeklyReward) < (7 * 24 * 60 * 60 * 1000);
    const item = document.createElement('div');
    item.className = `rank-item ${isCurrentUser? 'current-user' : ''} ${isWinner? 'winner' : ''}`;
    item.innerHTML = `
      ${isWinner? `<div class="claimed-tag">CLAIMED ${user.weeklyRewardAmount} RUP</div>` : ''}
      <div class="rank-num">${index + 1}</div>
      <div class="rank-dp">${user.dp? `<img src="${user.dp}">` : user.name[0].toUpperCase()}</div>
      <div class="rank-info">
        <div class="name">${user.name} ${isCurrentUser? '(You)' : ''}</div>
        <div class="refs">${user.referralCount} Referrals ${isWinner? `• Rank #${user.weeklyRewardRank}` : ''}</div>
      </div>
      <div class="rank-score">${user.balance} RUP</div>
    `;
    lbDiv.appendChild(item);
  });
}

async function init() {
  startCountdown();
  await loadLeaderboard();
  setInterval(loadLeaderboard, 30000);
}

init();
</script>
</body>
</html>
