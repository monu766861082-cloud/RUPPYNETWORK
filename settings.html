<script type="module">
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
  import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  // ✅ FIX 1: config.js के Load होने का Wait करो
  async function waitForConfig() {
    let attempts = 0;
    while ((!window.userData ||!window.userData.uid) && attempts < 50) {
      await new Promise(r => setTimeout(r, 100));
      attempts++;
      console.log('Waiting for config.js...', attempts);
    }
    return window.userData?.uid || null;
  }

  // ✅ FIX 2: Firebase से Direct Load करो अगर config.js Fail हो
  async function loadProfile() {
    document.getElementById('refCode').innerText = 'Loading...';

    // पहले config.js का Wait करो
    let uid = await waitForConfig();

    // अगर config.js से नहीं मिला तो Firebase Auth से लो
    if (!uid) {
      const auth = getAuth();
      await new Promise(resolve => {
        const unsubscribe = auth.onAuthStateChanged(user => {
          unsubscribe();
          uid = user?.uid || null;
          resolve();
        });
      });
    }

    if (!uid) {
      document.getElementById('refCode').innerText = 'LOGIN-FIRST';
      document.getElementById('userId').innerText = 'ID: LOGIN-FIRST';
      showToast('Please login first', 'error');
      setTimeout(() => window.location.href = 'index.html', 1500);
      return;
    }

    try {
      const db = getDatabase();
      const userRef = ref(db, `users/${uid}`);
      const snapshot = await get(userRef);

      if (snapshot.exists()) {
        const data = snapshot.val();

        // ✅ FIX 3: myReferralCode Primary - यही referral.html में है
        const code = data.myReferralCode || data.referralCode || 'NOT-FOUND';

        // ✅ FIX 4: User ID छोटी और साफ
        const shortId = data.shortId || `RUP-${uid.substring(0,4).toUpperCase()}`;

        if (data.dp) {
          document.getElementById('avatarBox').innerHTML = `<img src="${data.dp}" alt="Profile">`;
        } else {
          document.getElementById('avatarBox').innerHTML = `<span>${(data.name || 'U').charAt(0).toUpperCase()}</span>`;
        }
        document.getElementById('userName').innerText = data.name || 'User';
        document.getElementById('userBalance').innerText = (data.balance || 0) + ' RUP';
        document.getElementById('userId').innerText = 'ID: ' + shortId;
        document.getElementById('refCode').innerText = code;

        // Local Update
        window.userData = {...window.userData,...data, myReferralCode: code, shortId: shortId, uid: uid};
        localStorage.setItem('ruppy_user_cache', JSON.stringify(window.userData));

        console.log('✅ Loaded Code:', code);
      } else {
        document.getElementById('refCode').innerText = 'ERROR';
        showToast('User data not found', 'error');
      }
    } catch (err) {
      console.error('Load Error:', err);
      document.getElementById('refCode').innerText = 'ERROR';
      showToast('Failed to load: ' + err.message, 'error');
    }
  }

  loadProfile();

  window.showToast = function(msg, type = 'success'){
    let t = document.getElementById('toast');
    t.innerText = msg;
    t.className = 'toast ' + type;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }

  window.showComingSoon = function(){
    showToast('This feature is Coming Soon! 🚀', 'info');
  }

  // ✅ FIX 5: सिर्फ Code Copy करो
  window.copyRefCode = function(){
    const code = document.getElementById('refCode').innerText.trim();

    if(!code || code === 'Loading...' || code === 'LOGIN-FIRST' || code === '-' || code === 'ERROR' || code === 'NOT-FOUND'){
      showToast('Code not ready: ' + code, 'error');
      return;
    }

    navigator.clipboard.writeText(code).then(() => {
      showToast('✅ Copied: ' + code, 'success');
    }).catch(() => {
      const temp = document.createElement('textarea');
      temp.value = code;
      temp.style.position = 'fixed';
      temp.style.opacity = '0';
      document.body.appendChild(temp);
      temp.select();
      document.execCommand('copy');
      document.body.removeChild(temp);
      showToast('✅ Copied: ' + code, 'success');
    });
  }

  window.copyUserId = function(){
    const idText = document.getElementById('userId').innerText.replace('ID: ', '');
    if(idText === 'Loading...' || idText === 'LOGIN-FIRST') {
      showToast('ID not ready', 'error');
      return;
    }
    navigator.clipboard.writeText(idText).then(() => {
      showToast('✅ ID Copied: ' + idText, 'success');
    });
  }

  window.goPage = function(page){ window.location.href = page; }

  window.openEditProfile = function(){
    document.getElementById('editName').value = window.userData?.name || '';
    document.getElementById('editBirthday').value = window.userData?.birthday || '';
    document.getElementById('editModal').classList.add('active');
  }

  window.closeEditProfile = function(){
    document.getElementById('editModal').classList.remove('active');
  }

  window.saveProfile = async function(){
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving...';

    try {
      window.userData.name = document.getElementById('editName').value || 'Guest';
      window.userData.birthday = document.getElementById('editBirthday').value;
      const file = document.getElementById('editPhoto').files[0];

      if(file){
        saveBtn.textContent = 'Compressing...';
        const base64Photo = await compressToBase64(file, 400, 0.6);

        if(base64Photo.length > 900000){
          showToast('Photo too large! Use smaller image', 'error');
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save';
          return;
        }
        window.userData.dp = base64Photo;
      }

      saveBtn.textContent = 'Saving...';
      await window.saveRuppyData(window.userData);
      await loadProfile();
      closeEditProfile();
      showToast('Profile Updated!', 'success');

    } catch(error){
      console.error('Save Error:', error);
      showToast('Failed: ' + error.message, 'error');
    }

    saveBtn.disabled = false;
    saveBtn.textContent = 'Save';
  }

  function compressToBase64(file, maxWidth, quality){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = function(e){
        const img = new Image();
        img.src = e.target.result;
        img.onload = function(){
          const canvas = document.createElement('canvas');
          let width = img.width;
          let height = img.height;

          if(width > maxWidth){
            height = Math.round((height * maxWidth) / width);
            width = maxWidth;
          }

          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);

          const base64 = canvas.toDataURL('image/jpeg', quality);
          resolve(base64);
        }
        img.onerror = reject;
      }
      reader.onerror = reject;
    });
  }

  window.logout = async function(){
    if(confirm('Are you sure you want to logout?')){
      const auth = getAuth();
      await signOut(auth);
      localStorage.removeItem('ruppy_user');
      localStorage.removeItem('ruppy_user_cache');
      localStorage.removeItem('notif_enabled');
      window.location.href = '/';
    }
  }

  let notifEnabled = localStorage.getItem('notif_enabled') === 'true';

  function updateNotifStatus(){
    document.getElementById('notifStatus').innerText = notifEnabled? 'On' : 'Off';
    document.getElementById('notifStatus').style.color = notifEnabled? 'var(--green)' : 'var(--muted)';
  }
  updateNotifStatus();

  window.toggleNotification = async function(){
    if(!notifEnabled){
      if('Notification' in window){
        const permission = await Notification.requestPermission();
        if(permission === 'granted'){
          notifEnabled = true;
          localStorage.setItem('notif_enabled', 'true');
          updateNotifStatus();
        }
      }
    } else {
      notifEnabled = false;
      localStorage.setItem('notif_enabled', 'false');
      updateNotifStatus();
    }
  }

  window.sendMiningNotif = function(){
    if(localStorage.getItem('notif_enabled') === 'true'){
      if('Notification' in window && Notification.permission === 'granted'){
        new Notification('Rewards Ready!', {
          body: 'Your RUP is ready to collect!',
          icon: 'https://ruppynetwork.com/icon.png'
        });
        new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
      }
    }
  }
</script>
