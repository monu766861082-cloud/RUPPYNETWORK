// नया SaveProfile Function - Base64 Compress के साथ
window.saveProfile = async function(){
  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving...';

  try {
    userData.name = document.getElementById('editName').value || 'Guest';
    userData.birthday = document.getElementById('editBirthday').value;
    const file = document.getElementById('editPhoto').files[0];

    if(file){
      saveBtn.textContent = 'Compressing...';

      // Photo को 400px और 60% Quality पे Compress करो
      const base64Photo = await compressToBase64(file, 400, 0.6);

      // Size Check - 900KB से बड़ी नहीं
      console.log('Photo Size:', Math.round(base64Photo.length/1024) + 'KB');
      if(base64Photo.length > 900000){
        alert('Photo बहुत बड़ी है भाई। Camera से खींची हुई छोटी Photo डाल, Screenshot मत डाल');
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save';
        return;
      }

      userData.photo = base64Photo;
    }

    saveBtn.textContent = 'Saving...';
    localStorage.setItem('ruppy_user', JSON.stringify(userData));
    await loadProfile();
    closeEditProfile();
    showToast('Profile Updated!');

  } catch(error){
    console.error('Save Error:', error);
    alert('Failed: ' + error.message);
  }

  saveBtn.disabled = false;
  saveBtn.textContent = 'Save';
}

// Photo Compress Function
function compressToBase64(file, maxWidth, quality){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = function(e){
      const img = new Image();
      img.src = e.target.result;
      img.onload = function(){
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;

        if(width > maxWidth){
          height = Math.round((height * maxWidth) / width);
          width = maxWidth;
        }

        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        const base64 = canvas.toDataURL('image/jpeg', quality);
        resolve(base64);
      }
      img.onerror = reject;
    }
    reader.onerror = reject;
  });
}

async function logout(){

    // 2. LocalStorage Clear करो

    window.location.href = '/';
  }
}

function updateNotifStatus(){
  document.getElementById('notifStatus').innerText = notifEnabled? 'On' : 'Off';
  document.getElementById('notifStatus').style.color = notifEnabled? 'var(--green)' : 'var(--muted)';
}
updateNotifStatus();

async function toggleNotification(){
  if(!notifEnabled){
    if('Notification' in window){
      const permission = await Notification.requestPermission();
      if(permission === 'granted'){
        notifEnabled = true;
        localStorage.setItem('notif_enabled', 'true');
        updateNotifStatus();
      }
    }
  } else {
    notifEnabled = false;
    localStorage.setItem('notif_enabled', 'false');
    updateNotifStatus();
  }
}
