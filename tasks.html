<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ruppy Tasks</title>

<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2718847163624444" crossorigin="anonymous"></script>

<!-- ✅ FIX: config.js Add करा Balance Sync के लिए -->
<script type="module" src="config.js"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;padding-bottom:80px}
.hdr{padding:20px}
.hdr h1{margin:0;font-size:28px}
.hdr p{margin:4px 0 0;color:#FFA500;font-weight:bold}
.hdr small{color:#888}
.tokenBal{background:#0d0d0d;border:1px solid #FFA500;border-radius:12px;padding:15px;margin:0 15px;text-align:center;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px}
.tokenBal b{color:#FFA500;font-size:24px}

.r-coin {width:24px;height:24px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#FFB84D,#F3C774,#D4A017);display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#000;box-shadow:0 0 10px rgba(243,199,116,0.6),inset 0 2px 4px rgba(255,255,255,0.3);border:1px solid #FFA500;position:relative;flex-shrink:0}
.r-coin::after {content:'';position:absolute;inset:-2px;border-radius:50%;background:radial-gradient(circle,#FF6B00 0%,transparent 70%);opacity:0.4;filter:blur(3px);z-index:-1}

.card{border:1px solid #333;border-radius:12px;padding:14px;margin:12px 15px;display:flex;align-items:center;background:#0d0d0d}
.ic{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-right:12px;font-size:20px}
.tg{background:#0088cc}.fb{background:#1877f2}.x{background:#fff;color:#000}
.txt{flex:1}.txt b{display:block;font-size:15px}.txt span{color:#FFA500;font-size:12px;display:flex;align-items:center;gap:4px}
.txt .mini-coin {width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#FFB84D,#F3C774);display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:8px;color:#000}
.bt{border:1px solid #FFA500;color:#FFA500;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;text-decoration:none;display:inline-block;min-width:70px;text-align:center;font-weight:600}
.bt.claim{background:#FFA500;color:#000}
.bt.done{background:#333;color:#666;border-color:#333;cursor:not-allowed}
.bt.opened{background:#1a1a1a;color:#888;border-color:#444}
.nav{position:fixed;bottom:0;left:0;right:0;background:#0d0d0d;border-top:1px solid #222;display:flex;justify-content:space-around;padding:8px 0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:#666;text-decoration:none;font-size:11px;cursor:pointer;padding:5px 0;width:16.6%;position:relative}
.nav-item.active{color:#FFA500}
.nav-item.active::after{content:'';position:absolute;bottom:2px;width:30px;height:2px;background:#FFA500;border-radius:2px}
.nav-item.icon{font-size:20px}
</style>
</head>
<body>
<div class="hdr">
  <h1>DAILY TASKS</h1>
  <p>RUP</p>
  <small id="userId">ID: Loading...</small>
</div>

<div class="tokenBal">Your Balance: <div class="r-coin">R</div> <b id="bal">0</b> RUP</div>

<div class="card">
  <div class="ic tg">✈️</div>
  <div class="txt"><b>Join Telegram</b><span>Reward: <div class="mini-coin">R</div> 20 RUP</span></div>
  <a class="bt" id="tgBtn">JOIN</a>
</div>

<div class="card">
  <div class="ic fb">f</div>
  <div class="txt"><b>Follow on Facebook</b><span>Reward: <div class="mini-coin">R</div> 20 RUP</span></div>
  <a class="bt" id="fbBtn">FOLLOW</a>
</div>

<div class="card">
  <div class="ic x">X</div>
  <div class="txt"><b>Follow on X</b><span>Reward: <div class="mini-coin">R</div> 20 RUP</span></div>
  <a class="bt" id="xBtn">FOLLOW</a>
</div>

<!-- ✅ FIX: Nav में Feed Icon जोड़ा -->
<div class="nav">
  <div class="nav-item" onclick="goPage('app.html')">
    <div class="icon">🏠</div>
    <span>Home</span>
  </div>
  <div class="nav-item active">
    <div class="icon">📋</div>
    <span>Tasks</span>
  </div>
  <div class="nav-item" onclick="goPage('referral.html')">
    <div class="icon">👥</div>
    <span>Referral</span>
  </div>
  <div class="nav-item" onclick="goPage('ranking.html')">
    <div class="icon">🏆</div>
    <span>Ranking</span>
  </div>
  <div class="nav-item" onclick="goPage('community.html')">
    <div class="icon">📝</div>
    <span>Feed</span>
  </div>
  <div class="nav-item" onclick="goPage('settings.html')">
    <div class="icon">⚙️</div>
    <span>Settings</span>
  </div>
</div>

<script>
// ✅ FIX: localStorage हटाया, config.js वाला userData Use करा
var userData = window.userData;
let taskState = JSON.parse(localStorage.getItem('taskState')) || {};
let openedTask = null;

// ✅ FIX: init Function बनाया जो userData Load होने का Wait करता
async function init(){
  let attempts = 0;
  while(!window.userData?.uid && attempts < 50) {
    await new Promise(r => setTimeout(r, 100));
    attempts++;
  }
  userData = window.userData;
  
  // ✅ FIXED: UID की जगह myReferralCode दिखाओ
  document.getElementById('userId').innerText = `ID: ${userData.myReferralCode || userData.uid.substring(0,8)}`;
  document.getElementById('bal').innerText = userData.balance || 0;
  updateButtons();
}

init();

document.addEventListener('visibilitychange', function() {
  if (!document.hidden && openedTask) {
    taskState[openedTask] = 'ready_to_claim';
    localStorage.setItem('taskState', JSON.stringify(taskState));
    openedTask = null;
    updateButtons();
  }
});

function openLink(task, url) {
  window.open(url, '_blank');
  openedTask = task;
  taskState[task] = 'opened';
  localStorage.setItem('taskState', JSON.stringify(taskState));
  updateButtons();
}

// ✅ FIX: saveRuppyData() Use करा ताकि सब Pages में Sync हो
async function claimReward(task) {
  if (taskState[task] === 'ready_to_claim') {
    userData.balance = Number(userData.balance) || 0;
    userData.balance += 20;
    taskState[task] = 'claimed';
    localStorage.setItem('taskState', JSON.stringify(taskState));
    
    // Firebase में Save करा
    await saveRuppyData(userData);
    
    document.getElementById('bal').innerText = userData.balance;
    updateButtons();
    alert('+20 RUP Claimed!');
  }
}

function updateButtons() {
  const tasks = [
    {id: 'tg', url: 'https://t.me/RUPPYfoundation', text: 'JOIN'},
    {id: 'fb', url: 'https://www.facebook.com/share/1PjMyFivNF/?mibextid=wwXIfr', text: 'FOLLOW'},
    {id: 'x', url: 'https://x.com/rupfoundation?s=21', text: 'FOLLOW'}
  ];

  tasks.forEach(t => {
    let btn = document.getElementById(t.id + 'Btn');
    if (taskState[t.id] === 'opened') {
      btn.innerText = 'OPENED';
      btn.className = 'bt opened';
      btn.onclick = null;
    } else if (taskState[t.id] === 'ready_to_claim') {
      btn.innerText = 'CLAIM';
      btn.className = 'bt claim';
      btn.onclick = () => claimReward(t.id);
    } else if (taskState[t.id] === 'claimed') {
      btn.innerText = 'DONE';
      btn.className = 'bt done';
      btn.onclick = null;
    } else {
      btn.innerText = t.text;
      btn.className = 'bt';
      btn.onclick = () => openLink(t.id, t.url);
    }
  });
}

function goPage(page) {
  window.location.href = page;
}

// ✅ FIX: Real-time Sync के लिए storage Event रखा
window.addEventListener('storage', function(e) {
  if (e.key === 'ruppy_user_cache') {
    userData = JSON.parse(e.newValue);
    document.getElementById('bal').innerText = userData.balance;
    // ✅ FIXED: UID की जगह myReferralCode दिखाओ
    document.getElementById('userId').innerText = `ID: ${userData.myReferralCode || userData.uid.substring(0,8)}`;
  }
});
</script>
</body>
</html>
