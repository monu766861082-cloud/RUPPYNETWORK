<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ruppy Tasks</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;padding-bottom:70px}
.hdr{padding:20px}
.hdr h1{margin:0;font-size:28px}
.hdr p{margin:4px 0 0;color:#d4a017;font-weight:bold}
.hdr small{color:#888}
.card{border:1px solid #444;border-radius:14px;padding:14px;margin:12px;display:flex;align-items:center}
.ic{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-right:12px;font-size:20px}
.tg{background:#0088cc}.fb{background:#1877f2}.x{background:#fff;color:#000}
.txt{flex:1}.txt b{display:block}.txt span{color:#d4a017}
.bt{border:1px solid #d4a017;color:#d4a017;padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;text-decoration:none;display:inline-block}
.nav{position:fixed;bottom:0;left:0;width:100%;display:flex;background:#000;border-top:1px solid #222}
.nv{flex:1;text-align:center;font-size:11px;padding:6px 0;color:#777;position:relative;cursor:pointer}
.nv.active{color:#d4a017}
.nv.active::before{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:40px;height:4px;background:#d4a017;border-radius:2px}
.nv .icon{font-size:18px;display:block;margin-bottom:2px}
</style>
</head>
<body>
<div class="hdr"><h1>DAILY TASKS</h1><p>EARN RUPPY TOKEN</p><small>ID: AKASH-8291</small></div>

<div class="card">
  <div class="ic tg">✈️</div>
  <div class="txt"><b>Join Telegram</b><span>+20 TOKEN</span></div>
  <a href="https://t.me/RUPPYfoundation" target="_blank" class="bt" onclick="addToken(20)">JOIN</a>
</div>

<div class="card">
  <div class="ic fb">f</div>
  <div class="txt"><b>Follow on Facebook</b><span>+20 TOKEN</span></div>
  <a href="https://www.facebook.com/share/1PjMyFivNF/?mibextid=wwXIfr" target="_blank" class="bt" onclick="addToken(20)">FOLLOW</a>
</div>

<div class="card">
  <div class="ic x">X</div>
  <div class="txt"><b>Follow on X</b><span>+20 TOKEN</span></div>
  <a href="https://x.com/rupfoundation?s=21" target="_blank" class="bt" onclick="addToken(20)">FOLLOW</a>
</div>

<div class="nav">
  <div class="nv" onclick="goPage('app.html')">
    <span class="icon">🏠</span>
    <span>Home</span>
  </div>
  <div class="nv active">
    <span class="icon">📋</span>
    <span>Tasks</span>
  </div>
  <div class="nv">
    <span class="icon">👥</span>
    <span>Referral</span>
  </div>
  <div class="nv">
    <span class="icon">🏆</span>
    <span>Ranking</span>
  </div>
  <div class="nv">
    <span class="icon">⚙️</span>
    <span>Settings</span>
  </div>
</div>

<script>
let tokens = localStorage.getItem('ruppyTokens') ? parseInt(localStorage.getItem('ruppyTokens')) : 1220;

function addToken(reward){
  tokens += reward;
  localStorage.setItem('ruppyTokens', tokens);
  setTimeout(() => {
    alert('Tokens: ' + tokens);
  }, 300);
}

function goPage(page){
  window.location.href = page;
}
</script>
</body>
</html>
