<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;padding-bottom:80px}
.hdr{padding:20px}
.hdr h1{margin:0;font-size:28px}
.hdr p{margin:4px 0 0;color:#FFA500;font-weight:bold}
.hdr small{color:#888}
.tokenBal{background:#0d0d0d;border:1px solid #FFA500;border-radius:12px;padding:15px;margin:0 15px;text-align:center;font-size:14px}
.tokenBal b{color:#FFA500;font-size:24px}
.card{border:1px solid #333;border-radius:12px;padding:14px;margin:12px 15px;display:flex;align-items:center;background:#0d0d0d}
.ic{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-right:12px;font-size:20px}
.tg{background:#0088cc}.fb{background:#1877f2}.x{background:#fff;color:#000}
.txt{flex:1}.txt b{display:block;font-size:15px}.txt span{color:#FFA500;font-size:12px}
.bt{border:1px solid #FFA500;color:#FFA500;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;text-decoration:none;display:inline-block;min-width:70px;text-align:center;font-weight:600}
.bt.claim{background:#FFA500;color:#000}
.bt.done{background:#333;color:#666;border-color:#333;cursor:not-allowed}
.bt.opened{background:#1a1a1a;color:#888;border-color:#444}

/* EXACT COPY FROM YOUR APP.HTML */
.nav{position:fixed;bottom:0;left:0;right:0;background:#0d0d0d;border-top:1px solid #222;display:flex;justify-content:space-around;padding:8px 0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:#666;text-decoration:none;font-size:11px;cursor:pointer;padding:5px 15px}
.nav-item.active{color:#FFA500}
.nav-item.active::after{content:'';width:30px;height:2px;background:#FFA500;margin-top:2px}
.nav-item.icon{font-size:20px}

/* Google Translate Bar Hide ✅ */
.goog-te-banner-frame{display:none!important}
.goog-logo-link{display:none!important}
body{top:0!important}
</style>
</head>
<body>
<div class="hdr">
  <h1>DAILY TASKS</h1>
  <p>EARN <span class="notranslate">RUPPY</span></p>
  <small id="userId" class="notranslate">ID: Loading...</small>
</div>

<div class="tokenBal">Your Balance: <b id="bal" class="notranslate">0</b> <span class="notranslate">RUPPY</span></div>

<div class="card">

  <div class="txt"><b>Join Telegram</b><span>Reward: +20 <span class="notranslate">RUPPY</span></span></div>
  <a class="bt" id="tgBtn">JOIN</a>
</div>

<div class="card">
  <div class="ic fb">f</div>
  <div class="txt"><b>Follow on Facebook</b><span>Reward: +20 <span class="notranslate">RUPPY</span></span></div>
  <a class="bt" id="fbBtn">FOLLOW</a>
</div>

<div class="card">
  <div class="ic x">X</div>
  <div class="txt"><b>Follow on X</b><span>Reward: +20 <span class="notranslate">RUPPY</span></span></div>
  <a class="bt" id="xBtn">FOLLOW</a>
</div>

<div class="nav">
  <div class="nav-item" onclick="goPage('app.html')">

  <div class="nav-item" onclick="goPage('referral.html')">

  </div>
</div>

<!-- Google Translate - World Language Support ✅ -->
<div id="google_translate_element" style="display:none;"></div>
<script>
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'en',
    autoDisplay: false
  }, 'google_translate_element');

  // Saved Language Auto Apply कर
  const savedCode = localStorage.getItem('ruppy_language_code');
  if(savedCode && savedCode!== 'en') {
    setTimeout(() => {
      const select = document.querySelector('.goog-te-combo');
      if(select) {
        select.value = savedCode;
        select.dispatchEvent(new Event('change'));
      }
    }, 1000);
  }
}
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
let userData = JSON.parse(localStorage.getItem('ruppy_user')) || {
  name: 'User',
  balance: 0,
  lastMine: 0,
  lastGift: 0,
  boostCount: 0,
  boostResetTime: Date.now(),
  team: []
};

let taskState = JSON.parse(localStorage.getItem('taskState')) || {};
let openedTask = null;

document.getElementById('userId').innerText = `ID: ${userData.name.toUpperCase()}`;
document.getElementById('bal').innerText = userData.balance;
updateButtons();

// ===== MONETAG AD FUNCTION ✅ Added =====
function showMonetagAd(callback) {
  if(typeof window._ZH!== 'undefined' && window._ZH.show){
    window._ZH.show().then(() => {
      callback();
    }).catch(() => {
      callback();
    });
  } else {
    setTimeout(() => {
      callback();
    }, 1000);
  }
}

document.addEventListener('visibilitychange', function() {
  if (!document.hidden && openedTask) {
    taskState[openedTask] = 'ready_to_claim';
    localStorage.setItem('taskState', JSON.stringify(taskState));
    openedTask = null;
    updateButtons();
  }
});

function openLink(task, url) {
  window.open(url, '_blank');
  openedTask = task;
  taskState[task] = 'opened';
  localStorage.setItem('taskState', JSON.stringify(taskState));
  updateButtons();
}

// ===== UPDATED: Ad लग गया Claim से पहले ✅ =====
function claimReward(task) {
  if (taskState[task] === 'ready_to_claim') {
    showMonetagAd(() => {
      userData.balance += 20;
      taskState[task] = 'claimed';
      localStorage.setItem('ruppy_user', JSON.stringify(userData));
      localStorage.setItem('taskState', JSON.stringify(taskState));
      document.getElementById('bal').innerText = userData.balance;
      updateButtons();
      alert('+20 RUPPY Claimed!');
    });
  }
}

function updateButtons() {
  const tasks = [
    {id: 'tg', url: 'https://t.me/RUPPYfoundation', text: 'JOIN'},
    {id: 'fb', url: 'https://www.facebook.com/share/1PjMyFivNF/?mibextid=wwXIfr', text: 'FOLLOW'},
    {id: 'x', url: 'https://x.com/rupfoundation?s=21', text: 'FOLLOW'}
  ];

  tasks.forEach(t => {
    let btn = document.getElementById(t.id + 'Btn');
    if (taskState[t.id] === 'opened') {
      btn.innerText = 'OPENED';
      btn.className = 'bt opened';
      btn.onclick = null;
    } else if (taskState[t.id] === 'ready_to_claim') {
      btn.innerText = 'CLAIM';
      btn.className = 'bt claim';
      btn.onclick = () => claimReward(t.id);
    } else if (taskState[t.id] === 'claimed') {
      btn.innerText = 'DONE';
      btn.className = 'bt done';
      btn.onclick = null;
    } else {
      btn.innerText = t.text;
      btn.className = 'bt';
      btn.onclick = () => openLink(t.id, t.url);
    }
  });
}

function goPage(page) {
  window.location.href = page;
}

window.addEventListener('storage', function(e) {
  if (e.key === 'ruppy_user') {
    userData = JSON.parse(e.newValue);
    document.getElementById('bal').innerText = userData.balance;
    document.getElementById('userId').innerText = `ID: ${userData.name.toUpperCase()}`;
  }
});
</script>
</body>
</html>
