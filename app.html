<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruppy Network - App</title>
  
  <!-- Monetag Vignette SDK - Zone 10925298 -->
  <script>
    const MONETAG_ZONE = '10925298';
    window.monetagReady = false;
    
    (function(s){
      s.dataset.zone='10925298';
      s.src='https://n6wxm.com/vignette.min.js';
      s.onload = () => { 
        window.monetagReady = true; 
        console.log('Vignette Ready');
        document.querySelectorAll('.ad-btn').forEach(btn => btn.disabled = false);
      };
      s.onerror = () => { 
        console.log('Vignette Failed - Free Mode ON');
        window.monetagReady = true;
        document.querySelectorAll('.ad-btn').forEach(btn => btn.disabled = false);
      };
      [document.documentElement, document.body].filter(Boolean).pop().appendChild(s);
    })(document.createElement('script'));
    
    function showAdAndReward(rewardFunction, rewardAmount) {
      let buttons = document.querySelectorAll('.ad-btn');
      buttons.forEach(btn => btn.disabled = true);
      
      if (typeof show_10925298 === 'function') {
        show_10925298().then(() => {
          rewardFunction();
          showToast(`+${rewardAmount} RUP Claimed!`);
          buttons.forEach(btn => btn.disabled = false);
        }).catch(() => {
          rewardFunction();
          showToast(`+${rewardAmount} RUP Claimed!`);
          buttons.forEach(btn => btn.disabled = false);
        });
      } else {
        rewardFunction();
        showToast(`+${rewardAmount} RUP Claimed!`);
        buttons.forEach(btn => btn.disabled = false);
      }
    }
  </script>
  
  <script type="module" src="config.js"></script>
  
  <style>
    * {margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif;}
    body {background:#000; color:#fff; min-height:100vh; padding-bottom:80px;}
    .header {padding:20px 15px 10px; display:flex; align-items:center; gap:12px;}
    .header .dp {width:40px; height:40px; border-radius:50%; background:#1a1a1a; display:flex; align-items:center; justify-content:center; font-size:18px; overflow:hidden; border:1px solid #333;}
    .header .dp img {width:100%; height:100%; object-fit:cover;}
    .header .info h3 {font-size:16px; font-weight:500;}
    .header .info p {font-size:12px; color:#888;}
    .balance-card {margin:15px; background:#0d0d0d; border:1px solid #222; border-radius:12px; padding:20px;}
    .balance-card p:first-child {color:#888; font-size:13px;}
    .balance-card h2 {font-size:32px; margin:5px 0; color:#FFA500; display:flex; align-items:center; gap:8px;}
    .balance-card h2 span {color:#fff; font-size:20px;}
    .r-coin {width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#FFB84D,#F3C774,#D4A017);display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:#000;box-shadow:0 0 12px rgba(243,199,116,0.6),inset 0 2px 4px rgba(255,255,255,0.3);border:1px solid #FFA500;position:relative;flex-shrink:0}
    .r-coin::after {content:'';position:absolute;inset:-2px;border-radius:50%;background:radial-gradient(circle,#FF6B00 0%,transparent 70%);opacity:0.4;filter:blur(3px);z-index:-1}
    .mining-section {margin:30px 0; text-align:center;}
    .mining-circle {width:180px; height:180px; margin:0 auto; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition:0.3s; border:2px solid #FFA500;}
    .mining-circle.ready {background:linear-gradient(135deg, #FFD700, #FFA500); border:none; box-shadow:0 0 25px rgba(255,165,0,0.6);}
    .mining-circle.ready h3 {color:#000;}
    .mining-circle.mining {background:transparent; border:2px solid #FFA500; cursor:not-allowed;}
    .mining-circle.mining h3 {color:#FFA500; font-size:16px; white-space:pre-line; text-align:center;}
    .mining-circle:disabled {opacity:0.5; cursor:not-allowed;}
    .mining-text {text-align:center; margin-top:15px; color:#666; font-size:13px;}
    .grid {display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:25px 15px;}
    .grid-item {background:#0d0d0d; border:1px solid #222; border-radius:12px; padding:18px 12px; text-align:center; cursor:pointer; position:relative;}
    .grid-item:active {transform:scale(0.97);}
    .grid-item:disabled {opacity:0.5; cursor:not-allowed;}
    .grid-item .badge {position:absolute; top:8px; right:8px; background:#FFA500; color:#000; font-size:11px; font-weight:600; min-width:18px; height:18px; border-radius:9px; display:flex; align-items:center; justify-content:center; padding:0 5px;}
    .grid-item .icon {width:35px; height:35px; margin:0 auto 10px; background:#1a1a1a; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:20px;}
    .grid-item h4 {font-size:14px; margin-bottom:4px; color:#FFA500;}
    .grid-item p {font-size:11px; color:#666;}
    .timer-bar {width:100%; height:3px; background:#1a1a1a; border-radius:2px; margin-top:6px; overflow:hidden;}
    .timer-fill {height:100%; background:#FFA500; width:0%; transition:width 1s linear;}
    .modal {position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:999;}
    .modal.active {display:flex;}
    .modal-content {background:#0d0d0d; border:1px solid #333; border-radius:12px; padding:20px; width:90%; max-width:320px;}
    .modal-content h3 {margin-bottom:15px; color:#FFA500; text-align:center;}
    .modal-content p {color:#888; font-size:13px; text-align:center; margin-bottom:15px;}
    .modal-content .boost-step {background:#000; border:1px solid #222; padding:15px; border-radius:8px; margin:10px 0;}
    .modal-content .boost-step h4 {color:#FFA500; margin-bottom:8px;}
    .btn {margin-top:10px; width:100%; padding:12px; background:#FFA500; border:none; border-radius:8px; color:#000; font-weight:600; cursor:pointer;}
    .btn:disabled {background:#333; color:#666; cursor:not-allowed;}
    .close-btn {margin-top:8px; width:100%; padding:10px; background:#1a1a1a; border:1px solid #333; border-radius:8px; color:#888; cursor:pointer;}
    .nav {position:fixed; bottom:0; left:0; right:0; background:#0d0d0d; border-top:1px solid #222; display:flex; justify-content:space-around; padding:8px 0;}
    .nav-item {display:flex; flex-direction:column; align-items:center; gap:3px; color:#666; text-decoration:none; font-size:10px; cursor:pointer; padding:5px 0; width:16.6%;}
    .nav-item.active {color:#FFA500;}
    .nav-item.active::after {content:''; width:30px; height:2px; background:#FFA500; margin-top:2px;}
    .nav-item .icon {font-size:20px;}
    #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #FFA500; padding: 12px 20px; border-radius: 8px; border: 1px solid #FFA500; display: none; z-index: 1000; font-size: 14px; }
    .loading-text {color:#FFA500; font-size:12px; text-align:center; margin-top:10px;}
  </style>
  
</head>
<body>

  <div class="header">
    <div class="dp" id="userDp">👤</div>
    <div class="info">
      <h3 id="userName">Welcome back, User</h3>
      <p>Keep playing to collect more</p>
    </div>
  </div>

  <div class="balance-card">
    <p>TOTAL BALANCE</p>
    <h2 id="balance"><div class="r-coin">R</div> 0 <span>RUP</span></h2>
  </div>

  <div class="mining-section">
    <button class="mining-circle ready ad-btn" id="miningCircle" disabled>
      <h3 id="miningText">LOADING AD...</h3>
    </button>
    <p class="mining-text">Watch ad to collect 40 RUP • Available every 3 hours</p>
  </div>

  <div class="grid">
    <button class="grid-item ad-btn" id="boostBtn" disabled>
      <div class="badge" id="boostBadge">0/3</div>
      <div class="icon">🖥️</div>
      <h4>COLLECT BONUS</h4>
      <p id="boostTimer">10% Bonus Available</p>
      <div class="timer-bar"><div class="timer-fill" id="boostBar"></div></div>
    </button>
    <button class="grid-item ad-btn" id="giftBtn" disabled>
      <div class="badge" id="giftBadge">✓</div>
      <div class="icon" style="background:#6a5acd;">🎁</div>
      <h4 style="color:#fff;">ULTRA GIFT</h4>
      <p id="giftTimer">Ready → +10 RUP</p>
      <div class="timer-bar"><div class="timer-fill" id="giftBar"></div></div>
    </button>
    <button class="grid-item ad-btn" id="firstRewardBtn" disabled>
      <div class="badge" id="firstRewardBadge" style="display:none;background:#00ff00;">READY</div>
      <div class="icon" style="background:#FF6B35;">⚡</div>
      <h4 style="color:#fff;">FIRST REWARD</h4>
      <p id="firstRewardTimer">Next in 01:00:00</p>
      <div class="timer-bar"><div class="timer-fill" id="firstRewardBar"></div></div>
    </button>
    <button class="grid-item ad-btn" id="ultraRewardBtn" disabled>
      <div class="badge" id="ultraRewardBadge" style="display:none;background:#00ff00;">READY</div>
      <div class="icon" style="background:#8B5CF6;">💎</div>
      <h4 style="color:#fff;">ULTRA REWARD</h4>
      <p id="ultraRewardTimer">Next in 01:00:00</p>
      <div class="timer-bar"><div class="timer-fill" id="ultraRewardBar"></div></div>
    </button>
  </div>

  <div class="modal" id="boostModal">
    <div class="modal-content">
      <h3>🚀 COLLECT BONUS</h3>
      <p>Watch ads to collect extra RUP</p>
      <div class="boost-step">
        <h4>Step <span id="boostStep">1</span>/3</h4>
        <p id="boostStepText">Watch ad for 10% bonus</p>
      </div>
      <button class="btn ad-btn" id="boostModalBtn" disabled>Watch Ad for Bonus</button>
      <button class="close-btn" id="closeBoostModal">Close</button>
    </div>
  </div>

  <div class="nav">
    <div class="nav-item active" data-page="home">
      <div class="icon">🏠</div>
      <span>Home</span>
    </div>
    <div class="nav-item" data-page="tasks">
      <div class="icon">📋</div>
      <span>Tasks</span>
    </div>
    <div class="nav-item" data-page="referral">
      <div class="icon">👥</div>
      <span>Referral</span>
    </div>
    <div class="nav-item" data-page="ranking">
      <div class="icon">🏆</div>
      <span>Ranking</span>
    </div>
    <div class="nav-item" data-page="community">
      <div class="icon">📝</div>
      <span>Feed</span>
    </div>
    <div class="nav-item" data-page="settings">
      <div class="icon">⚙️</div>
      <span>Settings</span>
    </div>
  </div>

  <div id="toast"></div>

<script type="module">
  let userData;
  const MINING_REWARD = 40;
  
  async function waitForUserData() {
    let attempts = 0;
    while(!window.userData?.uid && attempts < 50) {
      await new Promise(r => setTimeout(r, 100));
      attempts++;
    }
    userData = window.userData;
  }

  function showToast(msg) {
    let toast = document.getElementById('toast');
    toast.innerText = msg;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 3000);
  }

  function doMining() {
    let now = Date.now();
    let lastMine = Number(userData.lastMine) || 0;
    if(now - lastMine < 10800000 && lastMine !== 0) return;
    
    userData.balance = Number(userData.balance) || 0;
    userData.balance += MINING_REWARD;
    userData.lastMine = now;
    saveRuppyData(userData);
    updateBalance();
    updateMiningCircle();
    
    if(window.logMineEvent) window.logMineEvent(MINING_REWARD);
  }

  function doBoost() {
    if(userData.boostCount >= 3) return;
    let boostAmount = Math.floor(MINING_REWARD * 0.10);
    userData.balance = Number(userData.balance) || 0;
    userData.balance += boostAmount;
    userData.boostCount++;
    saveRuppyData(userData);
    updateBalance();
    updateBoost();
    
    if(window.logMineEvent) window.logMineEvent(boostAmount);
    
    if(userData.boostCount >= 3) {
      document.getElementById('boostModalBtn').innerText = 'All Claimed!';
      document.getElementById('boostModalBtn').disabled = true;
      setTimeout(closeBoostModal, 1500);
    } else {
      document.getElementById('boostStep').innerText = userData.boostCount + 1;
    }
  }

  function doGift() {
    let now = Date.now();
    let lastGift = Number(userData.lastGift) || 0;
    if(now - lastGift < 7200000 && lastGift !== 0) return;
    
    userData.balance = Number(userData.balance) || 0;
    userData.balance += 10;
    userData.lastGift = now;
    saveRuppyData(userData);
    updateBalance();
    updateGift();
    
    if(window.logMineEvent) window.logMineEvent(10);
  }

  function doFirstReward() {
    if(Date.now() >= userData.firstRewardTime || userData.firstRewardTime === 0){
      userData.balance = Number(userData.balance) || 0;
      userData.balance += 15;
      userData.firstRewardTime = Date.now() + 3600000;
      saveRuppyData(userData);
      updateBalance();
      updateFirstReward();
      
      if(window.logMineEvent) window.logMineEvent(15);
    }
  }

  function doUltraReward() {
    if(Date.now() >= userData.ultraRewardTime || userData.ultraRewardTime === 0){
      userData.balance = Number(userData.balance) || 0;
      userData.balance += 20;
      userData.ultraRewardTime = Date.now() + 3600000;
      saveRuppyData(userData);
      updateBalance();
      updateUltraReward();
      
      if(window.logMineEvent) window.logMineEvent(20);
    }
  }

  document.getElementById('miningCircle').onclick = () => showAdAndReward(doMining, 40);
  document.getElementById('boostBtn').onclick = openBoostModal;
  document.getElementById('boostModalBtn').onclick = () => showAdAndReward(doBoost, Math.floor(MINING_REWARD * 0.10));
  document.getElementById('closeBoostModal').onclick = closeBoostModal;
  document.getElementById('giftBtn').onclick = () => showAdAndReward(doGift, 10);
  document.getElementById('firstRewardBtn').onclick = () => showAdAndReward(doFirstReward, 15);
  document.getElementById('ultraRewardBtn').onclick = () => showAdAndReward(doUltraReward, 20);

  document.querySelectorAll('.nav-item').forEach(item => {
    item.onclick = () => {
      const page = item.dataset.page;
      if(page === 'tasks') window.location.href = 'tasks.html';
      if(page === 'referral') window.location.href = 'referral.html';
      if(page === 'ranking') window.location.href = 'ranking.html';
      if(page === 'community') window.location.href = 'community.html';
      if(page === 'settings') window.location.href = 'settings.html';
    };
  });

  function openBoostModal() {
    if(userData.boostCount >= 3) {
      showToast('You watched 3 ads already. Try again after 3 hours.');
      return;
    }
    document.getElementById('boostStep').innerText = userData.boostCount + 1;
    document.getElementById('boostStepText').innerText = 'Watch ad for 10% bonus';
    document.getElementById('boostModal').classList.add('active');
  }

  function closeBoostModal() {
    document.getElementById('boostModal').classList.remove('active');
  }

  function updateBalance() {
    document.getElementById('balance').innerHTML = '<div class="r-coin">R</div> ' + Number(userData.balance) + ' <span>RUP</span>';
  }

  function updateMiningCircle() {
    let now = Date.now();
    let lastMine = Number(userData.lastMine) || 0;
    let diff = now - lastMine;
    let cooldown = 10800000;
    
    let circle = document.getElementById('miningCircle');
    let text = document.getElementById('miningText');
    
    if(diff >= cooldown || lastMine === 0) {
      circle.className = 'mining-circle ready ad-btn';
      text.innerText = 'WATCH AD FOR BONUS';
      if(window.monetagReady) circle.disabled = false;
    } else {
      let remaining = cooldown - diff;
      let hrs = Math.floor(remaining / 3600000);
      let mins = Math.floor((remaining % 3600000) / 60000);
      let secs = Math.floor((remaining % 60000) / 1000);
      
      circle.className = 'mining-circle mining ad-btn';
      text.innerText = 'Next in\n' + String(hrs).padStart(2,'0') + ':' + String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
      circle.disabled = true;
    }
  }

  function updateBoost() {
    let now = Date.now();
    userData.boostResetTime = Number(userData.boostResetTime) || now;
    userData.boostCount = Number(userData.boostCount) || 0;
    
    if(now - userData.boostResetTime > 10800000) {
      userData.boostCount = 0;
      userData.boostResetTime = now;
      saveRuppyData(userData);
    }
    
    document.getElementById('boostBadge').innerText = userData.boostCount + '/3';
    
    if(userData.boostCount >= 3) {
      let resetIn = 10800000 - (now - userData.boostResetTime);
      let h = Math.floor(resetIn / 3600000);
      let m = Math.floor((resetIn % 3600000) / 60000);
      let s = Math.floor((resetIn % 60000) / 1000);
      document.getElementById('boostTimer').innerText = 'Reset in ' + h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
      document.getElementById('boostBar').style.width = '100%';
      document.getElementById('boostBadge').style.background = '#00ff00';
    } else {
      document.getElementById('boostTimer').innerText = '10% Bonus Available';
      document.getElementById('boostBar').style.width = (userData.boostCount / 3 * 100) + '%';
      document.getElementById('boostBadge').style.background = '#FFA500';
    }
  }

  function updateGift() {
    let now = Date.now();
    let lastGift = Number(userData.lastGift) || 0;
    let diff = now - lastGift;
    let cooldown = 7200000;
    
    if(diff >= cooldown || lastGift === 0) {
      document.getElementById('giftTimer').innerText = 'Ready → +10 RUP';
      document.getElementById('giftBadge').innerText = '✓';
      document.getElementById('giftBadge').style.background = '#00ff00';
      document.getElementById('giftBar').style.width = '100%';
    } else {
      let remaining = cooldown - diff;
      let hrs = Math.floor(remaining / 3600000);
      let mins = Math.floor((remaining % 3600000) / 60000);
      let secs = Math.floor((remaining % 60000) / 1000);
      document.getElementById('giftTimer').innerText = 'Next in ' + String(hrs).padStart(2,'0') + ':' + String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
      document.getElementById('giftBadge').innerText = '⏱';
      document.getElementById('giftBadge').style.background = '#666';
      
      let percent = ((cooldown - remaining) / cooldown) * 100;
      document.getElementById('giftBar').style.width = percent + '%';
    }
  }

  function updateFirstReward() {
    let now = Date.now();
    let diff = userData.firstRewardTime - now;
    
    if(diff <= 0 || userData.firstRewardTime === 0){
      document.getElementById('firstRewardTimer').innerText = 'Claim 15 RUP';
      document.getElementById('firstRewardBadge').style.display = 'block';
      document.getElementById('firstRewardBar').style.width = '100%';
    } else {
      let h = Math.floor(diff/3600000);
      let m = Math.floor((diff%3600000)/60000);
      let s = Math.floor((diff%60000)/1000);
      document.getElementById('firstRewardTimer').innerText = 'Next in ' + String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
      document.getElementById('firstRewardBadge').style.display = 'none';
      let progress = ((3600000 - diff) / 3600000) * 100;
      document.getElementById('firstRewardBar').style.width = progress + '%';
    }
  }

  function updateUltraReward() {
    let now = Date.now();
    let diff = userData.ultraRewardTime - now;
    
    if(diff <= 0 || userData.ultraRewardTime === 0){
      document.getElementById('ultraRewardTimer').innerText = 'Claim 20 RUP';
      document.getElementById('ultraRewardBadge').style.display = 'block';
      document.getElementById('ultraRewardBar').style.width = '100%';
    } else {
      let h = Math.floor(diff/3600000);
      let m = Math.floor((diff%3600000)/60000);
      let s = Math.floor((diff%60000)/1000);
      document.getElementById('ultraRewardTimer').innerText = 'Next in ' + String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
      document.getElementById('ultraRewardBadge').style.display = 'none';
      let progress = ((3600000 - diff) / 3600000) * 100;
      document.getElementById('ultraRewardBar').style.width = progress + '%';
    }
  }

  function loadProfileEverywhere() {
    const profileDp = document.getElementById('userDp');
    const profileName = document.getElementById('userName');
    
    if (userData.dp) {
      profileDp.innerHTML = '<img src="' + userData.dp + '" alt="DP">';
    } else {
      profileDp.innerHTML = '👤';
    }
    
    profileName.innerText = 'Welcome back, ' + (userData.name || 'User');
  }

  (async function() {
    await waitForUserData();
    
    loadProfileEverywhere();
    
    if(Date.now() - userData.boostResetTime > 10800000) {
      userData.boostCount = 0;
      userData.boostResetTime = Date.now();
      saveRuppyData(userData);
    }
    
    updateBalance();
    updateMiningCircle();
    updateBoost();
    updateGift();
    updateFirstReward();
    updateUltraReward();
    
    setInterval(function() {
      updateMiningCircle();
      updateBoost();
      updateGift();
      updateFirstReward();
      updateUltraReward();
    }, 1000);
  })();
</script>
</body>
</html>
