    * {margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif;}
    body {background:#000; color:#fff; min-height:100vh; padding-bottom:80px;}
    
    .header {padding:20px 15px 10px; display:flex; align-items:center; gap:12px;}
    .header .dp {width:40px; height:40px; border-radius:50%; background:#1a1a1a; display:flex; align-items:center; justify-content:center; font-size:18px; overflow:hidden; border:1px solid #333;}

    .balance-card h2 {font-size:32px; margin:5px 0; color:#FFA500;}
    .balance-card h2 span {color:#fff; font-size:20px;}
    .balance-card p:last-child {color:#666; font-size:12px;}
    
    .mining-section {margin:30px 0; text-align:center;}

    .mining-text {text-align:center; margin-top:15px; color:#666; font-size:13px;}
