<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruppy Network - App</title>
  <style>
    * {margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif;}
    body {background:#0a0a1a; color:#fff; min-height:100vh; padding-bottom:80px;}
    
    .header {padding:20px; display:flex; align-items:center; gap:12px;}
    .header .dp {width:45px; height:45px; border-radius:50%; background:#2a2a4a; display:flex; align-items:center; justify-content:center; font-size:20px; overflow:hidden;}
    .header .dp img {width:100%; height:100%; object-fit:cover;}
    .header .info h3 {font-size:18px; font-weight:600;}
    .header .info p {font-size:13px; color:#8a8aa0;}
    
    .balance-card {margin:0 20px; background:linear-gradient(135deg, #2a2a4a, #1a1a3a); border-radius:16px; padding:20px; text-align:center; border:1px solid #3a3a5a;}
    .balance-card h2 {font-size:32px; margin:8px 0;}
    .balance-card p {color:#8a8aa0; font-size:14px;}
    
    .mining-section {margin:30px 20px; text-align:center;}
    .mining-circle {width:200px; height:200px; margin:0 auto; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition:0.3s; position:relative;}
    .mining-circle.ready {background:linear-gradient(135deg, #FFD700, #FFA500); box-shadow:0 0 30px rgba(255,215,0,0.5);}
    .mining-circle.mining {background:linear-gradient(135deg, #3a3a5a, #2a2a4a); box-shadow:0 0 20px rgba(58,58,90,0.3); cursor:not-allowed;}
    .mining-circle h3 {font-size:24px; margin-bottom:5px;}
    .mining-circle p {font-size:14px; opacity:0.8;}
    
    .grid {display:grid; grid-template-columns:1fr 1fr; gap:15px; margin:30px 20px;}
    .grid-item {background:#1a1a3a; border:1px solid #3a3a5a; border-radius:12px; padding:20px 15px; text-align:center; cursor:pointer; transition:0.2s;}
    .grid-item:active {transform:scale(0.95);}
    .grid-item .icon {font-size:28px; margin-bottom:8px;}
    .grid-item h4 {font-size:15px; margin-bottom:4px;}
    .grid-item p {font-size:12px; color:#8a8aa0;}
    
    .modal {position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:999;}
    .modal.active {display:flex;}
    .modal-content {background:#1a1a3a; border:1px solid #3a3a5a; border-radius:16px; padding:25px; width:90%; max-width:350px; text-align:center;}
    .modal-content h3 {margin-bottom:15px;}
    .team-list {text-align:left; margin:15px 0; max-height:200px; overflow-y:auto;}
    .team-member {padding:10px; background:#0a0a1a; border-radius:8px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;}
    .team-member .online {width:8px; height:8px; background:#00ff00; border-radius:50%; animation:pulse 2s infinite;}
    @keyframes pulse {0%,100%{opacity:1;} 50%{opacity:0.3;}}
    .close-btn {margin-top:15px; padding:10px 25px; background:#3a3a5a; border:none; border-radius:8px; color:#fff; cursor:pointer;}
    
    .nav {position:fixed; bottom:0; left:0; right:0; background:#1a1a3a; border-top:1px solid #3a3a5a; display:flex; justify-content:space-around; padding:10px 0;}
    .nav-item {display:flex; flex-direction:column; align-items:center; gap:4px; color:#8a8aa0; text-decoration:none; font-size:12px; cursor:pointer;}
    .nav-item.active {color:#6a5acd;}
    .nav-item .icon {font-size:22px;}
  </style>
</head>
<body>

  <div class="header">
    <div class="dp" id="userDp">👤</div>
    <div class="info">
      <h3 id="userName">Welcome back, User</h3>
      <p>Keep mining to earn more</p>
    </div>
  </div>

  <div class="balance-card">
    <p>Your Balance</p>
    <h2 id="balance">0 TOKEN</h2>
    <p>Mine every 3 hours to earn</p>
  </div>

  <div class="mining-section">
    <div class="mining-circle ready" id="miningCircle" onclick="startMining()">
      <h3 id="miningText">MINE NOW</h3>
      <p id="miningTimer"></p>
    </div>
  </div>

  <div class="grid">
    <div class="grid-item" onclick="startBoost()">
      <div class="icon">🚀</div>
      <h4>BOOST MINING</h4>
      <p id="boostTimer">Ready</p>
    </div>
    <div class="grid-item" onclick="openGift()">
      <div class="icon">🎁</div>
      <h4>ULTRA GIFT</h4>
      <p id="giftTimer">4 opens left today</p>
    </div>
    <div class="grid-item" onclick="openTeam()">
      <div class="icon">👥</div>
      <h4>Team</h4>
      <p id="teamCount">0 Members</p>
    </div>
    <div class="grid-item" onclick="openWallet()">
      <div class="icon">💰</div>
      <h4>Wallet</h4>
      <p>Check balance</p>
    </div>
  </div>

  <!-- Team Modal -->
  <div class="modal" id="teamModal">
    <div class="modal-content">
      <h3>Your Team</h3>
      <div class="team-list" id="teamList"></div>
      <button class="close-btn" onclick="closeTeam()">Close</button>
    </div>
  </div>

  <div class="nav">
    <div class="nav-item active" onclick="navClick('home')">
      <div class="icon">🏠</div>
      <span>Home</span>
    </div>
    <div class="nav-item" onclick="navClick('tasks')">
      <div class="icon">📋</div>
      <span>Tasks</span>
    </div>
    <div class="nav-item" onclick="navClick('invite')">
      <div class="icon">➕</div>
      <span>Invite</span>
    </div>
    <div class="nav-item" onclick="navClick('profile')">
      <div class="icon">👤</div>
      <span>Profile</span>
    </div>
  </div>

<script>
  // ============ USER DATA ============
  let userData = JSON.parse(localStorage.getItem('ruppy_user')) || {
    name: 'User',
    dp: null,
    balance: 0,
    lastMine: 0,
    lastBoost: 0,
    giftOpens: 0,
    giftDate: new Date().toDateString(),
    team: [
      {name: 'Rahul', online: true},
      {name: 'Priya', online: true},
      {name: 'Amit', online: false}
    ]
  };

  function saveUser() {
    localStorage.setItem('ruppy_user', JSON.stringify(userData));
  }

  // ============ INIT ============
  function init() {
    // Set User Info
    document.getElementById('userName').innerText = `Welcome back, ${userData.name}`;
    if(userData.dp) {
      document.getElementById('userDp').innerHTML = `<img src="${userData.dp}" alt="DP">`;
    }
    
    updateBalance();
    updateMiningCircle();
    updateBoost();
    updateGift();
    updateTeam();
    
    setInterval(() => {
      updateMiningCircle();
      updateBoost();
      updateGift();
    }, 1000);
  }

  function updateBalance() {
    document.getElementById('balance').innerText = `${userData.balance} TOKEN`;
  }

  // ============ MINING ============
  function updateMiningCircle() {
    const now = Date.now();
    const diff = now - userData.lastMine;
    const cooldown = 3 * 60 * 60 * 1000; // 3 hours
    
    const circle = document.getElementById('miningCircle');
    const text = document.getElementById('miningText');
    const timer = document.getElementById('miningTimer');
    
    if(diff >= cooldown || userData.lastMine === 0) {
      circle.className = 'mining-circle ready';
      text.innerText = 'MINE NOW';
      timer.innerText = '';
      circle.onclick = startMining;
    } else {
      const remaining = cooldown - diff;
      const hrs = Math.floor(remaining / 3600000);
      const mins = Math.floor((remaining % 3600000) / 60000);
      const secs = Math.floor((remaining % 60000) / 1000);
      
      circle.className = 'mining-circle mining';
      text.innerText = 'MINING...';
      timer.innerText = `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
      circle.onclick = null;
    }
  }

  function startMining() {
    if(Date.now() - userData.lastMine < 3*60*60*1000 && userData.lastMine !== 0) return;
    
    userData.balance += 10;
    userData.lastMine = Date.now();
    saveUser();
    updateBalance();
    updateMiningCircle();
  }

  // ============ BOOST ============
  function updateBoost() {
    const now = Date.now();
    const diff = now - userData.lastBoost;
    const cooldown = 2 * 60 * 60 * 1000; // 2 hours
    
    if(diff >= cooldown || userData.lastBoost === 0) {
      document.getElementById('boostTimer').innerText = 'Ready';
    } else {
      const remaining = cooldown - diff;
      const hrs = Math.floor(remaining / 3600000);
      const mins = Math.floor((remaining % 3600000) / 60000);
      const secs = Math.floor((remaining % 60000) / 1000);
      document.getElementById('boostTimer').innerText = `Next in ${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    }
  }

  function startBoost() {
    if(Date.now() - userData.lastBoost < 2*60*60*1000 && userData.lastBoost !== 0) return;
    
    userData.balance += 5;
    userData.lastBoost = Date.now();
    saveUser();
    updateBalance();
    updateBoost();
    // कोई Alert नहीं आएगा अब
  }

  // ============ ULTRA GIFT ============
  function updateGift() {
    const today = new Date().toDateString();
    if(userData.giftDate !== today) {
      userData.giftDate = today;
      userData.giftOpens = 0;
      saveUser();
    }
    
    const hour = new Date().getHours();
    const remaining = 4 - userData.giftOpens;
    
    if(remaining > 0) {
      // दिन में ज्यादा Chance: सुबह 8-12, दोपहर 1-5, शाम 6-10, रात 11-3
      let canOpen = false;
      if((hour >= 8 && hour < 12) || (hour >= 13 && hour < 17) || (hour >= 18 && hour < 22) || (hour >= 23 || hour < 3)) {
        canOpen = true;
      }
      document.getElementById('giftTimer').innerText = canOpen ? `${remaining} opens left` : `Next slot soon`;
    } else {
      document.getElementById('giftTimer').innerText = `0 opens left today`;
    }
  }

  function openGift() {
    const remaining = 4 - userData.giftOpens;
    if(remaining <= 0) return;
    
    const hour = new Date().getHours();
    let canOpen = false;
    if((hour >= 8 && hour < 12) || (hour >= 13 && hour < 17) || (hour >= 18 && hour < 22) || (hour >= 23 || hour < 3)) {
      canOpen = true;
    }
    
    if(!canOpen) return;
    
    userData.balance += 20;
    userData.giftOpens++;
    saveUser();
    updateBalance();
    updateGift();
  }

  // ============ TEAM ============
  function updateTeam() {
    const onlineCount = userData.team.filter(m => m.online).length;
    document.getElementById('teamCount').innerText = `${userData.team.length} Members`;
  }

  function openTeam() {
    const list = document.getElementById('teamList');
    list.innerHTML = '';
    userData.team.forEach(member => {
      list.innerHTML += `
        <div class="team-member">
          <span>${member.name}</span>
          ${member.online ? '<div class="online"></div>' : '<span style="font-size:11px;color:#8a8aa0">Offline</span>'}
        </div>
      `;
    });
    document.getElementById('teamModal').classList.add('active');
  }

  function closeTeam() {
    document.getElementById('teamModal').classList.remove('active');
  }

  // ============ WALLET ============
  function openWallet() {
    alert(`Your Wallet Balance: ${userData.balance} TOKEN`);
  }

  // ============ NAV ============
  function navClick(page) {
    if(page === 'tasks') window.location.href = 'tasks.html';
    if(page === 'invite') alert('Invite page coming soon');
    if(page === 'profile') alert('Profile page coming soon');
  }

  init();
</script>

</body>
</html>
