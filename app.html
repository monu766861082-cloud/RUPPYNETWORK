<script>
// SAFE PATCH - NO HINDI - NO DELETION
(function(){
  // Fix 1: Prevent NaN and protect balance
  let ud = JSON.parse(localStorage.getItem('ruppy_user')) || {};
  ud.balance = Number(ud.balance) || 0;
  ud.lastMine = Number(ud.lastMine) || 0;
  ud.lastGift = Number(ud.lastGift) || 0;
  ud.boostCount = Number(ud.boostCount) || 0;
  ud.boostResetTime = Number(ud.boostResetTime) || Date.now();
  localStorage.setItem('ruppy_user', JSON.stringify(ud));

  // Fix 2: Override startMining - works after 3 hours
  window.startMining = function(){
    let userData = JSON.parse(localStorage.getItem('ruppy_user'));
    let now = Date.now();
    let cooldown = 10800000; // 3 hours
    
    userData.lastMine = Number(userData.lastMine) || 0;
    if(now - userData.lastMine < cooldown && userData.lastMine !== 0) return;
    
    userData.balance = Number(userData.balance) || 0;
    userData.balance += 40;
    userData.lastMine = now;
    localStorage.setItem('ruppy_user', JSON.stringify(userData));
    
    document.getElementById('balance').innerHTML = userData.balance + ' <span>RUPPY</span>';
    updateMiningCircle();
  };

  // Fix 3: Override updateMiningCircle - no NaN
  window.updateMiningCircle = function(){
    let userData = JSON.parse(localStorage.getItem('ruppy_user'));
    let now = Date.now();
    let lastMine = Number(userData.lastMine) || 0;
    let diff = now - lastMine;
    let cooldown = 10800000;
    
    let circle = document.getElementById('miningCircle');
    let text = document.getElementById('miningText');
    
    if(diff >= cooldown || lastMine === 0){
      circle.className = 'mining-circle ready';
      text.innerText = 'MINE NOW';
      circle.onclick = startMining;
    } else {
      let remaining = cooldown - diff;
      let hrs = Math.floor(remaining / 3600000);
      let mins = Math.floor((remaining % 3600000) / 60000);
      let secs = Math.floor((remaining % 60000) / 1000);
      
      circle.className = 'mining-circle mining';
      text.innerText = 'Next in\n' + String(hrs).padStart(2,'0') + ':' + String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
      circle.onclick = null;
    }
  };

  // Fix 4: Boost Mining Timer runs below boost option
  window.updateBoost = function(){
    let userData = JSON.parse(localStorage.getItem('ruppy_user'));
    let now = Date.now();
    userData.boostResetTime = Number(userData.boostResetTime) || now;
    userData.boostCount = Number(userData.boostCount) || 0;
    
    if(now - userData.boostResetTime > 10800000){
      userData.boostCount = 0;
      userData.boostResetTime = now;
      localStorage.setItem('ruppy_user', JSON.stringify(userData));
    }
    
    document.getElementById('boostBadge').innerText = userData.boostCount + '/3';
    
    if(userData.boostCount >= 3){
      let resetIn = 10800000 - (now - userData.boostResetTime);
      let h = Math.floor(resetIn / 3600000);
      let m = Math.floor((resetIn % 3600000) / 60000);
      let s = Math.floor((resetIn % 60000) / 1000);
      document.getElementById('boostTimer').innerText = 'Reset in ' + h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
      document.getElementById('boostBar').style.width = '100%';
      document.getElementById('boostBadge').style.background = '#00ff00';
    } else {
      document.getElementById('boostTimer').innerText = 'Watch Ad → +5%';
      document.getElementById('boostBar').style.width = (userData.boostCount / 3 * 100) + '%';
      document.getElementById('boostBadge').style.background = '#FFA500';
    }
  };

  // Fix 5: Protect saveUser from NaN
  window.saveUser = function(){
    let ud = JSON.parse(localStorage.getItem('ruppy_user'));
    ud.balance = Number(ud.balance) || 0;
    localStorage.setItem('ruppy_user', JSON.stringify(ud));
  };

  setTimeout(function(){
    updateMiningCircle();
    updateBoost();
  }, 300);
})();
</script>
