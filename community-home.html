<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RUPPY Community</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}
body{background:#0a0a0a;color:#fff;padding-bottom:70px}
.hub-header{position:sticky;top:0;background:linear-gradient(180deg,#0a0a0a 0%,#0a0a0a 80%,transparent 100%);backdrop-filter:blur(10px);padding:16px 20px;z-index:100;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1a1a}
.hub-logo{display:flex;align-items:center;gap:8px}
.back-arrow{background:none;border:none;color:#FFD700;font-size:24px;cursor:pointer;padding:0 8px 0 0;margin-left:-8px}
.hub-logo h1{font-size:24px;font-weight:800;background:linear-gradient(90deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hub-logo span{font-size:12px;color:#666;background:#1a1a1a;padding:2px 8px;border-radius:10px}
.stats-bar{display:flex;gap:10px;padding:16px 20px;overflow-x:auto}
.stats-bar::-webkit-scrollbar{display:none}
.stat-card{background:linear-gradient(135deg,#1a1a1a,#0d0d0d);border:1px solid #252525;border-radius:16px;padding:12px 16px;min-width:110px;flex-shrink:0;box-shadow:0 4px 10px rgba(0,0,0,0.5)}
.stat-card h3{font-size:20px;font-weight:700;color:#FFD700;margin-bottom:2px}
.stat-card p{font-size:11px;color:#888}
.sub-balance{font-size:10px;color:#555;margin-top:3px}
.create-card{margin:16px 20px;background:#111;border:1px solid #222;border-radius:20px;padding:16px}
.create-top{display:flex;gap:12px;align-items:center;margin-bottom:12px}
.create-avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:16px;overflow:hidden;flex-shrink:0}
.create-avatar img{width:100%;height:100%;object-fit:cover}
.create-card textarea{width:100%;background:#0a0a0a;border:1px solid #222;border-radius:12px;padding:12px;color:#fff;font-size:15px;resize:none;min-height:60px}
.create-actions{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.icon-btn{background:#1a1a1a;border:1px solid #333;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer}
.post-btn{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:10px 24px;color:#000;font-weight:700;font-size:14px;cursor:pointer}
.post-btn:disabled{opacity:0.3;cursor:not-allowed}
.gift-banner{background:#fff3cd;border:1px solid #ffe69c;padding:8px;border-radius:8px;font-size:13px;margin-bottom:10px;color:#664d03;font-weight:600}
#fileInput{display:none}
.post-card{background:#111;border:1px solid #222;border-radius:16px;padding:14px;margin-bottom:12px}
.post-card-head{display:flex;gap:10px;align-items:center;margin-bottom:10px;cursor:pointer}
.post-avatar{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:14px;overflow:hidden}
.post-avatar img{width:100%;height:100%;object-fit:cover}
.post-info h4{font-size:15px;font-weight:700}
.post-info p{font-size:12px;color:#666}
.post-content{margin-bottom:10px;font-size:15px;line-height:1.4}
.post-media img,.post-media video{width:100%;border-radius:12px;margin-top:8px}
.post-actions{display:flex;gap:10px;margin-top:8px}
.like-btn,.comment-btn{background:#FFF9C4;border:2px solid #F4E04D;padding:6px 12px;border-radius:6px;cursor:pointer;font-weight:bold;color:#333}
.like-btn.liked{background:#FFE082;border-color:#FFC107;color:#000}
.claim-btn{background:#81C784;border:none;border-radius:10px;padding:10px 24px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;width:100%;margin-top:10px}
.claim-btn.claimed{background:#333;color:#888;cursor:not-allowed}
.unclaimed-badge{background:#FF6D00;color:#fff;font-size:11px;padding:3px 8px;border-radius:6px;margin-left:8px}
.comment-box{margin-top:10px;padding-top:10px;border-top:1px solid #222;display:none}
.comment-box.active{display:block}
.comment-input-row{display:flex;gap:8px;margin-bottom:10px}
.comment-input-row input{flex:1;background:#0a0a0a;border:1px solid #333;border-radius:8px;padding:8px 12px;color:#fff;font-size:13px}
.comment-send{background:#FFD700;border:none;border-radius:8px;padding:8px 12px;color:#000;font-weight:700;font-size:12px;cursor:pointer}
.comment-list{max-height:150px;overflow-y:auto}
.comment-item{background:#0a0a0a;border-radius:8px;padding:8px;margin-bottom:6px;font-size:13px}
.comment-item b{color:#FFD700}
.ruppy-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:1px solid #222;height:65px;display:flex;justify-content:space-around;align-items:center;z-index:999}
.nav-btn{background:none;border:none;color:#FFE55C;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;opacity:0.7;font-size:10px;text-decoration:none}
.nav-btn.active{color:#FFD700;opacity:1}
.nav-btn svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2}
</style>
</head>
<body>
<div class="hub-header">
  <div class="hub-logo"><button class="back-arrow" onclick="history.back()">←</button><h1>RUPPY</h1><span>HUB</span></div>
</div>
<div class="stats-bar">
    <div class="stat-card"><h3 id="totalPosts">0</h3><p>Total Posts</p></div>
    <div class="stat-card"><h3 id="totalLikes">0</h3><p>Total Likes</p></div>
    <div class="stat-card">
      <h3 id="myRewards">0</h3>
      <p>My Reward</p>
      <div class="sub-balance">Total Balance: <span id="totalBalance">0</span></div>
    </div>
</div>
<div class="create-card">
  <div class="gift-banner" id="giftBanner">🎁 +10 RUPPY Token per post | <span id="limitText">3/3 left</span></div>
  <div class="create-top">
    <div class="create-avatar" id="userAvatar">U</div>
    <textarea id="postText" placeholder="Create Post..." rows="2"></textarea>
  </div>
  <div class="create-actions">
    <div style="display:flex;gap:12px">
      <button class="icon-btn" id="fileBtn">📷</button>
      <button class="icon-btn" id="emojiBtn">😊</button>
    </div>
    <button class="post-btn" id="postBtn">Post</button>
  </div>
  <input type="file" id="fileInput" accept="image/*,video/*">
  <div id="preview" style="margin-top:12px;border-radius:12px;overflow:hidden;display:none"></div>
</div>
<div id="feed" style="padding:0 20px 20px"></div>
<div class="ruppy-nav">
  <a href="community-home.html" class="nav-btn active">
    <svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 22"></polyline></svg>
    <span>Home</span>
  </a>
  <a href="community-friend.html" class="nav-btn">
    <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
    <span>Friend</span>
  </a>
  <a href="community-notification.html" class="nav-btn">
    <svg viewBox="0 0 24 24"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9H3s3-2 3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    <span>Notif</span>
  </a>
  <a href="community-profile.html" class="nav-btn">
    <svg viewBox="0 0 24 24"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    <span>Profile</span>
  </a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQC0WsVPr63y2xvFMSifnkjAB3TTVcIxU",
  authDomain: "ruppynetwork-50362.firebaseapp.com",
  databaseURL: "https://ruppynetwork-50362-default-rtdb.firebaseio.com",
  projectId: "ruppynetwork-50362",
  storageBucket: "ruppynetwork-50362.firebasestorage.app",
  messagingSenderId: "132064610854",
  appId: "1:132064610854:web:3c217eaf3618007f5934e7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let userData = JSON.parse(localStorage.getItem('ruppy_user')) || {
  name: 'User',dp: null,balance: 0,lastMine: 0,lastGift: 0,boostCount: 0,
  boostResetTime: Date.now(),firstRewardTime: 0,ultraRewardTime: 0,
  bio:'Living life...',city:'Not Set',hometown:'Not Set',rel:'Single',
  work:'Not Set',edu:'Not Set',hobbies:'Not Set',postsToday:0,lastPostDate:''
};

userData.balance = Number(userData.balance);
if (isNaN(userData.balance)) userData.balance = 0;

let posts = [];
const uid = userData.name;
let selectedFile=null;

onValue(ref(db, 'users/' + uid), (snapshot) => {
  if(snapshot.exists()){
    let fbData = snapshot.val();
    userData = {...userData,...fbData};
    localStorage.setItem('ruppy_user', JSON.stringify(userData));
  }
  loadUI();
});

onValue(ref(db, 'posts'), (snapshot) => {
  posts = [];
  if(snapshot.exists()){
    snapshot.forEach((child) => {
      posts.push({id: child.key,...child.val()});
    });
    posts.reverse();
  }
  renderFeed();
});

function updatePostLimit() {
  const today = new Date().toISOString().split('T')[0];
  if (userData.lastPostDate!== today) {
    userData.postsToday = 0;
    userData.lastPostDate = today;
    update(ref(db, 'users/' + uid), {postsToday: 0, lastPostDate: today});
    localStorage.setItem('ruppy_user', JSON.stringify(userData));
  }
  let left = 3 - userData.postsToday;
  document.getElementById('limitText').innerText = `${left}/3 left`;
  document.getElementById('myRewards').innerText = userData.balance || 0;
  document.getElementById('totalBalance').innerText = userData.balance || 0;

  if (userData.postsToday >= 3) {
    document.getElementById('postBtn').disabled = true;
    document.getElementById('postBtn').innerText = 'Daily limit reached 3/3';
    document.getElementById('giftBanner').innerHTML = '🎁 Daily limit reached. Come back tomorrow';
  } else {
    document.getElementById('postBtn').disabled =!document.getElementById('postText').value.trim() &&!selectedFile;
    document.getElementById('postBtn').innerText = `Post`;
    document.getElementById('giftBanner').innerHTML = `🎁 +10 RUPPY Token per post | <span id="limitText">${left}/3 left</span>`;
  }
}

function loadUI(){
  document.getElementById('userAvatar').innerText = userData.name[0];
  if(userData.dp){
    document.getElementById('userAvatar').innerHTML = `<img src="${userData.dp}">`;
  }
  updatePostLimit();
}

function createPost(){
  let t=document.getElementById('postText').value.trim();
  if(!t&&!selectedFile)return;

  const today = new Date().toISOString().split('T')[0];
  if (userData.lastPostDate === today && userData.postsToday >= 3) {
    alert("Daily limit of 3 posts reached. Come back tomorrow.");
    return;
  }

  let p={
    user: userData.name,photo: userData.dp,text: t,likes: 0,
    likedBy: [],time: Date.now(),claimed: false,uid: uid,comments: []
  };

  if(selectedFile){
    let r=new FileReader();
    r.onload=function(e){
      p.media=e.target.result;
      p.mediaType=selectedFile.type.includes('video')?'video':'image';
      savePost(p)
    };
    r.readAsDataURL(selectedFile)
  } else {
    savePost(p)
  }
}

function savePost(p){
  const today = new Date().toISOString().split('T')[0];
  userData.postsToday = userData.lastPostDate === today? (userData.postsToday + 1) : 1;
  userData.lastPostDate = today;

  push(ref(db, 'posts'), p);
  update(ref(db, 'users/' + uid), {
    postsToday: userData.postsToday,
    lastPostDate: today
  });

  localStorage.setItem('ruppy_user', JSON.stringify(userData));
  document.getElementById('postText').value='';
  document.getElementById('preview').style.display='none';
  document.getElementById('preview').innerHTML='';
  document.getElementById('fileInput').value='';
  selectedFile=null;
  updatePostLimit();
}

function renderFeed(){
  let f=document.getElementById('feed');
  if(posts.length===0){f.innerHTML=`<div style="padding:40px;text-align:center;color:#666">No posts yet</div>`;return}
  f.innerHTML='';
  let totalLikes = 0;
  posts.forEach((p)=>{
    totalLikes += p.likes || 0;
    let m='';
    if(p.media){
      if(p.mediaType==='video'){m=`<div class="post-media"><video src="${p.media}" controls></video></div>`}
      else{m=`<div class="post-media"><img src="${p.media}"></div>`}
    }
    let isLiked = p.likedBy && p.likedBy.includes(uid);
    let claimBtn = '';
    if(p.uid === uid){
      if(!p.claimed){
        claimBtn = `<button class="claim-btn" data-id="${p.id}">Claim +10 Token</button>`;
      } else {
        claimBtn = `<button class="claim-btn claimed" disabled>Claimed ✓</button>`;
      }
    }
    let unclaimedTag = (p.uid === uid &&!p.claimed)? `<span class="unclaimed-badge">Unclaimed</span>` : '';
    let commentsHTML = '';
    if(p.comments && p.comments.length > 0){
      p.comments.forEach(c=>{
        commentsHTML += `<div class="comment-item"><b>${c.user}:</b> ${c.text}</div>`;
      });
    }
    f.innerHTML += `<div class="post-card">
      <div class="post-card-head" data-uid="${p.uid}" data-user="${p.user}">
        <div class="post-avatar">${p.photo?`<img src="${p.photo}">`:p.user[0]}</div>
        <div class="post-info"><h4>${p.user} ${unclaimedTag}</h4><p>now</p></div>
      </div>
      ${p.text?`<div class="post-content">${p.text}</div>`:''}${m}
      ${claimBtn}
      <div class="post-actions">
        <button class="like-btn ${isLiked?'liked':''}" data-id="${p.id}"><b>Like</b> ❤️ ${p.likes||0}</button>
        <button class="comment-btn" data-id="${p.id}"><b style="color:#333">Comment</b> 💬 ${p.comments?p.comments.length:0}</button>
      </div>
      <div class="comment-box" id="cbox-${p.id}">
        <div class="comment-input-row">
          <input type="text" id="cinp-${p.id}" placeholder="Write a comment...">
          <button class="comment-send" data-id="${p.id}">Send</button>
        </div>
        <div class="comment-list">${commentsHTML}</div>
      </div>
    </div>`;
  });
  document.getElementById('totalPosts').innerText = posts.length;
  document.getElementById('totalLikes').innerText = totalLikes;

  // Attach events after render
  document.querySelectorAll('.claim-btn:not(.claimed)').forEach(btn=>{
    btn.addEventListener('click',function(){claimReward(this.dataset.id)})
  });
  document.querySelectorAll('.like-btn').forEach(btn=>{
    btn.addEventListener('click',function(){likePost(this.dataset.id)})
  });
  document.querySelectorAll('.comment-btn').forEach(btn=>{
    btn.addEventListener('click',function(){openComment(this.dataset.id)})
  });
  document.querySelectorAll('.comment-send').forEach(btn=>{
    btn.addEventListener('click',function(){addComment(this.dataset.id)})
  });
  document.querySelectorAll('.post-card-head').forEach(el=>{
    el.addEventListener('click',function(){
      if(this.dataset.uid === uid) location.href='community-profile.html';
      else alert('View profile: '+this.dataset.user);
    })
  });
}

function claimReward(postId){
  let post = posts.find(p => p.id === postId);
  if(!post || post.claimed) return;
  userData.balance = Number(userData.balance) || 0;
  userData.balance += 10;
  update(ref(db, 'posts/' + postId), {claimed: true});
  update(ref(db, 'users/' + uid), {balance: userData.balance});
  localStorage.setItem('ruppy_user', JSON.stringify(userData));
  alert("You claimed 10 Tokens! 🎉");
}

function openComment(id){
  let box = document.getElementById('cbox-'+id);
  box.classList.toggle('active');
}

function addComment(id){
  let inp = document.getElementById('cinp-'+id);
  let txt = inp.value.trim();
  if(!txt) return;
  let post = posts.find(p => p.id === id);
  if(!post) return;
  let comments = post.comments || [];
  comments.push({user:userData.name,text:txt});
  update(ref(db, 'posts/' + id), {comments: comments});
  inp.value='';
}

function likePost(id) {
  let post = posts.find(p => p.id === id);
  if(!post) return;
  let likedBy = post.likedBy || [];
  let userIndex = likedBy.indexOf(uid);
  let newLikes = post.likes || 0;
  if(userIndex === -1) {
    newLikes += 1;
    likedBy.push(uid);
  } else {
    newLikes -= 1;
    likedBy.splice(userIndex, 1);
  }
  update(ref(db, 'posts/' + id), {likes: newLikes, likedBy: likedBy});
}

// Button Fix: Wait for DOM then attach events
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('postBtn').addEventListener('click', createPost);

  document.getElementById('emojiBtn').addEventListener('click', function(){
    document.getElementById('postText').value+=' 🔥';
    document.getElementById('postBtn').disabled=false;
  });

  document.getElementById('fileBtn').addEventListener('click', function(){
    document.getElementById('fileInput').click();
  });

  document.getElementById('postText').addEventListener('input',function(){
    if(document.getElementById('postBtn').innerText.includes('limit reached')) return;
    document.getElementById('postBtn').disabled =!this.value.trim() &&!selectedFile;
  });

  document.getElementById('fileInput').addEventListener('change',function(e){
    selectedFile=e.target.files[0];
    if(selectedFile){
      let r=new FileReader();
      r.onload=function(e){
        let p=document.getElementById('preview');
        p.style.display='block';
        p.innerHTML=selectedFile.type.includes('video')?`<video src="${e.target.result}" controls style="width:100%;border-radius:12px"></video>`:`<img src="${e.target.result}" style="width:100%;border-radius:12px">`;
        document.getElementById('postBtn').disabled=false;
      };
      r.readAsDataURL(selectedFile)
    }
  });
});
</script>
</body>
</html>
