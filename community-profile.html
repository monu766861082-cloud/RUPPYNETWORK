<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RUPPY - Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}
body{background:#0a0a0a;color:#fff;padding-bottom:70px}
.profile-cover{width:100%;height:140px;background:linear-gradient(135deg,#FFD700,#FFA500);position:relative}
.profile-dp{width:90px;height:90px;border-radius:24px;background:linear-gradient(135deg,#FFA500,#FFD700);border:4px solid #0a0a0a;position:absolute;bottom:-45px;left:20px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#000;font-size:32px;overflow:hidden}
.profile-dp img{width:100%;height:100%;object-fit:cover}
.profile-info{padding:55px 20px 16px}
.profile-info h2{font-size:24px;font-weight:800;margin-bottom:4px}
.profile-info p{font-size:14px;color:#888;margin-bottom:12px}
.p-detail{display:flex;align-items:center;gap:10px;margin-bottom:10px;color:#ddd;font-size:14px}
.p-detail span.icon{font-size:18px;width:25px}
.profile-posts{padding:0 20px 20px}
.profile-posts h3{font-size:16px;color:#888;margin:20px 0 12px}
.post-card{background:#111;border:1px solid #222;border-radius:16px;padding:14px;margin-bottom:12px}
.post-card-head{display:flex;gap:10px;align-items:center;margin-bottom:10px}
.post-avatar{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:14px;overflow:hidden}
.post-avatar img{width:100%;height:100%;object-fit:cover}
.post-info h4{font-size:15px;font-weight:700}
.post-info p{font-size:12px;color:#666}
.post-content{margin-bottom:10px;font-size:15px;line-height:1.4}
.post-media img,.post-media video{width:100%;border-radius:12px;margin-top:8px}
.ruppy-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:1px solid #222;height:65px;display:flex;justify-content:space-around;align-items:center;z-index:999}
.nav-btn{background:none;border:none;color:#FFE55C;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;opacity:0.7;font-size:10px;text-decoration:none}
.nav-btn.active{color:#FFD700;opacity:1}
.nav-btn svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2}
</style>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
  const firebaseConfig = {apiKey: "AIzaSyDQC0WsVPr63y2xvFMSifnkjAB3TTVcIxU",authDomain: "ruppynetwork-50362.firebaseapp.com",databaseURL: "https://ruppynetwork-50362-default-rtdb.firebaseio.com",projectId: "ruppynetwork-50362",storageBucket: "ruppynetwork-50362.firebasestorage.app",messagingSenderId: "132064610854",appId: "1:132064610854:web:3c217eaf3618007f5934e7"};
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  window.db=db;window.fbRef=ref;window.fbOnValue=onValue;
</script>
</head>
<body>
<div class="profile-cover"><div class="profile-dp" id="main-dp">U</div></div>
<div class="profile-info">
  <h2 id="view-name">User</h2><p id="view-bio">Living life...</p>
  <div class="p-detail"><span class="icon">📍</span> <span id="view-city">Not Set</span></div>
  <div class="p-detail"><span class="icon">🏠</span> <span id="view-hometown">Not Set</span></div>
  <div class="p-detail"><span class="icon">❤️</span> <span id="view-rel">Single</span></div>
  <div class="p-detail"><span class="icon">💼</span> <span id="view-work">Not Set</span></div>
  <div class="p-detail"><span class="icon">🎓</span> <span id="view-edu">Not Set</span></div>
  <div class="p-detail"><span class="icon">🎮</span> <span id="view-hobbies">Not Set</span></div>
  <button onclick="location.href='community-edit.html'" style="width:100%;padding:12px;background:#1a1a1a;border:1px solid #333;color:#FFD700;border-radius:12px;margin-top:20px;font-weight:700">Edit Profile</button>
</div>
<div class="profile-posts"><h3>Your Posts</h3><div id="profileFeed"></div></div>
<div class="ruppy-nav">
  <a href="community-home.html" class="nav-btn"><svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 22"></polyline></svg><span>Home</span></a>
  <a href="community-friend.html" class="nav-btn"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg><span>Friend</span></a>
  <a href="community-notification.html" class="nav-btn"><svg viewBox="0 0 24 24"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9H3s3-2 3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span>Notif</span></a>
  <a href="community-profile.html" class="nav-btn active"><svg viewBox="0 0 24 24"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span>Profile</span></a>
</div>
<script type="module">
let userData = JSON.parse(localStorage.getItem('ruppy_user')) || {name:'User',dp:null,bio:'Living life...',city:'Not Set',hometown:'Not Set',rel:'Single',work:'Not Set',edu:'Not Set',hobbies:'Not Set'};
const uid = userData.name; let posts = [];
fbOnValue(fbRef(db, 'users/' + uid), (s) => {if(s.exists()){userData={...userData,...s.val()};localStorage.setItem('ruppy_user',JSON.stringify(userData))}loadUI()});
fbOnValue(fbRef(db, 'posts'), (s) => {posts=[];if(s.exists()){s.forEach((c)=>{posts.push({id:c.key,...c.val()})});posts.reverse()}renderProfileFeed()});
function loadUI(){document.getElementById('view-name').innerText=userData.name;document.getElementById('view-bio').innerText=userData.bio||'Living life...';document.getElementById('view-city').innerText=userData.city||'Not Set';document.getElementById('view-hometown').innerText=userData.hometown||'Not Set';document.getElementById('view-rel').innerText=userData.rel||'Single';document.getElementById('view-work').innerText=userData.work||'Not Set';document.getElementById('view-edu').innerText=userData.edu||'Not Set';document.getElementById('view-hobbies').innerText=userData.hobbies||'Not Set';document.getElementById('main-dp').innerText=userData.name[0];if(userData.dp){document.getElementById('main-dp').innerHTML=`<img src="${userData.dp}">`}}
function renderProfileFeed(){let f=document.getElementById('profileFeed');let userPosts=posts.filter(p=>p.uid===uid);if(userPosts.length===0){f.innerHTML=`<div style="padding:20px;text-align:center;color:#666">No posts yet</div>`;return}f.innerHTML='';userPosts.forEach((p)=>{let m='';if(p.media){if(p.mediaType==='video'){m=`<div class="post-media"><video src="${p.media}" controls></video></div>`}else{m=`<div class="post-media"><img src="${p.media}"></div>`}}f.innerHTML+=`<div class="post-card"><div class="post-card-head"><div class="post-avatar">${p.photo?`<img src="${p.photo}">`:p.user[0]}</div><div class="post-info"><h4>${p.user}</h4><p>now</p></div></div>${p.text?`<div class="post-content">${p.text}</div>`:''}${m}</div>`})}
</script>
</body>
</html>
