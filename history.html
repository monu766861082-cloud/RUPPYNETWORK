<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>History</title>
<script type="module" src="config.js?v=2"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;padding-bottom:80px}
.hdr{padding:20px;font-size:24px;font-weight:bold;display:flex;align-items:center;gap:12px;border-bottom:1px solid #222}
.back{font-size:24px;cursor:pointer;color:#d4a017}

.bal-top{display:block;width:max-content;margin:16px auto;padding:8px 22px;border:1px solid #24C464;border-radius:999px;color:#24C464;font-weight:600;font-size:16px}

.month-header{padding:16px;display:flex;justify-content:space-between;align-items:center;background:#0a0a0a;border-bottom:1px solid #222}
.month-header.month{font-size:18px;font-weight:600;color:#fff}
.month-header.total-spent{text-align:right}
.month-header.total-spent.label{font-size:11px;color:#999}
.month-header.total-spent.amt{font-size:18px;font-weight:bold;color:#d4a017}

.list{padding:0}
.item{display:flex;justify-content:space-between;align-items:flex-start;padding:16px;border-bottom:1px solid #1a1a1a}
.item:active{background:#0a0a0a}
.left{display:flex;gap:12px;flex:1}
.avatar{width:44px;height:44px;border-radius:50%;background:#222;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold;color:#d4a017;flex-shrink:0}
.avatar.mining{background:#1a4d1a;color:#0f0}
.avatar.referral{background:#4d1a4d;color:#f0f}
.avatar.post{background:#1a1a4d;color:#0ff}
.avatar.leaderboard{background:#4d3a1a;color:#fa0}
.info{flex:1}
.info.name{font-size:15px;font-weight:500;color:#fff;margin-bottom:4px}
.info.date{font-size:12px;color:#666;margin-bottom:6px}
.tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;background:#1a1a1a;border:1px solid #333;color:#999}
.tag.mining{border-color:#0f0;color:#0f0;background:rgba(0,255,0,0.1)}
.tag.referral{border-color:#f0f;color:#f0f;background:rgba(255,0,255,0.1)}
.tag.post{border-color:#0ff;color:#0ff;background:rgba(0,255,255,0.1)}
.tag.leaderboard{border-color:#fa0;color:#fa0;background:rgba(255,170,0,0.1)}
.right{text-align:right}
.right.amount{font-size:18px;font-weight:bold;color:#0f0;margin-bottom:4px}
.right.from{font-size:11px;color:#666}

.no-data{text-align:center;padding:80px 20px;color:#666}
.no-data.icon{font-size:48px;margin-bottom:12px;opacity:0.5}

.nav{position:fixed;bottom:0;left:0;right:0;background:#0d0d0d;border-top:1px solid #222;display:flex;justify-content:space-around;padding:8px 0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:#666;text-decoration:none;font-size:11px;cursor:pointer;padding:5px 0;width:16.6%}
.nav-item.active{color:#FFA500}
.nav-item.icon{font-size:20px}
</style>
</head>
<body>
<div class="hdr">
  <span class="back" onclick="history.back()">←</span>
  Transaction History
</div>

<!-- ✅ ऊपर Balance दिखेगा - Main Page जैसा -->
<div class="bal-top" id="userBalance">0 RUP</div>

<div id="monthContainer"></div>

<div class="list" id="txnList">
  <div class="no-data">
    <div class="icon">⏳</div>
    <div>Loading...</div>
  </div>
</div>

<div class="nav">
  <div class="nav-item" onclick="goPage('app.html')"><div class="icon">🏠</div><span>Home</span></div>
  <div class="nav-item" onclick="goPage('tasks.html')"><div class="icon">📋</div><span>Tasks</span></div>
  <div class="nav-item" onclick="goPage('referral.html')"><div class="icon">👥</div><span>Referral</span></div>
  <div class="nav-item" onclick="goPage('ranking.html')"><div class="icon">🏆</div><span>Ranking</span></div>
  <div class="nav-item" onclick="goPage('community.html')"><div class="icon">📝</div><span>Feed</span></div>
  <div class="nav-item" onclick="goPage('settings.html')"><div class="icon">⚙️</div><span>Settings</span></div>
</div>

<script>
let allTransactions = [];

async function init(){
  let attempts = 0;
  while(!window.userData && attempts < 50) {
    await new Promise(r => setTimeout(r, 100));
    attempts++;
  }
  
  if(!window.userData?.uid){
    document.getElementById('txnList').innerHTML = '<div class="no-data"><div class="icon">🔒</div><div>Please login first</div></div>';
    return;
  }
  
  // ✅ Balance दिखाओ - Main Page जैसा
  document.getElementById('userBalance').innerText = (window.userData.balance || 0) + ' RUP';
  
  allTransactions = await window.getTransactionHistory();
  renderHistory();
}

function renderHistory(){
  const list = document.getElementById('txnList');
  const monthContainer = document.getElementById('monthContainer');
  
  if(allTransactions.length === 0){
    list.innerHTML = '<div class="no-data"><div class="icon">📭</div><div>No transactions yet</div></div>';
    return;
  }
  
  // Group by month + Total Earned
  const grouped = {};
  let totalEarned = 0;
  
  allTransactions.forEach(t => {
    const date = new Date(t.timestamp);
    const monthKey = date.toLocaleString('en-GB', { month: 'long', year: 'numeric' });
    
    if(!grouped[monthKey]) grouped[monthKey] = { items: [], total: 0 };
    grouped[monthKey].items.push(t);
    grouped[monthKey].total += t.amount || 0;
    totalEarned += t.amount || 0;
  });
  
  // Render month header with total earned
  const currentMonth = new Date().toLocaleString('en-GB', { month: 'long', year: 'numeric' });
  monthContainer.innerHTML = `
    <div class="month-header">
      <div class="month">${currentMonth}</div>
      <div class="total-spent">
        <div class="label">Total Earned</div>
        <div class="amt">${totalEarned} RUP</div>
      </div>
    </div>
  `;
  
  // Render transactions
  const avatars = {
    mining: '⛏️',
    referral: '👥',
    post: '📝',
    leaderboard: '🏆',
    gift: '🎁'
  };
  
  const names = {
    mining: 'Mining Reward',
    referral: 'Referral Bonus',
    post: 'Post Reward',
    leaderboard: 'Leaderboard Reward',
    gift: 'Gift Received'
  };
  
  const tags = {
    mining: 'Mining',
    referral: 'Referral',
    post: 'Post',
    leaderboard: 'Leaderboard',
    gift: 'Gift'
  };
  
  list.innerHTML = allTransactions.map(t => {
    const date = new Date(t.timestamp);
    const dateStr = date.toLocaleString('en-GB', {
      day: '2-digit',
      month: 'short',
      hour: '2-digit',
      minute: '2-digit'
    });
    
    const firstLetter = (names[t.type] || 'T').charAt(0);
    
    return `
      <div class="item">
        <div class="left">
          <div class="avatar ${t.type}">${avatars[t.type] || firstLetter}</div>
          <div class="info">
            <div class="name">${names[t.type] || 'Transaction'}</div>
            <div class="date">Earned on ${dateStr}</div>
            <div class="tag ${t.type}">${tags[t.type] || 'Other'}</div>
          </div>
        </div>
        <div class="right">
          <div class="amount">+ ${t.amount} RUP</div>
          <div class="from">From App</div>
        </div>
      </div>
    `;
  }).join('');
}

function goPage(p){ window.location.href = p; }
init();
</script>
</body>
</html>
