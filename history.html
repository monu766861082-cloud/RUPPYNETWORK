<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>History</title>
<script type="module" src="config.js?v=2"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;padding-bottom:80px}
.hdr{padding:20px;font-size:24px;font-weight:bold;display:flex;align-items:center;gap:12px;border-bottom:1px solid #222}
.back{font-size:24px;cursor:pointer;color:#d4a017}

.total-box{margin:16px;padding:24px;border:2px solid #a87128;border-radius:16px;background:#0a0a0a;box-shadow:0 0 15px rgba(168,113,40,0.3);text-align:center}
.total-box .label{color:#999;font-size:13px;margin-bottom:8px;letter-spacing:1px}
.total-box .amt{font-size:42px;font-weight:bold;color:#d4a017}

.list{padding:0 16px}
.item{display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:1px solid #1a1a1a}
.item:last-child{border-bottom:none}
.item .name{font-size:16px;color:#fff}
.item .time{font-size:11px;color:#666;margin-top:4px}
.item .amount{font-size:20px;font-weight:bold;color:#0f0}

.no-data{text-align:center;padding:60px 20px;color:#666}
.no-data .icon{font-size:48px;margin-bottom:12px;opacity:0.5}

.nav{position:fixed;bottom:0;left:0;right:0;background:#0d0d0d;border-top:1px solid #222;display:flex;justify-content:space-around;padding:8px 0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:#666;text-decoration:none;font-size:11px;cursor:pointer;padding:5px 0;width:16.6%}
.nav-item.active{color:#FFA500}
.nav-item .icon{font-size:20px}
</style>
</head>
<body>
<div class="hdr">
  <span class="back" onclick="history.back()">←</span>
  Transaction History
</div>

<div class="total-box">
  <div class="label">TOTAL EARNED</div>
  <div class="amt"><span id="totalEarned">0</span> RUP</div>
</div>

<div class="list" id="txnList">
  <div class="no-data">
    <div class="icon">⏳</div>
    <div>Loading...</div>
  </div>
</div>

<div class="nav">
  <div class="nav-item" onclick="goPage('app.html')"><div class="icon">🏠</div><span>Home</span></div>
  <div class="nav-item" onclick="goPage('tasks.html')"><div class="icon">📋</div><span>Tasks</span></div>
  <div class="nav-item" onclick="goPage('referral.html')"><div class="icon">👥</div><span>Referral</span></div>
  <div class="nav-item" onclick="goPage('ranking.html')"><div class="icon">🏆</div><span>Ranking</span></div>
  <div class="nav-item" onclick="goPage('community.html')"><div class="icon">📝</div><span>Feed</span></div>
  <div class="nav-item" onclick="goPage('settings.html')"><div class="icon">⚙️</div><span>Settings</span></div>
</div>

<script>
let allTransactions = [];

async function init(){
  let attempts = 0;
  while(!window.userData && attempts < 50) {
    await new Promise(r => setTimeout(r, 100));
    attempts++;
  }
  
  if(!window.userData?.uid){
    document.getElementById('txnList').innerHTML = '<div class="no-data"><div class="icon">🔒</div><div>Please login first</div></div>';
    return;
  }
  
  allTransactions = await window.getTransactionHistory();
  updateTotal();
  renderList();
}

function updateTotal(){
  const total = allTransactions.reduce((sum, t) => sum + (t.amount || 0), 0);
  document.getElementById('totalEarned').innerText = total;
}

function renderList(){
  const list = document.getElementById('txnList');
  
  if(allTransactions.length === 0){
    list.innerHTML = '<div class="no-data"><div class="icon">📭</div><div>No transactions yet</div></div>';
    return;
  }
  
  const names = {
    mining: 'Mining Reward',
    referral: 'Referral Bonus',
    post: 'Daily Post Reward',
    leaderboard: 'Leaderboard Reward',
    gift: 'Gift Received'
  };
  
  list.innerHTML = allTransactions.map(t => {
    const date = new Date(t.timestamp);
    const time = date.toLocaleString('en-GB',{
      day:'2-digit',
      month:'short', 
      hour:'2-digit',
      minute:'2-digit'
    });
    
    return `
      <div class="item">
        <div>
          <div class="name">${names[t.type] || 'Transaction'}</div>
          <div class="time">${time}</div>
        </div>
        <div class="amount">+${t.amount} RUP</div>
      </div>
    `;
  }).join('');
}

function goPage(p){ window.location.href = p; }
init();
</script>
</body>
</html>
