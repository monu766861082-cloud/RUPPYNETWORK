<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Feed</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
body{background:#000;color:#fff;padding-bottom:50px}
button{cursor:pointer}

/* Header - Instagram Style */
.ig-header{position:sticky;top:0;background:#000;border-bottom:1px solid #262626;padding:0 16px;height:44px;display:flex;align-items:center;justify-content:space-between;z-index:100}
.ig-logo{font-family:'Billabong',cursive;font-size:28px;font-weight:400}
@font-face{font-family:'Billabong';src:url(https://fonts.gstatic.com/s/billabong/v1/billabong.ttf) format('truetype')}
.ig-header-icons{display:flex;gap:20px;align-items:center}
.ig-icon{font-size:24px;cursor:pointer}

/* Stories - Exact Instagram */
.stories{padding:8px 0 8px 16px;display:flex;gap:16px;overflow-x:auto;border-bottom:1px solid #262626;background:#000}
.stories::-webkit-scrollbar{display:none}
.story-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex-shrink:0}
.story-ring{width:66px;height:66px;border-radius:50%;background:linear-gradient(45deg,#f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);padding:2px;display:flex;align-items:center;justify-content:center}
.story-ring.viewed{background:#363636}
.story-dp{width:100%;height:100%;border-radius:50%;background:#000;border:2px solid #000;display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden}
.story-dp img{width:100%;height:100%;object-fit:cover}
.story-item span{font-size:12px;color:#fff;max-width:66px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.add-story.story-ring{background:#1a1a1a;border:1px solid #363636}

/* Post - Instagram Perfect */
.post{background:#000;border-bottom:1px solid #262626;margin-bottom:0}
.post-head{padding:14px 16px;display:flex;align-items:center;gap:12px}
.post-dp-wrap{width:32px;height:32px;border-radius:50%;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743);padding:2px}
.post-dp{width:100%;height:100%;border-radius:50%;background:#000;border:1.5px solid #000;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px}
.post-user{flex:1}
.post-user h4{font-size:14px;font-weight:600;line-height:18px}
.post-user p{font-size:12px;color:#a8a8a8;line-height:16px}
.post-menu{background:none;border:none;color:#fff;font-size:24px;line-height:1;padding:0;cursor:pointer}

/* Media - Double Tap */
.post-media{position:relative;width:100%;background:#000;max-height:585px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.post-media img{width:100%;height:auto;display:block}
.post-media video{width:100%;height:auto;display:block}
.double-tap-heart{position:absolute;font-size:80px;color:#fff;opacity:0;transform:scale(0);pointer-events:none;text-shadow:0 2px 8px rgba(0,0,0,0.3)}
.double-tap-heart.animate{animation:heartBeat 0.8s ease-out}
@keyframes heartBeat{0%{opacity:0;transform:scale(0)}15%{opacity:1;transform:scale(1.2)}30%{transform:scale(0.95)}45%{transform:scale(1)}100%{opacity:0;transform:scale(1)}}

/* Actions - Instagram Icons */
.post-actions{padding:6px 16px 8px;display:flex;gap:16px;align-items:center}
.action-btn{background:none;border:none;padding:8px 0;cursor:pointer;display:flex;align-items:center}
.action-btn svg{width:24px;height:24px;fill:none;stroke:#fff;stroke-width:1.5}
.action-btn.liked svg{fill:#ed4956;stroke:#ed4956}
.action-btn.save{margin-left:auto}

/* Likes & Caption */
.post-likes{padding:0 16px 8px;font-size:14px;font-weight:600}
.post-caption{padding:0 16px 4px;font-size:14px;line-height:18px}
.post-caption b{font-weight:600;margin-right:4px}
.post-caption span{color:#a8a8a8}
.view-comments{padding:0 16px 4px;font-size:14px;color:#a8a8a8;cursor:pointer}
.post-time{padding:0 16px 12px;font-size:10px;color:#a8a8a8;text-transform:uppercase;letter-spacing:0.2px}

/* Comment Box - Instagram Style */
.comment-box{display:none;border-top:1px solid #262626;max-height:400px;overflow-y:auto}
.comment-item{padding:12px 16px;display:flex;gap:12px}
.comment-dp{width:32px;height:32px;border-radius:50%;background:#F3C774;color:#000;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0}
.comment-content{flex:1}
.comment-content b{font-size:14px;font-weight:600;margin-right:4px}
.comment-content span{font-size:14px;line-height:18px}
.comment-meta{display:flex;gap:16px;margin-top:4px;font-size:12px;color:#a8a8a8}
.comment-meta button{background:none;border:none;color:#a8a8a8;font-size:12px;font-weight:600;cursor:pointer}
.comment-input-bar{padding:12px 16px;border-top:1px solid #262626;display:flex;gap:12px;align-items:center;background:#000}
.comment-input-bar input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:14px}
.comment-input-bar input::placeholder{color:#a8a8a8}
.comment-input-bar button{background:none;border:none;color:#0095f6;font-weight:600;font-size:14px;opacity:0.3;cursor:pointer}
.comment-input-bar button.active{opacity:1}

/* Bottom Nav - Instagram Style */
.ig-nav{position:fixed;bottom:0;left:0;right:0;background:#000;border-top:1px solid #262626;height:50px;display:flex;justify-content:space-around;align-items:center;z-index:999}
.ig-nav-item{padding:12px;cursor:pointer}
.ig-nav-item svg{width:24px;height:24px;fill:none;stroke:#fff;stroke-width:1.5}
.ig-nav-item.active svg{fill:#fff;stroke:#fff}

/* Empty State */
.empty-state{text-align:center;padding:60px 20px}
.empty-state svg{width:96px;height:96px;margin-bottom:20px;stroke:#363636}
.empty-state h3{font-size:22px;font-weight:300;margin-bottom:8px}
.empty-state p{font-size:14px;color:#a8a8a8}

/* Create Post Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:9999}
.modal.show{display:flex}
.modal-box{background:#262626;border-radius:12px;width:90%;max-width:400px;overflow:hidden}
.modal-head{padding:12px 16px;border-bottom:1px solid #363636;text-align:center;font-weight:600;position:relative}
.modal-close{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:28px;line-height:1;cursor:pointer}
.modal-body{padding:20px}
.modal-body textarea{width:100%;background:#121212;border:1px solid #363636;border-radius:8px;padding:12px;color:#fff;font-size:14px;resize:none;font-family:inherit}
.modal-body textarea::placeholder{color:#a8a8a8}
.file-preview{margin-top:12px;border-radius:8px;overflow:hidden;max-height:300px}
.file-preview img,.file-preview video{width:100%;height:auto;display:block}
.modal-btn{width:100%;background:#0095f6;border:none;border-radius:8px;padding:12px;color:#fff;font-weight:600;font-size:14px;margin-top:12px;cursor:pointer}
.modal-btn:disabled{background:#00376b;cursor:not-allowed}
#fileInput{display:none}
</style>
</head>
<body>

<!-- Header -->
<div class="ig-header">
  <div class="ig-logo">RUPPY</div>
  <div class="ig-header-icons">
    <div class="ig-icon" onclick="openCreateModal()">➕</div>
    <div class="ig-icon">💬</div>
  </div>
</div>

<!-- Stories -->
<div class="stories" id="stories">
  <div class="story-item add-story" onclick="openCreateModal()">
    <div class="story-ring"><div class="story-dp">+</div></div>
    <span>Your story</span>
  </div>
  <div class="story-item">
    <div class="story-ring"><div class="story-dp">R</div></div>
    <span>ruppy_official</span>
  </div>
  <div class="story-item">
    <div class="story-ring viewed"><div class="story-dp">T</div></div>
    <span>token_tips</span>
  </div>
  <div class="story-item">
    <div class="story-ring"><div class="story-dp">💰</div></div>
    <span>earnings</span>
  </div>
</div>

<!-- Feed -->
<div id="feed"></div>

<!-- Bottom Nav -->
<div class="ig-nav">
  <a href="app.html" class="ig-nav-item">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
  </a>
  <a href="tasks.html" class="ig-nav-item">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
  </a>
  <a href="referral.html" class="ig-nav-item">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
  </a>
  <a href="ranking.html" class="ig-nav-item">
    <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 0 0 0 0-7.78z"></path></svg>
  </a>
  <a href="community.html" class="ig-nav-item active">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="9" x2="15" y2="9"></line><line x1="9" y1="12" x2="15" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>
  </a>
  <a href="settings.html" class="ig-nav-item">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M12 1v6m0 6v6m11-7h-6m-6 0H1m17-4a4 4 0 1-8 0 4 4 0 0 1 8 0zM7 12a4 4 0 1 1-8 0 4 4 0 0 1 8 0zm10 5a4 4 0 1 1-8 0 4 4 0 0 1 8 0z"></path></svg>
  </a>
</div>

<!-- Create Post Modal -->
<div class="modal" id="createModal">
  <div class="modal-box">
    <div class="modal-head">
      Create new post
      <button class="modal-close" onclick="closeCreateModal()">×</button>
    </div>
    <div class="modal-body">
      <textarea id="postText" rows="4" placeholder="What's on your mind?"></textarea>
      <div class="file-preview" id="filePreview"></div>
      <input type="file" id="fileInput" accept="image/*,video/*">
      <button class="modal-btn" onclick="document.getElementById('fileInput').click()">Select from gallery</button>
      <button class="modal-btn" id="shareBtn" onclick="sharePost()" disabled>Share</button>
    </div>
  </div>
</div>

<script>
// FILTER
const bannedWords = ['sex','porn','xxx','nude','fuck','bitch','chut','lund','randi','gand','boobs','dick','pussy','scam','betting','casino','gambling'];
function checkContent(text){
  let lower = text.toLowerCase();
  return bannedWords.some(word => lower.includes(word));
}

// DATA
let posts = JSON.parse(localStorage.getItem('ruppy_posts') || '[]');
let currentUser = localStorage.getItem('ruppy_username') || 'ruppy_user';

let selectedFile = null;
document.getElementById('fileInput').onchange = function(e){
  selectedFile = e.target.files[0];
  if(selectedFile){
    let reader = new FileReader();
    reader.onload = function(e){
      document.getElementById('filePreview').innerHTML = selectedFile.type.includes('video')
       ? `<video src="${e.target.result}" controls></video>`
        : `<img src="${e.target.result}">`;
      document.getElementById('shareBtn').disabled = false;
    }
    reader.readAsDataURL(selectedFile);
  }
}

function openCreateModal(){
  document.getElementById('createModal').classList.add('show');
}
function closeCreateModal(){
  document.getElementById('createModal').classList.remove('show');
  document.getElementById('postText').value = '';
  document.getElementById('filePreview').innerHTML = '';
  document.getElementById('fileInput').value = '';
  document.getElementById('shareBtn').disabled = true;
  selectedFile = null;
}

function sharePost(){
  let text = document.getElementById('postText').value.trim();
  if(!text &&!selectedFile) return;
  if(checkContent(text)){
    alert('Post contains inappropriate words');
    return;
  }

  let post = {
    id: Date.now(),
    user: currentUser,
    text: text,
    time: Date.now(),
    likes: 0,
    liked: false,
    saved: false,
    comments: [],
    reports: 0
  };

  if(selectedFile){
    let reader = new FileReader();
    reader.onload = function(e){
      post.media = e.target.result;
      post.mediaType = selectedFile.type.includes('video')? 'video' : 'image';
      savePostData(post);
    }
    reader.readAsDataURL(selectedFile);
  } else {
    savePostData(post);
  }
}

function savePostData(post){
  posts.unshift(post);
  localStorage.setItem('ruppy_posts', JSON.stringify(posts));
  closeCreateModal();
  renderFeed();
}

function renderFeed(){
  let feed = document.getElementById('feed');

  if(posts.filter(p => p.reports < 3).length === 0){
    feed.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        <h3>Share Photos</h3>
        <p>When you share photos, they'll appear on your feed.</p>
      </div>`;
    return;
  }

  feed.innerHTML = '';
  posts.filter(p => p.reports < 3).forEach(post => {
    let mediaHTML = '';
    if(post.media){
      if(post.mediaType === 'video'){
        mediaHTML = `<video src="${post.media}" controls></video>`;
      } else {
        mediaHTML = `<img src="${post.media}" ondblclick="likePost(${post.id})">`;
      }
    }

    let timeAgo = getTimeAgo(post.time);

    feed.innerHTML += `
    <div class="post" id="post-${post.id}">
      <div class="post-head">
        <div class="post-dp-wrap"><div class="post-dp">${post.user[0].toUpperCase()}</div></div>
        <div class="post-user">
          <h4>${post.user}</h4>
          <p>${timeAgo}</p>
        </div>
        <button class="post-menu" onclick="showPostOptions(${post.id})">⋯</button>
      </div>

      ${post.media? `<div class="post-media" ondblclick="likePost(${post.id})">
        ${mediaHTML}
        <div class="double-tap-heart" id="heart-${post.id}">❤️</div>
      </div>` : ''}

      <div class="post-actions">
        <button class="action-btn ${post.liked?'liked':''}" onclick="likePost(${post.id})">
          <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0-7.78z"></path></svg>
        </button>
        <button class="action-btn" onclick="toggleComments(${post.id})">
          <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
        </button>
        <button class="action-btn" onclick="sharePostLink(${post.id})">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
        <button class="action-btn save" onclick="savePost(${post.id})">
          <svg viewBox="0 0 24 24"><polygon points="19 21 12 16 5 21 5 3 19 3 19 21" fill="${post.saved?'#fff':'none'}"></polygon></svg>
        </button>
      </div>

      ${post.likes > 0? `<div class="post-likes">${post.likes} likes</div>` : ''}

      ${post.text? `<div class="post-caption"><b>${post.user}</b> ${post.text}</div>` : ''}

      ${post.comments.length > 0? `<div class="view-comments" onclick="toggleComments(${post.id})">View all ${post.comments.length} comments</div>` : ''}

      <div class="post-time">${timeAgo}</div>

      <div class="comment-box" id="comments-${post.id}">
        <div class="comment-list">
          ${post.comments.map(c => `
            <div class="comment-item">
              <div class="comment-dp">${c.user[0].toUpperCase()}</div>
              <div class="comment-content">
                <div><b>${c.user}</b> <span>${c.text}</span></div>
                <div class="comment-meta">
                  <span>${getTimeAgo(c.time)}</span>
                  <button>Reply</button>
                </div>
              </div>
            </div>`).join('')}
        </div>
        <div class="comment-input-bar">
          <input type="text" placeholder="Add a comment..." id="commentInput-${post.id}" oninput="toggleCommentBtn(${post.id})" onkeypress="if(event.key==='Enter') addComment(${post.id})">
          <button id="commentBtn-${post.id}" onclick="addComment(${post.id})">Post</button>
        </div>
      </div>
    </div>`;
  });
}

function getTimeAgo(time){
  let seconds = Math.floor((Date.now() - time) / 1000);
  if(seconds < 60) return 'just now';
  let minutes = Math.floor(seconds / 60);
  if(minutes < 60) return `${minutes}m ago`;
  let hours = Math.floor(minutes / 60);
  if(hours < 24) return `${hours}h ago`;
  let days = Math.floor(hours / 24);
  return `${days}d ago`;
}

function likePost(id){
  let post = posts.find(p => p.id === id);
  post.liked =!post.liked;
  post.likes += post.liked? 1 : -1;

  if(post.liked){
    let heart = document.getElementById(`heart-${id}`);
    heart.classList.add('animate');
    setTimeout(() => heart.classList.remove('animate'), 800);
  }

  localStorage.setItem('ruppy_posts', JSON.stringify(posts));
  renderFeed();
}

function toggleComments(id){
  let box = document.getElementById(`comments-${id}`);
  box.style.display = box.style.display === 'block'? 'none' : 'block';
}

function toggleCommentBtn(id){
  let input = document.getElementById(`commentInput-${id}`);
  let btn = document.getElementById(`commentBtn-${id}`);
  if(input.value.trim()){
    btn.classList.add('active');
  } else {
    btn.classList.remove('active');
  }
}

function addComment(id){
  let input = document.getElementById(`commentInput-${id}`);
  let text = input.value.trim();
  if(!text) return;
  if(checkContent(text)){
    alert('Comment contains inappropriate words');
    return;
  }

  let post = posts.find(p => p.id === id);
  post.comments.push({user: currentUser, text: text, time: Date.now()});
  localStorage.setItem('ruppy_posts', JSON.stringify(posts));
  input.value = '';
  toggleCommentBtn(id);
  renderFeed();
  document.getElementById(`comments-${id}`).style.display = 'block';
}

function savePost(id){
  let post = posts.find(p => p.id === id);
  post.saved =!post.saved;
  localStorage.setItem('ruppy_posts', JSON.stringify(posts));
  renderFeed();
}

function sharePostLink(id){
  navigator.clipboard.writeText(window.location.href);
  alert('Link copied to clipboard');
}

function showPostOptions(id){
  if(confirm('Report this post?')){
    let post = posts.find(p => p.id === id);
    post.reports++;
    localStorage.setItem('ruppy_posts', JSON.stringify(posts));
    alert('Reported');
    renderFeed();
  }
}

renderFeed();
</script>
</body>
</html>
