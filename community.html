<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RUPPY Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}
body{background:#0a0a0a;color:#fff;padding-bottom:70px}
.hub-header{position:sticky;top:0;background:linear-gradient(180deg,#0a0a0a 0%,#0a0a0a 80%,transparent 100%);backdrop-filter:blur(10px);padding:16px 20px;z-index:100;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1a1a}
.hub-logo{display:flex;align-items:center;gap:8px}
.back-arrow{background:none;border:none;color:#FFD700;font-size:24px;cursor:pointer;padding:0 8px 0 0;margin-left:-8px}
.hub-logo h1{font-size:24px;font-weight:800;background:linear-gradient(90deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hub-logo span{font-size:12px;color:#666;background:#1a1a1a;padding:2px 8px;border-radius:10px}
.stats-bar{display:flex;gap:10px;padding:16px 20px;overflow-x:auto}
.stats-bar::-webkit-scrollbar{display:none}
.stat-card{background:linear-gradient(135deg,#1a1a1a,#0d0d0d);border:1px solid #252525;border-radius:16px;padding:12px 16px;min-width:110px;flex-shrink:0;box-shadow:0 4px 10px rgba(0,0,0,0.5)}
.stat-card h3{font-size:20px;font-weight:700;color:#FFD700;margin-bottom:2px}
.stat-card p{font-size:11px;color:#888}
.stat-card.sub-balance{font-size:10px;color:#555;margin-top:3px}
.profile-cover{width:100%;height:140px;background:linear-gradient(135deg,#FFD700,#FFA500);position:relative}
.profile-dp{width:90px;height:90px;border-radius:24px;background:linear-gradient(135deg,#FFA500,#FFD700);border:4px solid #0a0a0a;position:absolute;bottom:-45px;left:20px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#000;font-size:32px;overflow:hidden}
.profile-dp img{width:100%;height:100%;object-fit:cover}
.profile-info{padding:55px 20px 16px}
.profile-info h2{font-size:24px;font-weight:800;margin-bottom:4px}
.profile-info p{font-size:14px;color:#888;margin-bottom:12px}
.p-detail{display:flex;align-items:center;gap:10px;margin-bottom:10px;color:#ddd;font-size:14px}
.p-detail span.icon{font-size:18px;width:25px}
.tab-content{display:none}
.tab-content.active{display:block}
#editModal{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;z-index:9999;display:none;flex-direction:column;overflow-y:auto;padding:20px}
.edit-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.edit-field{margin-bottom:15px}
.edit-field label{display:block;color:#666;font-size:12px;margin-bottom:5px;text-transform:uppercase}
.edit-field input,.edit-field textarea{width:100%;background:#111;border:1px solid #222;padding:12px;color:#fff;border-radius:10px;outline:none}
.ruppy-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:1px solid #222;height:65px;display:flex;justify-content:space-around;align-items:center;z-index:999}
.nav-btn{background:none;border:none;color:#FFE55C;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;opacity:0.7;font-size:10px}
.nav-btn.active{color:#FFD700;opacity:1}
.nav-btn svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2}
.create-card{margin:16px 20px;background:#111;border:1px solid #222;border-radius:20px;padding:16px}
.create-top{display:flex;gap:12px;align-items:center;margin-bottom:12px}
.create-avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:16px;overflow:hidden;flex-shrink:0}
.create-avatar img{width:100%;height:100%;object-fit:cover}
.create-card textarea{width:100%;background:#0a0a0a;border:1px solid #222;border-radius:12px;padding:12px;color:#fff;font-size:15px;resize:none;min-height:60px}
.create-actions{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.create-actions.left{display:flex;gap:12px}
.icon-btn{background:#1a1a1a;border:1px solid #333;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer}
.post-btn{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:10px 24px;color:#000;font-weight:700;font-size:14px;cursor:pointer}
.post-btn:disabled{opacity:0.3;cursor:not-allowed}
.claim-btn{background:#81C784;border:none;border-radius:10px;padding:10px 24px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;width:100%;margin-top:10px}
.claim-btn.claimed{background:#333;color:#888;cursor:not-allowed}
.feed{padding:0 20px}
#fileInput{display:none}
.post-card{background:#111;border:1px solid #222;border-radius:16px;padding:14px;margin-bottom:12px}
.post-card-head{display:flex;gap:10px;align-items:center;margin-bottom:10px}
.post-avatar{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:14px;overflow:hidden}
.post-avatar img{width:100%;height:100%;object-fit:cover}
.post-info h4{font-size:15px;font-weight:700}
.post-info p{font-size:12px;color:#666}
.post-content{margin-bottom:10px;font-size:15px;line-height:1.4}
.post-media img,.post-media video{width:100%;border-radius:12px;margin-top:8px}
.gift-banner{background:#fff3cd;border:1px solid #ffe69c;padding:8px;border-radius:8px;font-size:13px;margin-bottom:10px;color:#664d03;font-weight:600}
.post-actions{display:flex;gap:10px;margin-top:8px}
.like-btn,.comment-btn{background:#FFF9C4;border:2px solid #F4E04D;padding:6px 12px;border-radius:6px;cursor:pointer;font-weight:bold;color:#333}
.like-btn.liked{background:#FFE082;border-color:#FFC107;color:#000}
.comment-btn b{color:#333}
.unclaimed-badge{background:#FF6D00;color:#fff;font-size:11px;padding:3px 8px;border-radius:6px;margin-left:8px}
.profile-posts{padding:0 20px 20px}
.profile-posts h3{font-size:16px;color:#888;margin:20px 0 12px}
.comment-box{margin-top:10px;padding-top:10px;border-top:1px solid #222;display:none}
.comment-box.active{display:block}
.comment-input-row{display:flex;gap:8px;margin-bottom:10px}
.comment-input-row input{flex:1;background:#0a0a0a;border:1px solid #333;border-radius:8px;padding:8px 12px;color:#fff;font-size:13px}
.comment-send{background:#FFD700;border:none;border-radius:8px;padding:8px 12px;color:#000;font-weight:700;font-size:12px;cursor:pointer}
.comment-list{max-height:150px;overflow-y:auto}
.comment-item{background:#0a0a0a;border-radius:8px;padding:8px;margin-bottom:6px;font-size:13px}
.comment-item b{color:#FFD700}
</style>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onValue, update, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDQC0WsVPr63y2xvFMSifnkjAB3TTVcIxU",
    authDomain: "ruppynetwork-50362.firebaseapp.com",
    databaseURL: "https://ruppynetwork-50362-default-rtdb.firebaseio.com",
    projectId: "ruppynetwork-50362",
    storageBucket: "ruppynetwork-50362.firebasestorage.app",
    messagingSenderId: "132064610854",
    appId: "1:132064610854:web:3c217eaf3618007f5934e7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  window.db = db;
  window.fbRef = ref;
  window.fbPush = push;
  window.fbOnValue = onValue;
  window.fbUpdate = update;
  window.fbGet = get;
  window.fbChild = child;
</script>

</head>
<body>

<div class="hub-header">
  <div class="hub-logo"><button class="back-arrow" onclick="exitApp()">←</button><h1>RUPPY</h1><span>HUB</span></div>
</div>

<div class="stats-bar">
    <div class="stat-card"><h3 id="totalPosts">0</h3><p>Total Posts</p></div>
    <div class="stat-card"><h3 id="totalLikes">0</h3><p>Total Likes</p></div>
    <div class="stat-card">
      <h3 id="myRewards">0</h3>
      <p>My Reward</p>
      <div class="sub-balance">Total Balance: <span id="totalBalance">0</span></div>
    </div>
</div>

<div id="hub-tab" class="tab-content active">
  <div class="create-card">
    <div class="gift-banner" id="giftBanner">🎁 +10 RUPPY Token per post | <span id="limitText">3/3 left</span></div>
    <div class="create-top">
      <div class="create-avatar" id="userAvatar">U</div>
      <textarea id="postText" placeholder="Create Post..." rows="2"></textarea>
    </div>
    <div class="create-actions">
      <div class="left">
        <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📷</button>

      </div>
      <button class="post-btn" id="postBtn" onclick="createPost()" disabled>Post</button>

</div>

<div id="friend-tab" class="tab-content">
  <div style="padding:20px"><h3>Friend Requests</h3><p style="color:#666">No new requests</p></div>
</div>

<div id="notification-tab" class="tab-content">
  <div style="padding:20px"><h3>Notifications</h3><p style="color:#666">You are all caught up!</p></div>
</div>

<div id="profile-tab" class="tab-content">
  <div class="profile-cover"><div class="profile-dp" id="main-dp">U</div></div>
  <div class="profile-info">
    <h2 id="view-name">User</h2>
    <p id="view-bio">Living life...</p>
    <div class="p-detail"><span class="icon">📍</span> <span id="view-city">Not Set</span></div>
    <div class="p-detail"><span class="icon">🏠</span> <span id="view-hometown">Not Set</span></div>
    <div class="p-detail"><span class="icon">❤️</span> <span id="view-rel">Single</span></div>
    <div class="p-detail"><span class="icon">💼</span> <span id="view-work">Not Set</span></div>
    <div class="p-detail"><span class="icon">🎓</span> <span id="view-edu">Not Set</span></div>
    <div class="p-detail"><span class="icon">🎮</span> <span id="view-hobbies">Not Set</span></div>
    <button onclick="openEdit()" style="width:100%;padding:12px;background:#1a1a1a;border:1px solid #333;color:#FFD700;border-radius:12px;margin-top:20px;font-weight:700">Edit Profile</button>
  </div>
  <div class="profile-posts">
    <h3>Your Posts</h3>
    <div id="profileFeed"></div>
  </div>
</div>

<div id="editModal">
  <div class="edit-header"><h3>Edit Profile</h3><button onclick="closeEdit()" style="color:#fff;background:none;border:none;font-size:20px">✕</button></div>
  <div class="edit-field"><label>Profile Photo</label><input type="file" id="in-photo" accept="image/*"></div>
  <div class="edit-field"><label>Name</label><input type="text" id="in-name"></div>
  <div class="edit-field"><label>Bio</label><textarea id="in-bio"></textarea></div>
  <div class="edit-field"><label>Current City</label><input type="text" id="in-city"></div>
  <div class="edit-field"><label>Hometown</label><input type="text" id="in-hometown"></div>
  <div class="edit-field"><label>Relationship</label><input type="text" id="in-rel"></div>
  <div class="edit-field"><label>Work</label><input type="text" id="in-work"></div>
  <div class="edit-field"><label>Education</label><input type="text" id="in-edu"></div>
  <div class="edit-field"><label>Hobbies</label><input type="text" id="in-hobbies"></div>
  <button onclick="saveProfile()" style="width:100%;padding:15px;background:#FFD700;border:none;border-radius:12px;font-weight:800;margin-top:10px">Save Changes</button>
</div>

<div class="ruppy-nav">
  <button class="nav-btn active" id="btn-hub" onclick="switchTab('hub')">
    <svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 22"></polyline></svg>
    <span>Home</span>

    <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
    <span>Friend</span>
  </button>

    <span>Notif</span>
  </button>

    <span>Profile</span>
  </button>
</div>

<script type="module">
// मेन ऐप वाला User Data ही यूज करेंगे - ruppy_user
let userData = JSON.parse(localStorage.getItem('ruppy_user')) || {
  name: 'User',
  dp: null,
  balance: 0,
  lastMine: 0,
  lastGift: 0,
  boostCount: 0,
  boostResetTime: Date.now(),
  firstRewardTime: 0,
  ultraRewardTime: 0,
  // Hub के लिए Extra Fields
  bio:'Living life...',
  city:'Not Set',
  hometown:'Not Set',
  rel:'Single',
  work:'Not Set',
  edu:'Not Set',
  hobbies:'Not Set',
  postsToday:0,
  lastPostDate:''
};

// Safe conversion - मेन ऐप वाला Logic
userData.balance = Number(userData.balance);
if (isNaN(userData.balance)) userData.balance = 0;

let posts = [];

// FIX: Unique UID बनाओ - हर User का अलग ID
let uid = localStorage.getItem('ruppy_uid');
if (!uid) {
  uid = 'user_' + Math.random().toString(36).substr(2, 16);
  localStorage.setItem('ruppy_uid', uid);
}

// Firebase से User Data Sync करो
fbOnValue(fbRef(db, 'users/' + uid), (snapshot) => {
  if(snapshot.exists()){
    let fbData = snapshot.val();
    userData = {...userData,...fbData};
    localStorage.setItem('ruppy_user', JSON.stringify(userData));
  }
  loadUI();
});

// Firebase से Posts लाओ
fbOnValue(fbRef(db, 'posts'), (snapshot) => {
  posts = [];
  if(snapshot.exists()){
    snapshot.forEach((child) => {
      posts.push({id: child.key,...child.val()});
    });
    posts.reverse();
  }
  renderFeed();
  renderProfileFeed();
});

function updatePostLimit() {
  const today = new Date().toISOString().split('T')[0];
  if (userData.lastPostDate!== today) {
    userData.postsToday = 0;
    userData.lastPostDate = today;
    fbUpdate(fbRef(db, 'users/' + uid), {postsToday: 0, lastPostDate: today});
    localStorage.setItem('ruppy_user', JSON.stringify(userData));
  }
  let left = 3 - userData.postsToday;
  document.getElementById('limitText').innerText = `${left}/3 left`;
  document.getElementById('myRewards').innerText = userData.balance || 0;
  document.getElementById('totalBalance').innerText = userData.balance || 0;

  if (userData.postsToday >= 3) {
    document.getElementById('postBtn').disabled = true;
    document.getElementById('postBtn').innerText = 'Daily limit reached 3/3';
    document.getElementById('giftBanner').innerHTML = '🎁 Daily limit reached. Come back tomorrow';
  } else {
    document.getElementById('postBtn').innerText = `Post`;
    document.getElementById('giftBanner').innerHTML = `🎁 +10 RUPPY Token per post | <span id="limitText">${left}/3 left</span>`;
  }
}

window.loadUI = function(){
  document.getElementById('view-name').innerText = userData.name;
  document.getElementById('view-bio').innerText = userData.bio || 'Living life...';
  document.getElementById('view-city').innerText = userData.city || 'Not Set';
  document.getElementById('view-hometown').innerText = userData.hometown || 'Not Set';
  document.getElementById('view-rel').innerText = userData.rel || 'Single';
  document.getElementById('view-work').innerText = userData.work || 'Not Set';
  document.getElementById('view-edu').innerText = userData.edu || 'Not Set';
  document.getElementById('view-hobbies').innerText = userData.hobbies || 'Not Set';
  document.getElementById('userAvatar').innerText = userData.name[0];
  if(userData.dp){
    document.getElementById('main-dp').innerHTML = `<img src="${userData.dp}">`;
    document.getElementById('userAvatar').innerHTML = `<img src="${userData.dp}">`
  }else{
    document.getElementById('main-dp').innerText = userData.name[0]
  }
  updatePostLimit();
}

window.openEdit = function(){
  document.getElementById('editModal').style.display='flex';
  document.getElementById('in-name').value = userData.name;
  document.getElementById('in-bio').value = userData.bio || '';
  document.getElementById('in-city').value = userData.city || '';
  document.getElementById('in-hometown').value = userData.hometown || '';
  document.getElementById('in-rel').value = userData.rel || '';
  document.getElementById('in-work').value = userData.work || '';
  document.getElementById('in-edu').value = userData.edu || '';
  document.getElementById('in-hobbies').value = userData.hobbies || '';
}

window.closeEdit = function(){document.getElementById('editModal').style.display='none'}

window.saveProfile = function(){
  userData.name = document.getElementById('in-name').value;
  userData.bio = document.getElementById('in-bio').value;
  userData.city = document.getElementById('in-city').value;
  userData.hometown = document.getElementById('in-hometown').value;
  userData.rel = document.getElementById('in-rel').value;
  userData.work = document.getElementById('in-work').value;
  userData.edu = document.getElementById('in-edu').value;
  userData.hobbies = document.getElementById('in-hobbies').value;
  const file = document.getElementById('in-photo').files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = (e) => {
      userData.dp = e.target.result;
      finish()
    };
    reader.readAsDataURL(file)
  }else finish()
}

function finish(){
  fbUpdate(fbRef(db, 'users/' + uid), userData);
  localStorage.setItem('ruppy_user', JSON.stringify(userData));
  closeEdit();
}

window.switchTab = function(t){
  // hide all tabs
  document.querySelectorAll('.tab-content').forEach(tab=>{
    tab.classList.remove('active');
  });

  // remove active from all buttons
  document.querySelectorAll('.nav-btn').forEach(btn=>{
    btn.classList.remove('active');
  });

  // show selected tab
  const activeTab = document.getElementById(t + '-tab');
  if(activeTab) activeTab.classList.add('active');

  // activate correct button (FIXED for notification)
  const activeBtn = document.getElementById('btn-' + t);
  if(activeBtn) activeBtn.classList.add('active');

  // extra render
  if(t === 'profile') renderProfileFeed();
}

window.exitApp = function(){window.history.back()}

let selectedFile=null;
document.getElementById('postText').oninput=function(){
  if(document.getElementById('postBtn').innerText.includes('limit reached')) return;
  document.getElementById('postBtn').disabled=!this.value.trim()&&!selectedFile
}
document.getElementById('fileInput').onchange=function(e){
  selectedFile=e.target.files[0];
  if(selectedFile){
    let r=new FileReader();
    r.onload=function(e){
      let p=document.getElementById('preview');
      p.style.display='block';
      p.innerHTML=selectedFile.type.includes('video')?`<video src="${e.target.result}" controls style="width:100%;border-radius:12px"></video>`:`<img src="${e.target.result}" style="width:100%;border-radius:12px">`;
      document.getElementById('postBtn').disabled=false
    };
    r.readAsDataURL(selectedFile)
  }
}

window.addEmoji = function(){
  document.getElementById('postText').value+=' 🔥';
  document.getElementById('postBtn').disabled=false
}

window.createPost = function(){
  let t=document.getElementById('postText').value.trim();
  if(!t&&!selectedFile)return;

  const today = new Date().toISOString().split('T')[0];
  if (userData.lastPostDate === today && userData.postsToday >= 3) {
    alert("Daily limit of 3 posts reached. Come back tomorrow.");
    return;
  }

  let p={
    user: userData.name,
    photo: userData.dp,
    text: t,
    likes: 0,
    likedBy: [],
    time: Date.now(),
    claimed: false,
    uid: uid,
    comments: []
  };

  if(selectedFile){
    let r=new FileReader();
    r.onload=function(e){
      p.media=e.target.result;
      p.mediaType=selectedFile.type.includes('video')?'video':'image';
      savePost(p)
    };
    r.readAsDataURL(selectedFile)
  } else {
    savePost(p)
  }
}

function savePost(p){
  fbPush(fbRef(db, 'posts'), p);
  document.getElementById('postText').value='';
  document.getElementById('preview').style.display='none';
  document.getElementById('preview').innerHTML='';
  document.getElementById('fileInput').value='';
  document.getElementById('postBtn').disabled=true;
  selectedFile=null;
}

window.claimReward = function(postId){
  const today = new Date().toISOString().split('T')[0];
  if (userData.lastPostDate === today && userData.postsToday >= 3) {
    alert("Daily limit of 3 claims reached. Come back tomorrow.");
    return;
  }

  let post = posts.find(p => p.id === postId);
  if(!post || post.claimed) return;

  userData.balance = Number(userData.balance) || 0;
  userData.balance += 10;
  userData.postsToday = userData.lastPostDate === today? (userData.postsToday + 1) : 1;
  userData.lastPostDate = today;

  fbUpdate(fbRef(db, 'posts/' + postId), {claimed: true});
  fbUpdate(fbRef(db, 'users/' + uid), {
    balance: userData.balance,
    postsToday: userData.postsToday,
    lastPostDate: today
  });
  localStorage.setItem('ruppy_user', JSON.stringify(userData));

  alert("You claimed 10 Tokens! 🎉");
}

window.openComment = function(id){
  let box = document.getElementById('cbox-'+id);
  box.classList.toggle('active');
}

window.addComment = function(id){
  let inp = document.getElementById('cinp-'+id);
  let txt = inp.value.trim();
  if(!txt) return;
  let post = posts.find(p => p.id === id);
  if(!post) return;
  let comments = post.comments || [];
  comments.push({user:userData.name,text:txt});
  fbUpdate(fbRef(db, 'posts/' + id), {comments: comments});
  inp.value='';
}

function renderPostHTML(p,showClaim){
    let m='';
    if(p.media){
      if(p.mediaType==='video'){m=`<div class="post-media"><video src="${p.media}" controls></video></div>`}
      else{m=`<div class="post-media"><img src="${p.media}"></div>`}
    }
    let isLiked = p.likedBy && p.likedBy.includes(uid);
    let claimBtn = '';
    if(showClaim && p.uid === uid){
      if(!p.claimed){
        claimBtn = `<button class="claim-btn" onclick="claimReward('${p.id}')">Claim +10 Token</button>`;
      } else {
        claimBtn = `<button class="claim-btn claimed" disabled>Claimed ✓</button>`;
      }
    }
    let unclaimedTag = (p.uid === uid &&!p.claimed)? `<span class="unclaimed-badge">Unclaimed</span>` : '';

    let commentsHTML = '';
    if(p.comments && p.comments.length > 0){
      p.comments.forEach(c=>{
        commentsHTML += `<div class="comment-item"><b>${c.user}:</b> ${c.text}</div>`;
      });
    }

    return `<div class="post-card">
      <div class="post-card-head">
        <div class="post-avatar">${p.photo?`<img src="${p.photo}">`:p.user[0]}</div>
        <div class="post-info"><h4>${p.user} ${unclaimedTag}</h4><p>now</p></div>
      </div>
      ${p.text?`<div class="post-content">${p.text}</div>`:''}${m}
      ${claimBtn}
      <div class="post-actions">
        <button class="like-btn ${isLiked?'liked':''}" onclick="likePost('${p.id}')"><b>Like</b> ❤️ ${p.likes||0}</button>
        <button class="comment-btn" onclick="openComment('${p.id}')"><b style="color:#333">Comment</b> 💬 ${p.comments?p.comments.length:0}</button>
      </div>
      <div class="comment-box" id="cbox-${p.id}">
        <div class="comment-input-row">
          <input type="text" id="cinp-${p.id}" placeholder="Write a comment...">
          <button class="comment-send" onclick="addComment('${p.id}')">Send</button>
        </div>
        <div class="comment-list">${commentsHTML}</div>
      </div>
    </div>`;
}

window.renderFeed = function(){
  let f=document.getElementById('feed');
  if(posts.length===0){f.innerHTML=`<div style="padding:40px;text-align:center;color:#666">No posts yet</div>`;return}
  f.innerHTML='';
  let totalLikes = 0;
  posts.forEach((p)=>{
    totalLikes += p.likes || 0;
    f.innerHTML += renderPostHTML(p,true);
  });
  document.getElementById('totalPosts').innerText = posts.length;
  document.getElementById('totalLikes').innerText = totalLikes;
}

window.renderProfileFeed = function(){
  let f=document.getElementById('profileFeed');
  let userPosts = posts.filter(p => p.uid === uid);
  if(userPosts.length===0){f.innerHTML=`<div style="padding:20px;text-align:center;color:#666">No posts yet</div>`;return}
  f.innerHTML='';
  userPosts.forEach((p)=>{
    f.innerHTML += renderPostHTML(p,false);
  });
}

window.likePost = function(id) {
    let post = posts.find(p => p.id === id);
    if(!post) return;
    let likedBy = post.likedBy || [];
    let userIndex = likedBy.indexOf(uid);
    let newLikes = post.likes || 0;

    if(userIndex === -1) {
        newLikes += 1;
        likedBy.push(uid);
    } else {
        newLikes -= 1;
        likedBy.splice(userIndex, 1);
    }
    fbUpdate(fbRef(db, 'posts/' + id), {likes: newLikes, likedBy: likedBy});
}

</script>
