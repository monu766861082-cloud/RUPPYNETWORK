<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RUPPY Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}
body{background:#0a0a0a;color:#fff;padding-bottom:70px}
.hub-header{position:sticky;top:0;background:#0a0a0a;padding:16px 20px;z-index:100;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1a1a}
.hub-logo{display:flex;align-items:center;gap:8px}
.back-arrow{background:none;border:none;color:#FFD700;font-size:24px;cursor:pointer;padding:0 8px 0 0;margin-left:-8px}
.hub-logo h1{font-size:24px;font-weight:800;background:linear-gradient(90deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hub-logo span{font-size:12px;color:#666;background:#1a1a1a;padding:2px 8px;border-radius:10px}
.stats-bar{display:flex;gap:10px;padding:16px 20px;overflow-x:auto}
.stats-bar::-webkit-scrollbar{display:none}
.stat-card{background:#1a1a1a;border:1px solid #252525;border-radius:16px;padding:12px 16px;min-width:110px;flex-shrink:0}
.stat-card h3{font-size:20px;font-weight:700;color:#FFD700;margin-bottom:2px}
.stat-card p{font-size:11px;color:#888}
.feed{padding:0 20px}
.post-card{background:#111;border:1px solid #222;border-radius:24px;margin-bottom:16px;overflow:hidden}
.post-card-head{padding:16px;display:flex;align-items:center;gap:12px}
.post-avatar{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:16px;overflow:hidden;flex-shrink:0}
.post-avatar img{width:100%;height:100%;object-fit:cover}
.post-info{flex:1}
.post-info h4{font-size:15px;font-weight:600;margin-bottom:2px}
.post-info p{font-size:12px;color:#666}
.post-more{background:#1a1a1a;border:none;border-radius:8px;width:32px;height:32px;color:#888;font-size:20px;cursor:pointer}
.post-content{padding:0 16px 16px;font-size:15px;line-height:1.5;color:#ddd}
.post-media{width:100%;max-height:400px;background:#0a0a0a;display:flex;align-items:center;justify-content:center;overflow:hidden}
.post-media img,.post-media video{width:100%;height:auto;display:block}
.like-count{padding:8px 16px;font-size:13px;color:#B0B3B8;border-bottom:1px solid #252525}
.post-footer{padding:4px 8px;background:#111;display:flex;justify-content:space-around}
.fb-action-btn{flex:1;background:none;border:none;color:#B0B3B8;display:flex;align-items:center;justify-content:center;gap:6px;font-size:14px;font-weight:600;cursor:pointer;padding:8px;border-radius:8px;margin:0 4px}
.fb-action-btn:active{background:#222}
.fb-action-btn.liked{color:#1877F2}
.fb-action-btn svg{width:20px;height:20px;fill:currentColor}
.comments-box{display:none;padding:16px;border-top:1px solid #1a1a1a;background:#0d0d0d;max-height:300px;overflow-y:auto}
.comment{display:flex;gap:10px;margin-bottom:14px}
.comment-avatar{width:32px;height:32px;border-radius:10px;background:#FFD700;color:#000;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;overflow:hidden}
.comment-avatar img{width:100%;height:100%;object-fit:cover}
.comment-body{flex:1;background:#1a1a1a;border-radius:12px;padding:10px 12px}
.comment-body b{font-size:13px;font-weight:600;display:block;margin-bottom:2px}
.comment-body span{font-size:14px;line-height:1.4;color:#ddd}
.comment-input{display:flex;gap:10px;padding:12px 16px;border-top:1px solid #1a1a1a}
.comment-input input{flex:1;background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:10px 14px;color:#fff;font-size:14px;outline:none}
.comment-input button{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:10px 16px;color:#000;font-weight:700;font-size:13px;cursor:pointer}

/* CREATE CARD AB FEED KE BAAD, SABSE NEECHE */
.create-card{margin:16px 20px;background:#111;border:1px solid #222;border-radius:20px;padding:16px}
.create-top{display:flex;gap:12px;align-items:center;margin-bottom:12px}
.create-avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:16px;overflow:hidden;flex-shrink:0}
.create-avatar img{width:100%;height:100%;object-fit:cover}
.create-card textarea{width:100%;background:#0a0a0a;border:1px solid #222;border-radius:12px;padding:12px;color:#fff;font-size:15px;resize:none;min-height:60px}
.create-actions{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.create-actions.left{display:flex;gap:12px}
.icon-btn{background:#1a1a1a;border:1px solid #333;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer}
.post-btn{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:10px 24px;color:#000;font-weight:700;font-size:14px;cursor:pointer}
.post-btn:disabled{opacity:0.3;cursor:not-allowed}

.tab-content{display:none}
.tab-content.active{display:block}
.section-title{padding:16px 20px 8px;font-size:18px;font-weight:700;color:#FFD700}
.search-bar{margin:0 20px 16px;background:#111;border:1px solid #222;border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px}
.search-bar input{flex:1;background:none;border:none;color:#fff;font-size:14px;outline:none}
.user-card{background:#111;border:1px solid #222;border-radius:16px;padding:12px;margin:0 20px 12px;display:flex;align-items:center;gap:12px}
.user-card-avatar{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:18px;flex-shrink:0;overflow:hidden}
.user-card-avatar img{width:100%;height:100%;object-fit:cover}
.user-card-info{flex:1}
.user-card-info h4{font-size:15px;font-weight:600;margin-bottom:2px}
.user-card-info p{font-size:12px;color:#666}
.user-card-btn{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:8px 16px;color:#000;font-weight:700;font-size:12px;cursor:pointer}
.notif-card{background:#111;border:1px solid #222;border-radius:16px;padding:14px;margin:0 20px 12px;display:flex;gap:12px}
.notif-icon{width:40px;height:40px;border-radius:12px;background:#FFD700;color:#000;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.notif-content{flex:1}
.notif-content p{font-size:14px;line-height:1.4;margin-bottom:4px}
.notif-content p b{color:#FFD700}
.notif-time{font-size:11px;color:#666}
.profile-cover{width:100%;height:140px;background:linear-gradient(135deg,#FFD700,#FFA500);position:relative;overflow:hidden;cursor:pointer}
.profile-cover img{width:100%;height:100%;object-fit:cover}
.profile-dp{width:90px;height:90px;border-radius:24px;background:linear-gradient(135deg,#FFA500,#FFD700);border:4px solid #0a0a0a;position:absolute;bottom:-45px;left:20px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#000;font-size:32px;overflow:hidden;cursor:pointer}
.profile-dp img{width:100%;height:100%;object-fit:cover}
.profile-info{padding:55px 20px 16px}
.profile-info h2{font-size:24px;font-weight:800;margin-bottom:4px}
.profile-info p{font-size:14px;color:#888;line-height:1.5;margin-bottom:12px}
.profile-stats{display:flex;gap:20px;margin-bottom:16px}
.profile-stat{text-align:center}
.profile-stat h3{font-size:18px;font-weight:700;color:#FFD700}
.profile-stat p{font-size:11px;color:#666;margin:0}
.profile-actions{display:flex;gap:10px}
.profile-btn{flex:1;background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:12px;padding:12px;color:#000;font-weight:700;font-size:14px;cursor:pointer}
.profile-btn.secondary{background:#1a1a1a;color:#FFD700;border:1px solid #333}
.profile-posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:0 20px}
.profile-post-item{aspect-ratio:1;background:#1a1a1a;border-radius:8px;overflow:hidden}
.profile-post-item img{width:100%;height:100%;object-fit:cover}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;overflow-y:auto;padding:20px}
.modal.active{display:flex;align-items:flex-start;justify-content:center}
.modal-content{background:#111;border:1px solid #222;border-radius:20px;width:100%;max-width:500px;margin-top:40px}
.modal-header{padding:20px;border-bottom:1px solid #222;display:flex;justify-content:space-between;align-items:center}
.modal-header h2{font-size:20px;font-weight:700}
.close-btn{background:#1a1a1a;border:none;border-radius:10px;width:36px;height:36px;color:#fff;font-size:20px;cursor:pointer}
.modal-body{padding:20px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;color:#888;margin-bottom:8px;font-weight:600}
.form-group input,.form-group textarea{width:100%;background:#0a0a0a;border:1px solid #333;border-radius:12px;padding:12px;color:#fff;font-size:15px;outline:none}
.form-group textarea{resize:vertical;min-height:80px}
.save-profile-btn{width:100%;background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:12px;padding:14px;color:#000;font-weight:700;font-size:15px;cursor:pointer}
.ruppy-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:1px solid #222;height:65px;display:flex;justify-content:space-around;align-items:center;z-index:999;padding:0 10px}
.nav-btn{background:none;border:none;color:#FFE55C;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:8px 12px;border-radius:12px;opacity:0.7}
.nav-btn.active{color:#FFD700;opacity:1}
.nav-btn svg{width:24px;height:24px;stroke-width:2;fill:none;stroke:currentColor}
.nav-btn.active svg{fill:#FFD700;stroke:#FFD700}
.nav-btn span{font-size:10px;font-weight:600}
.empty-hub{text-align:center;padding:80px 40px}
.empty-hub h3{font-size:24px;font-weight:800;margin-bottom:8px;background:linear-gradient(90deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.empty-hub p{font-size:14px;color:#666;margin-bottom:20px}
.empty-hub button{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:12px;padding:14px 28px;color:#000;font-weight:700;font-size:15px;cursor:pointer}
#fileInput,#profilePicInput,#coverPicInput{display:none}
</style>
</head>
<body>

<div class="hub-header">
  <div class="hub-logo">
    <button class="back-arrow" onclick="exitApp()">←</button>
    <h1>RUPPY</h1>
    <span>HUB</span>
  </div>
</div>

<div id="hub-tab" class="tab-content active">
  <div class="stats-bar">
    <div class="stat-card"><h3 id="totalPosts">0</h3><p>Total Posts</p></div>
    <div class="stat-card"><h3 id="totalLikes">0</h3><p>Total Likes</p></div>
    <div class="stat-card"><h3 id="activeUsers">0</h3><p>Active Now</p></div>
  </div>

  <div class="feed" id="feed"></div>

  <!-- CREATE POST AB SABSE NEECHE -->
  <div class="create-card">
    <div class="create-top">
      <div class="create-avatar" id="userAvatar">U</div>
      <textarea id="postText" placeholder="Create Post..." rows="2"></textarea>
    </div>
    <div class="create-actions">
      <div class="left">
        <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📷</button>
        <button class="icon-btn" onclick="addEmoji()">😊</button>
      </div>
      <button class="post-btn" id="postBtn" onclick="createPost()" disabled>Post</button>
    </div>
    <input type="file" id="fileInput" accept="image/*,video/*">
    <div id="preview" style="margin-top:12px;border-radius:12px;overflow:hidden;display:none"></div>
  </div>
</div>

<div id="friend-tab" class="tab-content">
  <div class="search-bar">
    <span>🔍</span>
    <input type="text" placeholder="Search friends...">
  </div>
  <div class="section-title">Friend Requests</div>
  <div id="friendRequests"></div>
  <div class="section-title">People You May Know</div>
  <div id="suggestedFriends"></div>
</div>

<div id="notification-tab" class="tab-content">
  <div class="section-title">Notifications</div>
  <div id="notificationsList"></div>
</div>

<div id="profile-tab" class="tab-content">
  <div class="profile-cover" onclick="document.getElementById('coverPicInput').click()">
    <img id="coverImg" style="display:none">
    <div class="profile-dp" onclick="event.stopPropagation();document.getElementById('profilePicInput').click()">
      <span id="profileDpText">U</span>
      <img id="profileImg" style="display:none">
    </div>
  </div>
  <div class="profile-info">
    <h2 id="profileName">User</h2>
    <p id="profileBio">No bio yet</p>
    <div class="profile-stats">
      <div class="profile-stat"><h3 id="profilePostCount">0</h3><p>Posts</p></div>
      <div class="profile-stat"><h3 id="profileFriendCount">0</h3><p>Friends</p></div>
      <div class="profile-stat"><h3 id="profileLikeCount">0</h3><p>Likes</p></div>
    </div>
    <div class="profile-actions">
      <button class="profile-btn" onclick="openEditProfile()">Edit Profile</button>
      <button class="profile-btn secondary" onclick="shareProfile()">Share Profile</button>
    </div>
  </div>
  <div class="section-title">Posts</div>
  <div class="profile-posts-grid" id="profilePostsGrid"></div>
  <div id="noProfilePosts" style="padding:40px;text-align:center;color:#666;font-size:13px">No posts yet</div>
</div>

<div class="modal" id="editProfileModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Edit Profile</h2>
      <button class="close-btn" onclick="closeEditProfile()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Profile Photo</label>
        <button class="profile-btn secondary" onclick="document.getElementById('profilePicInput').click()">Choose Photo</button>
      </div>
      <div class="form-group">
        <label>Cover Photo</label>
        <button class="profile-btn secondary" onclick="document.getElementById('coverPicInput').click()">Choose Cover</button>
      </div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="editName" placeholder="Your name">
      </div>
      <div class="form-group">
        <label>Bio</label>
        <textarea id="editBio" placeholder="Tell us about yourself..."></textarea>
      </div>
      <div class="form-group">
        <label>Birthday</label>
        <input type="date" id="editBirthday">
      </div>
      <button class="save-profile-btn" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>
</div>

<input type="file" id="profilePicInput" accept="image/*">
<input type="file" id="coverPicInput" accept="image/*">

<div class="ruppy-nav">
  <button class="nav-btn active" id="home-nav-btn" onclick="switchTab('hub')">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path><polyline points="9 22 9 12 15 22"></polyline></svg>
    <span>Home</span>
  </button>
  <button class="nav-btn" id="friend-nav-btn" onclick="switchTab('friend')">
    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 00-3-3.87"></path><path d="M16 3.13a4 4 0 010 7.75"></path></svg>
    <span>Friend</span>
  </button>
  <button class="nav-btn" id="notification-nav-btn" onclick="switchTab('notification')">
    <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 01-3.46 0"></path></svg>
    <span>Notification</span>
  </button>
  <button class="nav-btn" id="profile-nav-btn" onclick="switchTab('profile')">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    <span>Profile</span>
  </button>
</div>

<script>
function exitApp(){if(window.history.length>1)window.history.back();else window.close()}
const bannedWords=['sex','porn','xxx','nude','fuck','bitch','chut','lund','randi','gand','boobs','dick','pussy','scam','betting','casino','gambling'];
function checkContent(t){return bannedWords.some(w=>t.toLowerCase().includes(w))}
let posts=JSON.parse(localStorage.getItem('ruppy_posts')||'[]');
let users=JSON.parse(localStorage.getItem('ruppy_users')||'[]');
let notifications=JSON.parse(localStorage.getItem('ruppy_notifications')||'[]');
let currentUserId=localStorage.getItem('ruppy_current_user_id');
if(!currentUserId){currentUserId='user_'+Date.now();localStorage.setItem('ruppy_current_user_id',currentUserId);users.push({id:currentUserId,name:'User'+Math.floor(Math.random()*999),bio:'',birthday:'',profilePic:'',coverPic:'',friends:[],joinDate:Date.now()});localStorage.setItem('ruppy_users',JSON.stringify(users))}
let currentUser=users.find(u=>u.id===currentUserId);
function updateUserUI(){document.getElementById('userAvatar').innerHTML=currentUser.profilePic?`<img src="${currentUser.profilePic}">`:currentUser.name[0].toUpperCase();document.getElementById('profileName').textContent=currentUser.name;document.getElementById('profileBio').textContent=currentUser.bio||'No bio yet';document.getElementById('profileDpText').textContent=currentUser.name[0].toUpperCase();if(currentUser.profilePic){document.getElementById('profileImg').src=currentUser.profilePic;document.getElementById('profileImg').style.display='block';document.getElementById('profileDpText').style.display='none'}if(currentUser.coverPic){document.getElementById('coverImg').src=currentUser.coverPic;document.getElementById('coverImg').style.display='block'}}
updateUserUI();updateStats();renderFeed();renderFriends();renderNotifications();updateProfileStats();
let selectedFile=null;
document.getElementById('postText').oninput=function(){document.getElementById('postBtn').disabled=!this.value.trim()&&!selectedFile}
document.getElementById('fileInput').onchange=function(e){selectedFile=e.target.files[0];if(selectedFile){let r=new FileReader();r.onload=function(e){let p=document.getElementById('preview');p.style.display='block';p.innerHTML=selectedFile.type.includes('video')?`<video src="${e.target.result}" controls style="width:100%;border-radius:12px"></video>`:`<img src="${e.target.result}" style="width:100%;border-radius:12px">`;document.getElementById('postBtn').disabled=false};r.readAsDataURL(selectedFile)}}
document.getElementById('profilePicInput').onchange=function(e){let f=e.target.files[0];if(f){let r=new FileReader();r.onload=function(e){currentUser.profilePic=e.target.result;localStorage.setItem('ruppy_users',JSON.stringify(users));updateUserUI()};r.readAsDataURL(f)}}
document.getElementById('coverPicInput').onchange=function(e){let f=e.target.files[0];if(f){let r=new FileReader();r.onload=function(e){currentUser.coverPic=e.target.result;localStorage.setItem('ruppy_users',JSON.stringify(users));updateUserUI()};r.readAsDataURL(f)}}
function openCreate(){document.getElementById('postText').focus()}
function addEmoji(){document.getElementById('postText').value+=' 🔥';document.getElementById('postBtn').disabled=false}
function createPost(){let t=document.getElementById('postText').value.trim();if(!t&&!selectedFile)return;if(checkContent(t)){alert('Inappropriate content detected');return}let p={id:Date.now(),userId:currentUserId,user:currentUser.name,userPic:currentUser.profilePic,text:t,time:Date.now(),likes:0,likedBy:[],comments:[]};if(selectedFile){let r=new FileReader();r.onload=function(e){p.media=e.target.result;p.mediaType=selectedFile.type.includes('video')?'video':'image';savePost(p)};r.readAsDataURL(selectedFile)}else savePost(p)}
function savePost(p){posts.unshift(p);localStorage.setItem('ruppy_posts',JSON.stringify(posts));users.forEach(u=>{if(u.id!==currentUserId)addNotification(u.id,`${currentUser.name} posted: ${p.text.substring(0,30)}...`,'post')});document.getElementById('postText').value='';document.getElementById('preview').style.display='none';document.getElementById('preview').innerHTML='';document.getElementById('fileInput').value='';document.getElementById('postBtn').disabled=true;selectedFile=null;renderFeed();updateStats();updateProfileStats()}
function updateStats(){let v=posts.filter(p=>!p.reports||p.reports<3);document.getElementById('totalPosts').textContent=v.length;document.getElementById('totalLikes').textContent=v.reduce((s,p)=>s+p.likes,0);document.getElementById('activeUsers').textContent=users.length}
function updateProfileStats(){let u=posts.filter(p=>p.userId===currentUserId);document.getElementById('profilePostCount').textContent=u.length;document.getElementById('profileFriendCount').textContent=currentUser.friends.length;document.getElementById('profileLikeCount').textContent=u.reduce((s,p)=>s+p.likes,0);let g=document.getElementById('profilePostsGrid');let n=document.getElementById('noProfilePosts');if(u.length>0){g.innerHTML=u.slice(0,9).map(p=>p.media?`<div class="profile-post-item"><img src="${p.media}"></div>`:`<div class="profile-post-item"></div>`).join('');n.style.display='none'}else{g.innerHTML='';n.style.display='block'}}
function renderFeed(){let f=document.getElementById('feed');let v=posts.filter(p=>!p.reports||p.reports<3);if(v.length===0){f.innerHTML=`<div class="empty-hub"><h3>Welcome to RUPPY Hub</h3><p>Start the conversation. Share your first update!</p><button onclick="openCreate()">Create Post</button></div>`;return}f.innerHTML='';v.forEach(p=>{let m='';if(p.media){if(p.mediaType==='video'){m=`<div class="post-media"><video src="${p.media}" controls></video></div>`}else{m=`<div class="post-media"><img src="${p.media}" ondblclick="likePost(${p.id})"></div>`}}let t=getTimeAgo(p.time);let l=p.likedBy.includes(currentUserId);f.innerHTML+=`<div class="post-card" id="post-${p.id}"><div class="post-card-head"><div class="post-avatar">${p.userPic?`<img src="${p.userPic}">`:p.user[0].toUpperCase()}</div><div class="post-info"><h4>${p.user}</h4><p>${t}</p></div><button class="post-more" onclick="reportPost(${p.id})">⋯</button></div>${p.text?`<div class="post-content">${p.text}</div>`:''}${m}${p.likes>0?`<div class="like-count">👍 ${p.likes}</div>`:''}<div class="post-footer"><button class="fb-action-btn ${l?'liked':''}" onclick="likePost(${p.id})"><svg viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>Like</button><button class="fb-action-btn" onclick="toggleComments(${p.id})"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>Comment</button><button class="fb-action-btn" onclick="sharePost(${p.id})"><svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>Share</button></div><div class="comments-box" id="comments-${p.id}">${p.comments.map(c=>`<div class="comment"><div class="comment-avatar">${c.userPic?`<img src="${c.userPic}">`:c.user[0].toUpperCase()}</div><div class="comment-body"><b>${c.user}</b><span>${c.text}</span></div></div>`).join('')}<div class="comment-input"><input type="text" placeholder="Add a comment..." id="commentInput-${p.id}" onkeypress="if(event.key==='Enter') addComment(${p.id})"><button onclick="addComment(${p.id})">Send</button></div></div></div>`})}
function getTimeAgo(t){let s=Math.floor((Date.now()-t)/1000);if(s<60)return'now';let m=Math.floor(s/60);if(m<60)return`${m}m ago`;let h=Math.floor(m/60);if(h<24)return`${h}h ago`;let d=Math.floor(h/24);return`${d}d ago`}
function likePost(id){let p=posts.find(p=>p.id===id);let i=p.likedBy.indexOf(currentUserId);if(i>-1){p.likedBy.splice(i,1);p.likes--}else{p.likedBy.push(currentUserId);p.likes++;if(p.userId!==currentUserId)addNotification(p.userId,`${currentUser.name} liked your post`,'like')}localStorage.setItem('ruppy_posts',JSON.stringify(posts));renderFeed();updateStats();updateProfileStats()}
function toggleComments(id){let b=document.getElementById(`comments-${id}`);b.style.display=b.style.display==='block'?'none':'block'}
function addComment(id){let i=document.getElementById(`commentInput-${id}`);let t=i.value.trim();if(!t)return;if(checkContent(t)){alert('Inappropriate content');return}let p=posts.find(p=>p.id===id);p.comments.push({user:currentUser.name,userPic:currentUser.profilePic,text:t,time:Date.now()});if(p.userId!==currentUserId)addNotification(p.userId,`${currentUser.name} commented: ${t.substring(0,30)}...`,'comment');localStorage.setItem('ruppy_posts',JSON.stringify(posts));i.value='';renderFeed();document.getElementById(`comments-${id}`).style.display='block'}
function sharePost(id){let p=posts.find(p=>p.id===id);let d={title:'RUPPY Hub Post',text:p.text||'Check this post on RUPPY Hub',url:window.location.href};if(navigator.share){navigator.share(d).catch(e=>console.log('Share failed'))}else{let w=`https://wa.me/?text=${encodeURIComponent(d.text+' '+d.url)}`;window.open(w,'_blank')}}
function reportPost(id){if(confirm('Report this post?')){let p=posts.find(p=>p.id===id);p.reports=(p.reports||0)+1;localStorage.setItem('ruppy_posts',JSON.stringify(posts));alert('Reported');renderFeed();updateStats()}}
function switchTab(t){document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));if(t==='hub'){document.getElementById('hub-tab').classList.add('active');document.getElementById('home-nav-btn').classList.add('active')}else if(t==='friend'){document.getElementById('friend-tab').classList.add('active');document.getElementById('friend-nav-btn').classList.add('active')}else if(t==='notification'){document.getElementById('notification-tab').classList.add('active');document.getElementById('notification-nav-btn').classList.add('active')}else if(t==='profile'){document.getElementById('profile-tab').classList.add('active');document.getElementById('profile-nav-btn').classList.add('active')}}
function renderFriends(){let fr=document.getElementById('friendRequests');let sg=document.getElementById('suggestedFriends');let ou=users.filter(u=>u.id!==currentUserId&&!currentUser.friends.includes(u.id));if(ou.length===0){fr.innerHTML='<div style="padding:40px;text-align:center;color:#666;font-size:13px">No friend requests</div>';sg.innerHTML='<div style="padding:40px;text-align:center;color:#666;font-size:13px">No suggestions yet</div>'}else{fr.innerHTML='';sg.innerHTML=ou.map(u=>`<div class="user-card"><div class="user-card-avatar">${u.profilePic?`<img src="${u.profilePic}">`:u.name[0].toUpperCase()}</div><div class="user-card-info"><h4>${u.name}</h4><p>New user</p></div><button class="user-card-btn" onclick="addFriend('${u.id}')">Add</button></div>`).join('')}}
