<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RUPPY Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}
body{background:#0a0a0a;color:#fff;padding-bottom:70px}
.hub-header{position:sticky;top:0;background:linear-gradient(180deg,#0a0a0a 0%,#0a0a0a 80%,transparent 100%);backdrop-filter:blur(10px);padding:16px 20px;z-index:100;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1a1a}
.hub-logo{display:flex;align-items:center;gap:8px}
.hub-logo h1{font-size:24px;font-weight:800;background:linear-gradient(90deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hub-logo span{font-size:12px;color:#666;background:#1a1a1a;padding:2px 8px;border-radius:10px}
.create-btn{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:10px 16px;color:#000;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 4px 15px rgba(255,215,0,0.3)}
.stats-bar{display:flex;gap:10px;padding:16px 20px;overflow-x:auto}
.stats-bar::-webkit-scrollbar{display:none}
.stat-card{background:linear-gradient(135deg,#1a1a1a,#0d0d0d);border:1px solid #252525;border-radius:16px;padding:12px 16px;min-width:110px;flex-shrink:0;box-shadow:0 4px 10px rgba(0,0,0,0.5)}
.stat-card h3{font-size:20px;font-weight:700;color:#FFD700;margin-bottom:2px}
.stat-card p{font-size:11px;color:#888}
.create-card{margin:0 20px 16px;background:#111;border:1px solid #222;border-radius:20px;padding:16px;box-shadow:0 8px 20px rgba(0,0,0,0.4)}
.create-top{display:flex;gap:12px;align-items:center;margin-bottom:12px}
.create-avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:16px}
.create-card textarea{width:100%;background:#0a0a0a;border:1px solid #222;border-radius:12px;padding:12px;color:#fff;font-size:15px;resize:none;font-family:inherit;min-height:60px}
.create-card textarea::placeholder{color:#555}
.create-actions{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.create-actions.left{display:flex;gap:12px}
.icon-btn{background:#1a1a1a;border:1px solid #333;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer}
.post-btn{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:10px 24px;color:#000;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 4px 15px rgba(255,215,0,0.3)}
.post-btn:disabled{opacity:0.3;cursor:not-allowed}
.feed{padding:0 20px}
.post-card{background:#111;border:1px solid #222;border-radius:24px;margin-bottom:16px;overflow:hidden;transition:0.3s;box-shadow:0 8px 25px rgba(0,0,0,0.6)}
.post-card:active{transform:scale(0.98)}
.post-card-head{padding:16px;display:flex;align-items:center;gap:12px}
.post-avatar{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:16px}
.post-info{flex:1}
.post-info h4{font-size:15px;font-weight:600;margin-bottom:2px}
.post-info p{font-size:12px;color:#666}
.post-more{background:#1a1a1a;border:none;border-radius:8px;width:32px;height:32px;color:#888;font-size:20px;cursor:pointer}
.post-content{padding:0 16px 16px;font-size:15px;line-height:1.5;color:#ddd}
.post-media{width:100%;max-height:400px;background:#0a0a0a;display:flex;align-items:center;justify-content:center;overflow:hidden}
.post-media img,.post-media video{width:100%;height:auto;display:block}
.claim-token-btn{
  width:calc(100% - 32px);
  margin:0 16px 12px;
  background:#4ADE80;
  border:none;
  border-radius:12px;
  padding:14px;
  color:#000;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
  transition:0.2s;
}
.claim-token-btn:active{
  transform:scale(0.97);
  background:#22C55E;
}
.claim-token-btn:disabled{
  background:#1a1a1a;
  color:#555;
  cursor:not-allowed;
  border:1px solid #333;
}
.unclaimed-tag{
  background:#FF6B35;
  color:#fff;
  font-size:10px;
  font-weight:700;
  padding:3px 8px;
  border-radius:8px;
  margin-left:8px;
}
.post-actions{
  display:flex;
  gap:10px;
  padding:0 16px 12px;
}
.action-btn{
  flex:1;
  background:#FEF3C7;
  border:1px solid #FDE68A;
  border-radius:12px;
  padding:10px;
  color:#000;
  font-weight:700;
  font-size:14px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  transition:0.2s;
}
.action-btn:active{
  transform:scale(0.97);
  background:#FDE68A;
}
.action-btn.liked{
  background:#FEE2E2;
  border:1px solid #FCA5A5;
  color:#DC2626;
}
.share-btn:active{transform:scale(0.92);background:#222}
.comments-box{display:none;padding:16px;border-top:1px solid #1a1a1a;background:#0d0d0d;max-height:300px;overflow-y:auto}
.view-more{color:#FFD700;font-size:13px;font-weight:600;padding:8px 0;cursor:pointer;text-align:center;margin-bottom:10px}
.view-more:active{opacity:0.6}
.comment{display:flex;gap:10px;margin-bottom:14px}
.comment-avatar{width:32px;height:32px;border-radius:10px;background:#FFD700;color:#000;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.comment-body{flex:1;background:#1a1a1a;border-radius:12px;padding:10px 12px}
.comment-body b{font-size:13px;font-weight:600;display:block;margin-bottom:2px}
.comment-body span{font-size:14px;line-height:1.4;color:#ddd}
.comment-input{display:flex;gap:10px;padding:12px 16px;border-top:1px solid #1a1a1a}
.comment-input input{flex:1;background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:10px 14px;color:#fff;font-size:14px;outline:none}
.comment-input button{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:10px 16px;color:#000;font-weight:700;font-size:13px;cursor:pointer}
.ruppy-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:1px solid #222;height:60px;display:flex;justify-content:space-around;align-items:center;z-index:999;padding:0 10px}
.nav-btn{background:none;border:none;color:#555;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px 10px;border-radius:12px;transition:0.2s}
.nav-btn.active{color:#FFD700;background:#1a1a1a}
.nav-btn svg{width:22px;height:22px}
.nav-btn span{font-size:9px;font-weight:600}
.empty-hub{text-align:center;padding:80px 40px}
.empty-hub h3{font-size:24px;font-weight:800;margin-bottom:8px;background:linear-gradient(90deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.empty-hub p{font-size:14px;color:#666;margin-bottom:20px}
.empty-hub button{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:12px;padding:14px 28px;color:#000;font-weight:700;font-size:15px;cursor:pointer}
#fileInput{display:none}
.loading{text-align:center;padding:40px;color:#666}
</style>
</head>

<!-- Firebase SDK - REALTIME DATABASE + 4 SYSTEM -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, get, set, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQC0WsVPr63y2xvFMSifnkjAB3TTVcIxU",
  authDomain: "ruppynetwork-50362.firebaseapp.com",
  databaseURL: "https://ruppynetwork-50362-default-rtdb.firebaseio.com",
  projectId: "ruppynetwork-50362",
  storageBucket: "ruppynetwork-50362.firebasestorage.app",
  messagingSenderId: "132064610854",
  appId: "1:132064610854:web:3c217eaf3618007f5934e7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

const bannedWords = ['sex','porn','xxx','nude','fuck','bitch','chut','lund','randi','gand','boobs','dick','pussy','scam','betting','casino','gambling'];
function checkContent(text){
  let lower = text.toLowerCase();
  return bannedWords.some(word => lower.includes(word));
}

let currentUser = localStorage.getItem('ruppy_username') || 'User'+Math.floor(Math.random()*999);
document.getElementById('userAvatar').textContent = currentUser[0].toUpperCase();

let selectedFile = null;
document.getElementById('postText').oninput = function(){
  document.getElementById('postBtn').disabled =!this.value.trim() &&!selectedFile;
}

document.getElementById('fileInput').onchange = function(e){
  selectedFile = e.target.files[0];
  if(selectedFile){
    let reader = new FileReader();
    reader.onload = function(e){
      let preview = document.getElementById('preview');
      preview.style.display = 'block';
      preview.innerHTML = selectedFile.type.includes('video')
    ? `<video src="${e.target.result}" controls style="width:100%;border-radius:12px"></video>`
        : `<img src="${e.target.result}" style="width:100%;border-radius:12px">`;
      document.getElementById('postBtn').disabled = false;
    }
    reader.readAsDataURL(selectedFile);
  }
}

window.openCreate = function(){
  document.getElementById('postText').focus();
}

window.addEmoji = function(){
  document.getElementById('postText').value += ' 🔥';
  document.getElementById('postBtn').disabled = false;
}

// ===== SYSTEM 1: TOKEN + 3 POST LIMIT =====
window.createPost = async function(){
  let text = document.getElementById('postText').value.trim();
  if(!text &&!selectedFile) return;
  if(checkContent(text)){
    alert('Inappropriate content detected');
    return;
  }

  // 3 POST LIMIT CHECK
  let today = new Date().toDateString();
  const userRef = ref(db, `users/${currentUser}`);
  const userSnap = await get(userRef);
  let userData = userSnap.val() || {};

  if(userData.lastPostDate === today && (userData.postsToday || 0) >= 3){
    alert('You can only post 3 times per day. Try again tomorrow!');
    return;
  }

  document.getElementById('postBtn').disabled = true;
  document.getElementById('postBtn').textContent = 'Posting...';

  let mediaUrl = null;
  let mediaType = null;

  try {
    if(selectedFile){
      const storageRef = sRef(storage, `posts/${Date.now()}_${selectedFile.name}`);
      await uploadBytes(storageRef, selectedFile);
      mediaUrl = await getDownloadURL(storageRef);
      mediaType = selectedFile.type.includes('video')? 'video' : 'image';
    }

    await push(ref(db, 'posts'), {
      user: currentUser,
      text: text,
      media: mediaUrl,
      mediaType: mediaType,
      time: Date.now(),
      likes: 0,
      likedBy: {},
      comments: [],
      reports: 0,
      tokens: 0,
      tokenGivenBy: {}
    });

    // Update 3 Post Count
    let newCount = userData.lastPostDate === today? (userData.postsToday || 0) + 1 : 1;
    await update(userRef, {
      postsToday: newCount,
      lastPostDate: today,
      username: currentUser
    });

    document.getElementById('postText').value = '';
    document.getElementById('preview').style.display = 'none';
    document.getElementById('preview').innerHTML = '';
    document.getElementById('fileInput').value = '';
    selectedFile = null;

  } catch (error) {
    alert('Error: ' + error.message);
  }

  document.getElementById('postBtn').disabled = true;
  document.getElementById('postBtn').textContent = 'Post';
}

// REAL-TIME LISTEN - REALTIME DB
onValue(ref(db, 'posts'), (snapshot) => {
  let posts = [];
  let totalLikes = 0;

  snapshot.forEach((childSnapshot) => {
    let post = { id: childSnapshot.key,...childSnapshot.val(), showAllComments: false };
    if(post.reports < 3) {
      posts.unshift(post);
      totalLikes += post.likes || 0;
    }
  });

  updateStats(posts.length, totalLikes);
  renderFeed(posts);
});

function updateStats(postCount, likeCount){
  document.getElementById('totalPosts').textContent = postCount;
  document.getElementById('totalLikes').textContent = likeCount;
}

function renderFeed(posts){
  let feed = document.getElementById('feed');

  if(posts.length === 0){
    feed.innerHTML = `
      <div class="empty-hub">
        <h3>Welcome to RUPPY Hub</h3>
        <p>Start the conversation. Share your first update!</p>
        <button onclick="openCreate()">Create Post</button>
      </div>`;
    return;
  }

  feed.innerHTML = '';
  posts.forEach(post => {
    let mediaHTML = '';
    if(post.media){
      if(post.mediaType === 'video'){
        mediaHTML = `<div class="post-media"><video src="${post.media}" controls></video></div>`;
      } else {
        mediaHTML = `<div class="post-media"><img src="${post.media}" ondblclick="likePost('${post.id}')"></div>`;
      }
    }

    let timeAgo = getTimeAgo(post.time);
    let isLiked = post.likedBy && post.likedBy[currentUser];
    let isClaimed = post.tokenGivenBy && post.tokenGivenBy[currentUser];
    let claimDisabled = isClaimed? 'disabled' : '';
    let claimText = isClaimed? 'Claimed ✓' : 'Claim +10 Token';
    let commentsToShow = post.showAllComments? (post.comments || []) : (post.comments || []).slice(-2);
    let hiddenCount = (post.comments || []).length - commentsToShow.length;
    let glowClass = isClaimed? 'style="box-shadow:0 0 20px rgba(255,215,0,0.6);border-color:#FFD700"' : '';

    feed.innerHTML += `
    <div class="post-card" id="post-${post.id}" ${glowClass}>
      <div class="post-card-head">
        <div class="post-avatar" onclick="openProfile('${post.user}')" style="cursor:pointer">${post.user[0].toUpperCase()}</div>
        <div class="post-info">
          <h4 onclick="openProfile('${post.user}')" style="cursor:pointer">${post.user}</h4>
          <p>${timeAgo}</p>
        </div>
        <button class="post-more" onclick="reportPost('${post.id}')">⋯</button>
      </div>

      ${post.text? `<div class="post-content">${post.text}</div>` : ''}
      ${mediaHTML}

      <button class="claim-token-btn" onclick="claimPostToken('${post.id}')" ${claimDisabled}>${claimText}</button>

      <div class="post-actions">
        <button class="action-btn ${isLiked? 'liked' : ''}" onclick="likePost('${post.id}')">
          <span>Like ❤️ ${post.likes || 0}</span>
        </button>
        <button class="action-btn" onclick="toggleComments('${post.id}')">
          <span>Comment 💬</span>
        </button>
      </div>

      <div class="comments-box" id="comments-${post.id}" style="${isClaimed? 'display:block' : 'display:none'}">
        ${hiddenCount > 0 &&!post.showAllComments? `<div class="view-more" onclick="showAllComments('${post.id}')">View ${hiddenCount} more comments</div>` : ''}

        ${commentsToShow.map(c => `
          <div class="comment">
            <div class="comment-avatar">${c.user[0].toUpperCase()}</div>
            <div class="comment-body">
              <b>${c.user}</b>
              <span>${c.text}</span>
            </div>
          </div>`).join('')}

        <div class="comment-input">
          <input type="text" placeholder="Add a comment..." id="commentInput-${post.id}" onkeypress="if(event.key==='Enter') addComment('${post.id}')">
          <button onclick="addComment('${post.id}')">Send</button>
        </div>
      </div>
    </div>`;
  });
}

function getTimeAgo(time){
  if(!time || isNaN(time)) return '';
  let seconds = Math.floor((Date.now() - Number(time)) / 1000);
  if(seconds < 60) return 'now';
  let minutes = Math.floor(seconds / 60);
  if(minutes < 60) return `${minutes}m ago`;
  let hours = Math.floor(minutes / 60);
  if(hours < 24) return `${hours}h ago`;
  let days = Math.floor(hours / 24);
  if(days < 7) return `${days}d ago`;
  return new Date(time).toLocaleDateString();
}

// LIKE POST - REALTIME DB
window.claimPostToken = async function(id){
  const postRef = ref(db, `posts/${id}`);
  const snapshot = await get(postRef);
  const post = snapshot.val();

  if(post.tokenGivenBy && post.tokenGivenBy[currentUser]){
    alert('You already claimed tokens for this post');
    return;
  }

  await update(ref(db), {
    [`posts/${id}/tokens`]: (post.tokens || 0) + 10,
    [`posts/${id}/tokenGivenBy/${currentUser}`]: true
  });

  document.getElementById(`post-${id}`).style.boxShadow = '0 0 20px rgba(255,215,0,0.6)';
  document.getElementById(`post-${id}`).style.borderColor = '#FFD700';
  document.getElementById(`comments-${id}`).style.display = 'block';
}
window.likePost = async function(id){
  const postRef = ref(db, `posts/${id}`);
  const snapshot = await get(postRef);
  const post = snapshot.val();

  let isLiked = post.likedBy && post.likedBy[currentUser];
  let updates = {};

  if(isLiked){
    updates[`posts/${id}/likes`] = (post.likes || 0) - 1;
    updates[`posts/${id}/likedBy/${currentUser}`] = null;
  } else {
    updates[`posts/${id}/likes`] = (post.likes || 0) + 1;
    updates[`posts/${id}/likedBy/${currentUser}`] = true;
  }

  await update(ref(db), updates);
}

// ===== SYSTEM 2: TOKEN + GLOW/THREAD =====
window.giveToken = async function(id){
  const postRef = ref(db, `posts/${id}`);
  const snapshot = await get(postRef);
  const post = snapshot.val();

  if(post.tokenGivenBy && post.tokenGivenBy[currentUser]){
    alert('You already gave token to this post');
    return;
  }

  await update(ref(db), {
    [`posts/${id}/tokens`]: (post.tokens || 0) + 10,
    [`posts/${id}/tokenGivenBy/${currentUser}`]: true
  });

  // Auto open thread
  document.getElementById(`comments-${id}`).style.display = 'block';
}

window.toggleComments = function(id){
  let box = document.getElementById(`comments-${id}`);
  box.style.display = box.style.display === 'block'? 'none' : 'block';
}

window.showAllComments = function(id){
  document.getElementById(`comments-${id}`).style.display = 'block';
}

// ADD COMMENT - REALTIME DB
window.addComment = async function(id){
  let input = document.getElementById(`commentInput-${id}`);
  let text = input.value.trim();
  if(!text) return;
  if(checkContent(text)){
    alert('Inappropriate content');
    return;
  }

  const postRef = ref(db, `posts/${id}`);
  const snapshot = await get(postRef);
  const post = snapshot.val();
  const comments = post.comments || [];

  comments.push({user: currentUser, text: text, time: Date.now()});

  await update(postRef, { comments: comments });
  input.value = '';
}

window.sharePost = function(id){
  let shareData = {
    title: 'RUPPY Hub Post',
    text: 'Check this post on RUPPY Hub',
    url: window.location.href
  };

  if(navigator.share){
    navigator.share(shareData).catch(err => console.log('Share failed'));
  } else {
    let whatsappUrl = `https://wa.me/?text=${encodeURIComponent(shareData.text + ' ' + shareData.url)}`;
    window.open(whatsappUrl, '_blank');
  }
}

// REPORT POST - REALTIME DB
window.reportPost = async function(id){
  if(confirm('Report this post?')){
    const postRef = ref(db, `posts/${id}`);
    const snapshot = await get(postRef);
    const post = snapshot.val();

    await update(postRef, { reports: (post.reports || 0) + 1 });
    alert('Reported');
  }
}
