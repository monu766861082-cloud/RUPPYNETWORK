<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RUPPY Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}
body{background:#0a0a0a;color:#fff;padding-bottom:70px}

/* Header - RUPPY Style */
.hub-header{position:sticky;top:0;background:linear-gradient(180deg,#0a0a0a 0%,#0a0a0a 80%,transparent 100%);backdrop-filter:blur(10px);padding:16px 20px;z-index:100;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1a1a}
.hub-logo{display:flex;align-items:center;gap:8px}
.back-arrow{background:none;border:none;color:#FFD700;font-size:24px;cursor:pointer;padding:0 8px 0 0;margin-left:-8px}
.back-arrow:active{opacity:0.6}
.hub-logo h1{font-size:24px;font-weight:800;background:linear-gradient(90deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hub-logo span{font-size:12px;color:#666;background:#1a1a1a;padding:2px 8px;border-radius:10px}
.create-btn{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:10px 16px;color:#000;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 4px 15px rgba(255,215,0,0.3)}

/* Stats Bar */
.stats-bar{display:flex;gap:10px;padding:16px 20px;overflow-x:auto}
.stats-bar::-webkit-scrollbar{display:none}
.stat-card{background:linear-gradient(135deg,#1a1a1a,#0d0d0d);border:1px solid #252525;border-radius:16px;padding:12px 16px;min-width:110px;flex-shrink:0;box-shadow:0 4px 10px rgba(0,0,0,0.5)}
.stat-card h3{font-size:20px;font-weight:700;color:#FFD700;margin-bottom:2px}
.stat-card p{font-size:11px;color:#888}

/* Create Post Card */
.create-card{margin:0 20px 16px;background:#111;border:1px solid #222;border-radius:20px;padding:16px;box-shadow:0 8px 20px rgba(0,0,0,0.4)}
.create-top{display:flex;gap:12px;align-items:center;margin-bottom:12px}
.create-avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:16px;overflow:hidden}
.create-avatar img{width:100%;height:100%;object-fit:cover}
.create-card textarea{width:100%;background:#0a0a0a;border:1px solid #222;border-radius:12px;padding:12px;color:#fff;font-size:15px;resize:none;font-family:inherit;min-height:60px}
.create-card textarea::placeholder{color:#555}
.create-actions{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.create-actions.left{display:flex;gap:12px}
.icon-btn{background:#1a1a1a;border:1px solid #333;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer}
.post-btn{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:10px 24px;color:#000;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 4px 15px rgba(255,215,0,0.3)}
.post-btn:disabled{opacity:0.3;cursor:not-allowed}

/* Feed */
.feed{padding:0 20px}
.post-card{background:#111;border:1px solid #222;border-radius:24px;margin-bottom:16px;overflow:hidden;transition:0.3s;box-shadow:0 8px 25px rgba(0,0,0,0.6)}
.post-card:active{transform:scale(0.98)}
.post-card-head{padding:16px;display:flex;align-items:center;gap:12px}
.post-avatar{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:16px;overflow:hidden}
.post-avatar img{width:100%;height:100%;object-fit:cover}
.post-info{flex:1}
.post-info h4{font-size:15px;font-weight:600;margin-bottom:2px}
.post-info p{font-size:12px;color:#666}
.post-more{background:#1a1a1a;border:none;border-radius:8px;width:32px;height:32px;color:#888;font-size:20px;cursor:pointer}

.post-content{padding:0 16px 16px;font-size:15px;line-height:1.5;color:#ddd}
.post-media{width:100%;max-height:400px;background:#0a0a0a;display:flex;align-items:center;justify-content:center;overflow:hidden}
.post-media img,.post-media video{width:100%;height:auto;display:block}

/* PROFILE TAB & DETAILS (Screenshot Style) */
.profile-cover{width:100%;height:140px;background:linear-gradient(135deg,#FFD700,#FFA500);position:relative}
.profile-dp{width:90px;height:90px;border-radius:24px;background:#222;border:4px solid #0a0a0a;position:absolute;bottom:-45px;left:20px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#000;font-size:32px;overflow:hidden}
.profile-dp img{width:100%;height:100%;object-fit:cover}
.profile-info{padding:55px 20px 16px}
.profile-info h2{font-size:24px;font-weight:800;margin-bottom:4px}
.profile-info p.bio-text{font-size:14px;color:#888;margin-bottom:15px}

.personal-details-list{margin-top:20px;display:flex;flex-direction:column;gap:12px}
.detail-row{display:flex;align-items:center;gap:12px;color:#ccc;font-size:14px}
.detail-row span.icon{font-size:18px;width:24px;text-align:center}

/* EDIT MODAL OVERLAY (Facebook/Screenshot Style) */
.edit-modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;z-index:9999;display:none;flex-direction:column;overflow-y:auto}
.edit-modal-header{padding:16px 20px;display:flex;align-items:center;border-bottom:1px solid #1a1a1a;position:sticky;top:0;background:#0a0a0a;z-index:10}
.edit-modal-header button{background:none;border:none;color:#fff;font-size:20px;margin-right:20px}
.edit-modal-body{padding:20px}
.edit-section{margin-bottom:30px}
.edit-section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.edit-section-title h3{font-size:18px;font-weight:700}
.edit-input-group{margin-bottom:15px}
.edit-input-group label{display:block;font-size:12px;color:#666;margin-bottom:5px;text-transform:uppercase}
.edit-input-group input, .edit-input-group textarea, .edit-input-group select{width:100%;background:#111;border:1px solid #222;padding:12px;color:#fff;border-radius:10px;outline:none;font-family:inherit}

.save-full-btn{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;width:100%;padding:16px;border-radius:12px;color:#000;font-weight:800;font-size:16px;margin-top:20px;cursor:pointer}

/* Bottom Nav */
.ruppy-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:1px solid #222;height:65px;display:flex;justify-content:space-around;align-items:center;z-index:999}
.nav-btn{background:none;border:none;color:#FFE55C;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;opacity:0.7}
.nav-btn.active{color:#FFD700;opacity:1}
.nav-btn svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:2}
</style>
</head>
<body>

<div class="hub-header">
  <div class="hub-logo">
    <button class="back-arrow" onclick="exitApp()">←</button>
    <h1>RUPPY</h1><span>HUB</span>
  </div>
  <button class="create-btn" onclick="switchTab('hub')">✨ Create</button>
</div>

<div id="hub-tab" class="tab-content active">
  <div class="stats-bar">
    <div class="stat-card"><h3 id="totalPosts">0</h3><p>Total Posts</p></div>
    <div class="stat-card"><h3 id="totalLikes">0</h3><p>Total Likes</p></div>
    <div class="stat-card"><h3>1</h3><p>Active Now</p></div>
  </div>
  <div class="feed" id="feed"></div>
</div>

<div id="profile-tab" class="tab-content">
  <div class="profile-cover">
    <div class="profile-dp" id="main-profile-dp">U</div>
  </div>
  <div class="profile-info">
    <h2 id="display-name">User847</h2>
    <p class="bio-text" id="display-bio">Living life one post at a time ✨</p>
    
    <div class="personal-details-list">
      <div class="detail-row"><span class="icon">📍</span> <span id="display-city">City not set</span></div>
      <div class="detail-row"><span class="icon">🏠</span> <span id="display-hometown">Hometown not set</span></div>
      <div class="detail-row"><span class="icon">❤️</span> <span id="display-rel">Relationship Status</span></div>
      <div class="detail-row"><span class="icon">💼</span> <span id="display-work">Work Experience</span></div>
      <div class="detail-row"><span class="icon">🎓</span> <span id="display-edu">Education</span></div>
      <div class="detail-row"><span class="icon">🎮</span> <span id="display-hobbies">Hobbies</span></div>
    </div>

    <button class="profile-btn" onclick="openEditModal()" style="width:100%; background:#1a1a1a; color:#FFD700; border:1px solid #333; padding:12px; border-radius:12px; margin-top:20px; font-weight:700">Edit Profile</button>
  </div>
</div>

<div class="edit-modal-overlay" id="fullEditModal">
  <div class="edit-modal-header">
    <button onclick="closeEditModal()">✕</button>
    <h3>Edit Profile</h3>
  </div>
  <div class="edit-modal-body">
    
    <div class="edit-section">
      <div class="edit-section-title"><h3>Intro</h3></div>
      <div class="edit-input-group">
        <label>Profile Picture</label>
        <input type="file" id="edit-photo" accept="image/*">
      </div>
      <div class="edit-input-group">
        <label>Full Name</label>
        <input type="text" id="edit-name">
      </div>
      <div class="edit-input-group">
        <label>About You (Bio)</label>
        <textarea id="edit-bio" rows="2"></textarea>
      </div>
    </div>

    <div class="edit-section">
      <div class="edit-section-title"><h3>Personal details</h3></div>
      <div class="edit-input-group"><label>Current city or town</label><input type="text" id="edit-city"></div>
      <div class="edit-input-group"><label>Hometown</label><input type="text" id="edit-hometown"></div>
      <div class="edit-input-group"><label>Relationship status</label><input type="text" id="edit-rel"></div>
      <div class="edit-input-group">
        <label>Gender</label>
        <select id="edit-gender"><option value="Male">Male</option><option value="Female">Female</option></select>
      </div>
    </div>

    <div class="edit-section">
      <div class="edit-section-title"><h3>Work & Education</h3></div>
      <div class="edit-input-group"><label>Work experience</label><input type="text" id="edit-work"></div>
      <div class="edit-input-group"><label>High school or college</label><input type="text" id="edit-edu"></div>
    </div>

    <div class="edit-section">
      <div class="edit-section-title"><h3>Hobbies</h3></div>
      <div class="edit-input-group"><label>Add Hobbies</label><input type="text" id="edit-hobbies" placeholder="e.g. Music, Gaming, Travel"></div>
    </div>

    <button class="save-full-btn" onclick="saveProfileData()">Save All Changes</button>
    <div style="height:50px"></div>
  </div>
</div>

<div class="ruppy-nav">
  <button class="nav-btn active" id="home-btn" onclick="switchTab('hub')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path></svg><span>Home</span></button>
  <button class="nav-btn" id="profile-btn" onclick="switchTab('profile')"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span>Profile</span></button>
</div>

<script>
// Base Data System
let posts = JSON.parse(localStorage.getItem('ruppy_posts') || '[]');
let user = JSON.parse(localStorage.getItem('ruppy_user_pro')) || {
    name: 'User847',
    bio: 'Living life...',
    city: 'Not Set',
    hometown: 'Not Set',
    rel: 'Single',
    work: 'Not Set',
    edu: 'Not Set',
    hobbies: 'Not Set',
    photo: ''
};

function exitApp(){ window.history.back(); }

function updateUI() {
    document.getElementById('display-name').textContent = user.name;
    document.getElementById('display-bio').textContent = user.bio;
    document.getElementById('display-city').textContent = user.city;
    document.getElementById('display-hometown').textContent = user.hometown;
    document.getElementById('display-rel').textContent = user.rel;
    document.getElementById('display-work').textContent = user.work;
    document.getElementById('display-edu').textContent = user.edu;
    document.getElementById('display-hobbies').textContent = user.hobbies;
    
    if(user.photo) {
        document.getElementById('main-profile-dp').innerHTML = `<img src="${user.photo}">`;
    } else {
        document.getElementById('main-profile-dp').textContent = user.name[0].toUpperCase();
    }
}

function openEditModal() {
    document.getElementById('fullEditModal').style.display = 'flex';
    document.getElementById('edit-name').value = user.name;
    document.getElementById('edit-bio').value = user.bio;
    document.getElementById('edit-city').value = user.city;
    document.getElementById('edit-hometown').value = user.hometown;
    document.getElementById('edit-rel').value = user.rel;
    document.getElementById('edit-work').value = user.work;
    document.getElementById('edit-edu').value = user.edu;
    document.getElementById('edit-hobbies').value = user.hobbies;
}

function closeEditModal() { document.getElementById('fullEditModal').style.display = 'none'; }

function saveProfileData() {
    user.name = document.getElementById('edit-name').value;
    user.bio = document.getElementById('edit-bio').value;
    user.city = document.getElementById('edit-city').value;
    user.hometown = document.getElementById('edit-hometown').value;
    user.rel = document.getElementById('edit-rel').value;
    user.work = document.getElementById('edit-work').value;
    user.edu = document.getElementById('edit-edu').value;
    user.hobbies = document.getElementById('edit-hobbies').value;

    const photoFile = document.getElementById('edit-photo').files[0];
    if(photoFile) {
        const reader = new FileReader();
        reader.onload = function(e) {
            user.photo = e.target.result;
            finishSave();
        };
        reader.readAsDataURL(photoFile);
    } else { finishSave(); }
}

function finishSave() {
    localStorage.setItem('ruppy_user_pro', JSON.stringify(user));
    updateUI();
    closeEditModal();
}

function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tab + '-tab').classList.add('active');
    document.getElementById(tab + '-btn').classList.add('active');
}

// Initial Run
updateUI();
</script>
</body>
</html>
