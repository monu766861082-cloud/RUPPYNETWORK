<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RUPPY Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}
body{background:#0a0a0a;color:#fff;padding-bottom:70px}

/* HEADER WITH CORNER BUTTON */
.hub-header{position:sticky;top:0;background:#0a0a0a;padding:16px 20px;z-index:1000;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1a1a}
.hub-logo{display:flex;align-items:center;gap:8px}
.back-arrow{background:none;border:none;color:#FFD700;font-size:24px;cursor:pointer}
.hub-logo h1{font-size:24px;font-weight:800;background:linear-gradient(90deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hub-logo span{font-size:12px;color:#666;background:#1a1a1a;padding:2px 8px;border-radius:10px}

/* NEW CORNER CREATE BUTTON */
.corner-create-btn {
    background: linear-gradient(135deg,#FFD700,#FFA500);
    border: none; border-radius: 10px; padding: 8px 14px;
    color: #000; font-weight: 700; font-size: 13px;
    cursor: pointer; display: block; /* Default Home par dikhega */
}

.stats-bar{display:flex;gap:10px;padding:16px 20px;overflow-x:auto}
.stats-bar::-webkit-scrollbar{display:none}
.stat-card{background:#1a1a1a;border:1px solid #252525;border-radius:16px;padding:12px 16px;min-width:110px;flex-shrink:0}
.stat-card h3{font-size:20px;font-weight:700;color:#FFD700;margin-bottom:2px}
.stat-card p{font-size:11px;color:#888}

.feed{padding:0 20px}
.post-card{background:#111;border:1px solid #222;border-radius:24px;margin-bottom:16px;overflow:hidden}
.post-card-head{padding:16px;display:flex;align-items:center;gap:12px}
.post-avatar{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:16px;overflow:hidden;flex-shrink:0}
.post-avatar img{width:100%;height:100%;object-fit:cover}
.post-info{flex:1}
.post-info h4{font-size:15px;font-weight:600;margin-bottom:2px}
.post-info p{font-size:12px;color:#666}

/* CREATE CARD - Ab ye sirf Home par dikhega */
.create-card{margin:16px 20px;background:#111;border:1px solid #222;border-radius:20px;padding:16px}
.create-top{display:flex;gap:12px;align-items:center;margin-bottom:12px}
.create-avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:16px;overflow:hidden;flex-shrink:0}
.create-card textarea{width:100%;background:#0a0a0a;border:1px solid #222;border-radius:12px;padding:12px;color:#fff;font-size:15px;resize:none;min-height:60px;outline:none}
.create-actions{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.post-btn{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:10px 24px;color:#000;font-weight:700;font-size:14px;cursor:pointer}

/* NAV STYLES */
.tab-content{display:none}
.tab-content.active{display:block}
.ruppy-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:1px solid #222;height:65px;display:flex;justify-content:space-around;align-items:center;z-index:999}
.nav-btn{background:none;border:none;color:#FFE55C;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;opacity:0.7}
.nav-btn.active{color:#FFD700;opacity:1}
.nav-btn svg{width:24px;height:24px;stroke-width:2;fill:none;stroke:currentColor}
</style>
</head>
<body>

<div class="hub-header">
  <div class="hub-logo">
    <button class="back-arrow" onclick="exitApp()">←</button>
    <h1>RUPPY</h1><span>HUB</span>
  </div>
  <button class="corner-create-btn" id="mainCreateBtn" onclick="focusCreate()">✨ Create Post</button>
</div>

<div id="hub-tab" class="tab-content active">
  <div class="stats-bar">
    <div class="stat-card"><h3>0</h3><p>Total Posts</p></div>
    <div class="stat-card"><h3>0</h3><p>Total Likes</p></div>
    <div class="stat-card"><h3>1</h3><p>Active Now</p></div>
  </div>

  <div class="feed" id="feed">
    <div style="text-align:center; padding:50px; color:#444;">No posts yet.</div>
  </div>

  <div class="create-card" id="createArea">
    <div class="create-top">
      <div class="create-avatar">U</div>
      <textarea id="postText" placeholder="Write something..."></textarea>
    </div>
    <div class="create-actions">
      <span>📷 Photo/Video</span>
      <button class="post-btn">Post</button>
    </div>
  </div>
</div>

<div id="friend-tab" class="tab-content"><div style="padding:20px">Friend Requests</div></div>
<div id="notification-tab" class="tab-content"><div style="padding:20px">Notifications</div></div>
<div id="profile-tab" class="tab-content"><div style="padding:20px">My Profile</div></div>

<div class="ruppy-nav">
  <button class="nav-btn active" onclick="switchTab('hub')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path></svg><span>Home</span></button>
  <button class="nav-btn" onclick="switchTab('friend')"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg><span>Friend</span></button>
  <button class="nav-btn" onclick="switchTab('notification')"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"></path></svg><span>Notif</span></button>
  <button class="nav-btn" onclick="switchTab('profile')"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span>Profile</span></button>
</div>

<script>
function switchTab(t) {
    // Hide all tabs
    document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    
    // Show selected tab
    document.getElementById(t + '-tab').classList.add('active');
    
    // CORNER BUTTON HIDE/SHOW LOGIC
    const cornerBtn = document.getElementById('mainCreateBtn');
    if(t === 'hub') {
        cornerBtn.style.display = 'block';
    } else {
        cornerBtn.style.display = 'none';
    }
}

function focusCreate() {
    // Scroll to writing area
    document.getElementById('createArea').scrollIntoView({ behavior: 'smooth' });
    document.getElementById('postText').focus();
}

function exitApp(){ window.history.back(); }
</script>
</body>
</html>
