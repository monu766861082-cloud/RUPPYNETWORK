<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RUPPY Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
    /* CSS वही पुरानी वाली है, बस बटन की सेटिंग बदली है */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
    body { background: #0a0a0a; color: #fff; padding-bottom: 75px; }

    .hub-header { 
        position: sticky; top: 0; background: #0a0a0a; padding: 16px 20px; 
        z-index: 1000; display: flex; justify-content: space-between; 
        align-items: center; border-bottom: 1px solid #1a1a1a; 
    }
    .hub-logo h1 { 
        font-size: 24px; font-weight: 800; 
        background: linear-gradient(90deg, #FFD700, #FFA500); 
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
    }

    /* CREATE POST BUTTON (Corner Style) */
    #topCreateBtn {
        background: linear-gradient(135deg, #FFD700, #FFA500);
        border: none; border-radius: 10px; padding: 8px 14px;
        color: #000; font-weight: 700; font-size: 13px;
        cursor: pointer; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        display: block; /* Default Home par dikhega */
    }

    /* Tabs & Content */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Baki saare styles (Profile, Stats, Nav) wahi hain jo pehle the */
    .stats-bar { display: flex; gap: 12px; padding: 15px 20px; overflow-x: auto; }
    .stat-card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 12px 16px; min-width: 110px; text-align: center; }
    .stat-card h3 { color: #FFD700; }
    
    .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; border-top: 1px solid #1a1a1a; display: flex; justify-content: space-around; padding: 12px; }
    .nav-item { text-align: center; color: #555; font-size: 10px; cursor: pointer; }
    .nav-item.active { color: #FFD700; }
    .nav-item svg { width: 24px; height: 24px; }
</style>
</head>
<body>

    <div class="hub-header">
        <div class="hub-logo"><h1>RUPPY</h1></div>
        <button id="topCreateBtn" onclick="openCreatePost()">✨ Create Post</button>
    </div>

    <div id="hub" class="tab-content active">
        <div class="stats-bar">
            <div class="stat-card"><h3>0</h3><p>Total Posts</p></div>
            <div class="stat-card"><h3>0</h3><p>Total Likes</p></div>
            <div class="stat-card"><h3>1</h3><p>Active Now</p></div>
        </div>
        <div id="mainFeed" style="padding:20px; text-align:center; color:#444;">Home Feed...</div>
    </div>

    <div id="friends" class="tab-content">
        <div style="padding:20px;"><h2>Friends</h2></div>
    </div>

    <div id="notifications" class="tab-content">
        <div style="padding:20px;"><h2>Notifications</h2></div>
    </div>

    <div id="profile" class="tab-content">
        <div style="padding:20px;"><h2>My Profile</h2></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('hub', this)">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><div>Home</div>
        </div>
        <div class="nav-item" onclick="switchTab('friends', this)">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg><div>Friends</div>
        </div>
        <div class="nav-item" onclick="switchTab('profile', this)">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><div>Profile</div>
        </div>
    </nav>

    <script>
        function switchTab(tabId, el) {
            // Saare content hide karo
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            // Selected tab dikhao
            document.getElementById(tabId).classList.add('active');
            if(el) el.classList.add('active');

            // BUTTON LOGIC: Agar Home (hub) hai toh dikhao, warna chhupa do
            const createBtn = document.getElementById('topCreateBtn');
            if(tabId === 'hub') {
                createBtn.style.display = 'block';
            } else {
                createBtn.style.display = 'none';
            }
        }

        function openCreatePost() {
            alert("Create Post Page Opening...");
            // Yahan tu apna post banane wala code/modal daal sakta hai
        }
    </script>
</body>
</html>
