<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruppy Network Hub</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    min-height: 100vh;
}
.container {
    max-width: 480px;
    margin: 0 auto;
    background: #1a1a1a;
    min-height: 100vh;
    position: relative;
    padding-bottom: 80px;
}
.header {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #1a1a1a;
    font-weight: bold;
    position: sticky;
    top: 0;
    z-index: 100;
}
.user-info { display: flex; align-items: center; gap: 10px; }
.avatar {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    background: #1a1a1a;
    color: #FFD700;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}
.balance { font-size: 16px; }
.main-content { padding: 15px; }
.stats-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 15px;
}
.stat-card {
    background: #2a2a2a;
    padding: 12px 8px;
    border-radius: 10px;
    text-align: center;
    border: 1px solid #3a3a3a;
}
.stat-number {
    font-size: 18px;
    font-weight: bold;
    color: #FFD700;
    margin-bottom: 3px;
}
.stat-label {
    font-size: 11px;
    color: #aaa;
    line-height: 1.2;
}
.balance-card .stat-number {
    font-size: 20px;
}
.balance-card .reward-label {
    font-size: 11px;
    color: #FFA500;
    margin-bottom: 5px;
}
.create-post {
    background: #2a2a2a;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    border: 1px solid #3a3a3a;
}
.post-input {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #3a3a3a;
    border-radius: 8px;
    padding: 12px;
    color: #e0e0e0;
    resize: none;
    font-family: inherit;
    margin-bottom: 10px;
}
.post-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.char-count { font-size: 12px; color: #888; }
.post-btn {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #1a1a1a;
    border: none;
    padding: 8px 20px;
    border-radius: 20px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s;
}
.post-btn:hover { transform: scale(1.05); }
.post-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.posts-container {
    scroll-snap-type: y mandatory;
    overflow-y: auto;
    height: calc(100vh - 350px);
}
.post-card {
    background: #2a2a2a;
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 15px;
    border: 1px solid #3a3a3a;
    scroll-snap-align: start;
    min-height: calc(100vh - 350px);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}
.post-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
}
.post-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 16px;
}
.post-user-info { flex: 1; }
.post-username { font-weight: bold; font-size: 14px; }
.post-time { font-size: 12px; color: #888; }
.post-content {
    margin-bottom: 15px;
    line-height: 1.5;
    font-size: 15px;
    flex: 1;
}
.post-stats {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 12px;
    border-top: 1px solid #3a3a3a;
}
.like-section {
    display: flex;
    align-items: center;
    gap: 15px;
}
.like-btn {
    background: none;
    border: none;
    color: #888;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 14px;
    transition: color 0.2s;
}
.like-btn.liked { color: #ff4757; }
.like-btn:hover { color: #ff4757; }
.claim-btn {
    background: linear-gradient(135deg, #4CAF50, #45a049);
    color: white;
    border: none;
    padding: 6px 15px;
    border-radius: 15px;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s;
}
.claim-btn:hover { transform: scale(1.05); }
.claim-btn:disabled {
    background: #555;
    cursor: not-allowed;
    transform: none;
}
.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: #2a2a2a;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
    border-top: 1px solid #3a3a3a;
    z-index: 100;
}
.nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: #888;
    text-decoration: none;
    font-size: 12px;
    cursor: pointer;
}
.nav-item.active { color: #FFD700; }
.nav-icon { font-size: 20px; }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="user-info">
            <div class="avatar" id="userAvatar">U</div>
            <span id="username">User</span>
        </div>
        <div class="balance" id="headerBalance">0 RUPPY</div>
    </div>

    <div class="main-content">
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-number" id="totalPosts">0</div>
                <div class="stat-label">Total Posts</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalLikes">0</div>
                <div class="stat-label">Total Likes</div>
            </div>
            <div class="stat-card balance-card">
                <div class="reward-label">My Reward: <span id="lastReward">0</span></div>
                <div class="stat-label">TOTAL BALANCE</div>
                <div class="stat-number" id="totalBalance">0 RUPPY</div>
            </div>
        </div>

        <div class="create-post">
            <textarea class="post-input" id="postInput" placeholder="Share your thoughts..." maxlength="500" rows="3"></textarea>
            <div class="post-actions">
                <span class="char-count" id="charCount">0/500</span>
                <button class="post-btn" id="postBtn" disabled>Post</button>
            </div>
        </div>

        <div class="posts-container" id="postsContainer"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active">
            <div class="nav-icon">🏠</div>
            <span>Home</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">👥</div>
            <span>Friend</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">🔔</div>
            <span>Notif</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">👤</div>
            <span>Profile</span>
        </div>
    </div>
</div>

<script>
let userData = {
    username: 'RuppyUser',
    avatar: 'R',
    tokens: 250,
    lastReward: 0,
    posts: [],
    likedPosts: []
};

// Load from localStorage
function loadUserData() {
    const saved = localStorage.getItem('ruppy_pro');
    if (saved) {
        const parsed = JSON.parse(saved);
        userData = { ...userData, ...parsed };
    }
    updateUI();
}

// Save to localStorage
function saveUserData() {
    localStorage.setItem('ruppy_pro', JSON.stringify(userData));
    // Trigger storage event for other tabs
    window.dispatchEvent(new Event('storage'));
}

// Listen for changes from other tabs/pages
window.addEventListener('storage', (e) => {
    if (e.key === 'ruppy_pro') {
        loadUserData();
    }
});

function updateUI() {
    document.getElementById('userAvatar').textContent = userData.avatar;
    document.getElementById('username').textContent = userData.username;
    document.getElementById('headerBalance').textContent = userData.tokens + ' RUPPY';
    document.getElementById('totalPosts').textContent = userData.posts.length;
    document.getElementById('totalLikes').textContent = userData.likedPosts.length;
    document.getElementById('lastReward').textContent = userData.lastReward;
    document.getElementById('totalBalance').textContent = userData.tokens + ' RUPPY';
}

function createPost() {
    const input = document.getElementById('postInput');
    const content = input.value.trim();
    if (!content) return;

    const post = {
        id: Date.now(),
        username: userData.username,
        avatar: userData.avatar,
        content: content,
        time: 'Just now',
        likes: 0,
        claimed: false,
        liked: false
    };

    userData.posts.unshift(post);
    input.value = '';
    document.getElementById('charCount').textContent = '0/500';
    document.getElementById('postBtn').disabled = true;
    
    saveUserData();
    renderPosts();
}

function toggleLike(postId) {
    const post = userData.posts.find(p => p.id === postId);
    if (!post) return;

    if (post.liked) {
        post.likes--;
        post.liked = false;
        userData.likedPosts = userData.likedPosts.filter(id => id !== postId);
    } else {
        post.likes++;
        post.liked = true;
        userData.likedPosts.push(postId);
    }

    saveUserData();
    renderPosts();
}

function claimReward(postId) {
    const post = userData.posts.find(p => p.id === postId);
    if (!post || post.claimed) return;

    const reward = 10;
    post.claimed = true;
    userData.lastReward = reward;
    userData.tokens += reward;

    saveUserData();
    updateUI();
    renderPosts();
}

function renderPosts() {
    const container = document.getElementById('postsContainer');
    if (userData.posts.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:40px;color:#888;">No posts yet. Create your first post!</div>';
        return;
    }

    container.innerHTML = userData.posts.map(post => `
        <div class="post-card">
            <div>
                <div class="post-header">
                    <div class="post-avatar">${post.avatar}</div>
                    <div class="post-user-info">
                        <div class="post-username">${post.username}</div>
                        <div class="post-time">${post.time}</div>
                    </div>
                <div class="post-content">${post.content}</div>
            </div>
            <div class="post-stats">
                <div class="like-section">
                    <button class="like-btn ${post.liked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                        ❤️ ${post.likes}
                    </button>
                </div>
                <button class="claim-btn" onclick="claimReward(${post.id})" ${post.claimed ? 'disabled' : ''}>
                    ${post.claimed ? 'Claimed' : 'Claim +10'}
                </button>
            </div>
        </div>
    `).join('');
}

// Event Listeners
document.getElementById('postInput').addEventListener('input', (e) => {
    const len = e.target.value.length;
    document.getElementById('charCount').textContent = len + '/500';
    document.getElementById('postBtn').disabled = len === 0;
});

document.getElementById('postBtn').addEventListener('click', createPost);

document.getElementById('postInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        createPost();
    }
});

// Init
loadUserData();
renderPosts();
</script>
</body>
</html>
