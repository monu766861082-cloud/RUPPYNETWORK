<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RUPPY Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}
body{background:#0a0a0a;color:#fff;padding-bottom:70px}

/* HEADER */
.hub-header{position:sticky;top:0;background:#0a0a0a;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1a1a}
.hub-logo h1{font-size:24px;font-weight:800;color:#FFD700}

.user-bar{padding:10px 20px;border-bottom:1px solid #1a1a1a}
.user-bar button{margin-left:10px}

/* CREATE */
.create-card{margin:15px;background:#111;padding:15px;border-radius:15px}
.create-card textarea{width:100%;background:#000;border:1px solid #222;color:#fff;padding:10px;border-radius:10px}
.post-btn{background:gold;border:none;padding:10px 20px;margin-top:10px}

/* POSTS */
.post{background:#111;margin:15px;border-radius:15px;padding:15px}
.post h4{cursor:pointer}
.btn{margin-top:10px;padding:6px 10px;border:none;background:gold;color:#000}

/* NAV */
.ruppy-nav{position:fixed;bottom:0;left:0;right:0;background:#000;border-top:1px solid #222;height:60px;display:flex;justify-content:space-around;align-items:center}
</style>
</head>

<body>

<!-- HEADER -->
<div class="hub-header">
  <h1>RUPPY HUB</h1>
</div>

<!-- USER INFO -->
<div class="user-bar">
  <b>User ID:</b> <span id="userId"></span>
  <button onclick="editProfile()">Edit</button>
  <div style="color:gold;margin-top:5px">
    Tokens: <span id="tokenCount">0</span>
  </div>
</div>

<!-- CREATE POST -->
<div class="create-card">
  <textarea id="postText" placeholder="Write something..."></textarea>
  <button class="post-btn" onclick="createPost()">Post</button>
</div>

<!-- FEED -->
<div id="feed"></div>

<!-- NAV -->
<div class="ruppy-nav">
  <button onclick="alert('Home')">Home</button>
  <button onclick="alert('Friend')">Friend</button>
  <button onclick="alert('Profile')">Profile</button>
</div>

<script>

// USER
let currentUser = localStorage.getItem('user') || "User"+Math.floor(Math.random()*999);
document.getElementById("userId").textContent = currentUser+"_ID";

// TOKEN
let tokens = Number(localStorage.getItem('tokens')||0);
document.getElementById("tokenCount").textContent = tokens;

// DAILY LIMIT
let dailyPosts = Number(localStorage.getItem('dailyPosts')||0);
let lastDate = localStorage.getItem('lastDate')||'';
let today = new Date().toDateString();

if(lastDate !== today){
  dailyPosts = 0;
  localStorage.setItem('dailyPosts',0);
  localStorage.setItem('lastDate',today);
}

// POSTS STORAGE
let posts = JSON.parse(localStorage.getItem('posts')||'[]');

// CREATE POST
function createPost(){
  let text = document.getElementById("postText").value;

  if(dailyPosts>=3){
    alert("Only 3 posts per day");
    return;
  }

  if(!text){
    alert("Write something");
    return;
  }

  let post = {
    id: Date.now(),
    user: currentUser,
    text:text,
    likes:0,
    liked:false,
    reports:0
  };

  posts.unshift(post);
  localStorage.setItem('posts',JSON.stringify(posts));

  dailyPosts++;
  localStorage.setItem('dailyPosts',dailyPosts);

  document.getElementById("postText").value="";
  render();
}

// RENDER
function render(){
  let feed = document.getElementById("feed");
  feed.innerHTML="";

  posts.forEach(p=>{
    feed.innerHTML += `
    <div class="post">
      <h4 onclick="openProfile('${p.user}')">${p.user}</h4>
      <p>${p.text}</p>

      <button class="btn" onclick="likePost(${p.id})">❤️ ${p.likes}</button>
      <button class="btn" onclick="reportPost(${p.id})">Report</button>
      <button class="btn" onclick="sendFriend('${p.user}')">Add Friend</button>
    </div>
    `;
  });
}

// LIKE = TOKEN
function likePost(id){
  let post = posts.find(p=>p.id==id);

  if(post.liked) return;

  post.likes++;
  post.liked = true;

  tokens += 10;
  localStorage.setItem('tokens',tokens);
  document.getElementById("tokenCount").textContent = tokens;

  localStorage.setItem('posts',JSON.stringify(posts));
  render();
}

// REPORT ONCE
function reportPost(id){
  let key = "report_"+id;

  if(localStorage.getItem(key)){
    alert("Already reported");
    return;
  }

  localStorage.setItem(key,true);
  alert("Reported");
}

// PROFILE OPEN
function openProfile(user){
  alert("Profile: "+user);
}

// EDIT
function editProfile(){
  alert("Edit profile coming soon");
}

// FRIEND
function sendFriend(user){
  alert("Friend request sent to "+user);
}

// INIT
render();

</script>

</body>
</html>
