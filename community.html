<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RUPPY Communities</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}
body{background:#0a0a0a;color:#fff;padding-bottom:70px}

.hub-header{position:sticky;top:0;background:linear-gradient(180deg,#0a0a0a 0%,#0a0a0a 80%,transparent 100%);backdrop-filter:blur(10px);padding:16px 20px;z-index:100;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1a1a}
.hub-logo{display:flex;align-items:center;gap:8px}
.back-arrow{background:none;border:none;color:#FFD700;font-size:24px;cursor:pointer;padding:0 8px 0 0;margin-left:-8px}
.back-arrow:active{opacity:0.6}
.hub-logo h1{font-size:24px;font-weight:800;background:linear-gradient(90deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hub-logo span{font-size:12px;color:#666;background:#1a1a1a;padding:2px 8px;border-radius:10px}
.create-btn{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:10px 16px;color:#000;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 4px 15px rgba(255,215,0,0.3)}

.search-bar{margin:16px 20px;background:#111;border:1px solid #222;border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px}
.search-bar input{flex:1;background:none;border:none;color:#fff;font-size:14px;outline:none}
.search-bar input::placeholder{color:#555}

.section-title{padding:16px 20px 8px;font-size:18px;font-weight:700;color:#FFD700}

.community-card{background:#111;border:1px solid #222;border-radius:20px;margin:0 20px 16px;overflow:hidden;transition:0.3s;box-shadow:0 8px 25px rgba(0,0,0,0.6);cursor:pointer}
.community-card:active{transform:scale(0.98)}
.community-banner{width:100%;height:100px;background:linear-gradient(135deg,#FFD700,#FFA500);position:relative;overflow:hidden}
.community-banner img{width:100%;height:100%;object-fit:cover}
.community-icon{width:70px;height:70px;border-radius:20px;background:#0a0a0a;border:4px solid #111;position:absolute;bottom:-35px;left:20px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#FFD700;font-size:28px;overflow:hidden}
.community-icon img{width:100%;height:100%;object-fit:cover}
.community-info{padding:45px 20px 16px}
.community-info h3{font-size:18px;font-weight:700;margin-bottom:4px}
.community-info p{font-size:13px;color:#888;line-height:1.4;margin-bottom:12px}
.community-stats{display:flex;gap:16px;margin-bottom:12px}
.community-stat{font-size:12px;color:#666}
.community-stat b{color:#FFD700;font-weight:700}
.community-actions{display:flex;gap:10px}
.community-btn{flex:1;background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:12px;padding:10px;color:#000;font-weight:700;font-size:13px;cursor:pointer}
.community-btn.joined{background:#1a1a1a;color:#FFD700;border:1px solid #333}

.my-communities{display:flex;gap:12px;padding:0 20px 16px;overflow-x:auto}
.my-communities::-webkit-scrollbar{display:none}
.my-community-chip{background:#111;border:1px solid #333;border-radius:16px;padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;cursor:pointer}
.my-community-chip:active{transform:scale(0.95)}
.my-community-chip-icon{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:14px;overflow:hidden}
.my-community-chip-icon img{width:100%;height:100%;object-fit:cover}
.my-community-chip span{font-size:13px;font-weight:600}

.ruppy-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:1px solid #222;height:65px;display:flex;justify-content:space-around;align-items:center;z-index:999;padding:0 10px}
.nav-btn{background:none;border:none;color:#FFE55C;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:8px 12px;border-radius:12px;transition:0.2s;opacity:0.7}
.nav-btn.active{color:#FFD700;opacity:1}
.nav-btn:active{transform:scale(0.9)}
.nav-btn svg{width:24px;height:24px;stroke-width:2;fill:none;stroke:currentColor}
.nav-btn.active svg{fill:#FFD700;stroke:#FFD700}
.nav-btn span{font-size:10px;font-weight:600}

.empty-hub{text-align:center;padding:80px 40px}
.empty-hub h3{font-size:24px;font-weight:800;margin-bottom:8px;background:linear-gradient(90deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.empty-hub p{font-size:14px;color:#666;margin-bottom:20px}
.empty-hub button{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:12px;padding:14px 28px;color:#000;font-weight:700;font-size:15px;cursor:pointer}

.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal.active{display:flex}
.modal-content{background:#111;border:1px solid #333;border-radius:20px;padding:20px;width:100%;max-width:400px}
.modal-content h3{font-size:20px;font-weight:700;margin-bottom:16px;color:#FFD700}
.modal-content input,.modal-content textarea{width:100%;background:#0a0a0a;border:1px solid #222;border-radius:12px;padding:12px;color:#fff;font-size:14px;margin-bottom:12px;outline:none}
.modal-content label{display:block;font-size:13px;color:#888;margin-bottom:6px;font-weight:600}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.modal-actions button{flex:1}

#iconInput,#bannerInput{display:none}
</style>
</head>
<body>

<div class="hub-header">
  <div class="hub-logo">
    <button class="back-arrow" onclick="window.location.href='index.html'">←</button>
    <h1>RUPPY</h1>
    <span>COMMUNITY</span>
  </div>
  <button class="create-btn" onclick="openCreateCommunity()">
    <span>✨</span> Create
  </button>
</div>

<div class="search-bar">
  <span>🔍</span>
  <input type="text" id="communitySearch" placeholder="Search communities..." oninput="searchCommunities()">
</div>

<div class="section-title">My Communities</div>
<div class="my-communities" id="myCommunitiesList">
  <div style="padding:0 20px;color:#666;font-size:13px">No communities joined yet</div>
</div>

<div class="section-title">Discover Communities</div>
<div id="communitiesList"></div>

<div class="modal" id="createCommunityModal">
  <div class="modal-content">
    <h3>Create Community</h3>
    <label>Community Icon</label>
    <button class="community-btn" onclick="document.getElementById('iconInput').click()" style="margin-bottom:12px;width:100%">Upload Icon</button>
    <input type="file" id="iconInput" accept="image/*">

    <label>Banner Image</label>
    <button class="community-btn" onclick="document.getElementById('bannerInput').click()" style="margin-bottom:12px;width:100%">Upload Banner</button>
    <input type="file" id="bannerInput" accept="image/*">

    <label>Community Name</label>
    <input type="text" id="communityName" placeholder="e.g. RUPPY Gamers">

    <label>Description</label>
    <textarea id="communityDesc" placeholder="What is this community about?" rows="3"></textarea>

    <div class="modal-actions">
      <button class="community-btn" style="background:#1a1a1a;color:#FFD700;border:1px solid #333" onclick="closeCreateCommunity()">Cancel</button>
      <button class="community-btn" onclick="saveCommunity()">Create</button>
    </div>
  </div>
</div>

<div class="ruppy-nav">
  <button class="nav-btn" onclick="window.location.href='index.html'">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path><polyline points="9 22 9 12 15 22"></polyline></svg>
    <span>Home</span>
  </button>
  <button class="nav-btn active">
    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 00-3-3.87"></path><path d="M16 3.13a4 4 0 010 7.75"></path></svg>
    <span>Community</span>
  </button>
</div>

<script>
let communities = JSON.parse(localStorage.getItem('ruppy_communities') || '[]');
let myCommunities = JSON.parse(localStorage.getItem('ruppy_my_communities') || '[]');
let userData = JSON.parse(localStorage.getItem('ruppy_user') || '{}');

if(communities.length === 0){
  communities = [
    {id:1,name:'RUPPY Gamers',desc:'For all gaming lovers. Share tips, gameplay, and more!',members:1247,icon:null,banner:null,created:Date.now()},
    {id:2,name:'Tech Talk',desc:'Discuss latest tech, gadgets, coding, AI and everything tech!',members:892,icon:null,banner:null,created:Date.now()},
    {id:3,name:'Creators Hub',desc:'Content creators unite! Share your work and get feedback',members:634,icon:null,banner:null,created:Date.now()},
    {id:4,name:'Meme Lords',desc:'Only dank memes allowed. No norms!',members:2103,icon:null,banner:null,created:Date.now()}
  ];
  localStorage.setItem('ruppy_communities', JSON.stringify(communities));
}

renderCommunities();
renderMyCommunities();

let selectedIcon = null;
let selectedBanner = null;

document.getElementById('iconInput').onchange = function(e){
  selectedIcon = e.target.files[0];
}

document.getElementById('bannerInput').onchange = function(e){
  selectedBanner = e.target.files[0];
}

function renderCommunities(){
  let list = document.getElementById('communitiesList');
  let search = document.getElementById('communitySearch').value.toLowerCase();

  let filtered = communities.filter(c =>
    c.name.toLowerCase().includes(search) ||
    c.desc.toLowerCase().includes(search)
  );

  if(filtered.length === 0){
    list.innerHTML = `<div class="empty-hub"><h3>No Communities Found</h3><p>Try a different search or create one!</p></div>`;
    return;
  }

  list.innerHTML = '';
  filtered.forEach(comm => {
    let isJoined = myCommunities.includes(comm.id);
    list.innerHTML += `
      <div class="community-card">
        <div class="community-banner">${comm.banner? `<img src="${comm.banner}">` : ''}</div>
        <div class="community-icon">${comm.icon? `<img src="${comm.icon}">` : comm.name[0]}</div>
        <div class="community-info">
          <h3>${comm.name}</h3>
          <p>${comm.desc}</p>
          <div class="community-stats">
            <div class="community-stat"><b>${comm.members}</b> members</div>
          </div>
          <div class="community-actions">
            <button class="community-btn ${isJoined? 'joined' : ''}" onclick="toggleJoin(${comm.id})">
              ${isJoined? 'Joined ✓' : 'Join Community'}
            </button>
          </div>
        </div>
      </div>
    `;
  });
}

function renderMyCommunities(){
  let list = document.getElementById('myCommunitiesList');
  let joined = communities.filter(c => myCommunities.includes(c.id));

  if(joined.length === 0){
    list.innerHTML = `<div style="padding:0 20px;color:#666;font-size:13px">No communities joined yet</div>`;
    return;
  }

  list.innerHTML = '';
  joined.forEach(comm => {
    list.innerHTML += `
      <div class="my-community-chip" onclick="viewCommunity(${comm.id})">
        <div class="my-community-chip-icon">${comm.icon? `<img src="${comm.icon}">` : comm.name[0]}</div>
        <span>${comm.name}</span>
      </div>
    `;
  });
}

function toggleJoin(id){
  let comm = communities.find(c => c.id === id);
  if(!comm) return;

  let index = myCommunities.indexOf(id);
  if(index > -1){
    myCommunities.splice(index, 1);
    comm.members--;
  } else {
    myCommunities.push(id);
    comm.members++;
  }

  localStorage.setItem('ruppy_my_communities', JSON.stringify(myCommunities));
  localStorage.setItem('ruppy_communities', JSON.stringify(communities));
  renderCommunities();
  renderMyCommunities();
}

function searchCommunities(){
  renderCommunities();
}

function viewCommunity(id){
  alert('Opening community posts - coming in next update!');
}

function openCreateCommunity(){
  document.getElementById('createCommunityModal').classList.add('active');
}

function closeCreateCommunity(){
  document.getElementById('createCommunityModal').classList.remove('active');
  document.getElementById('communityName').value = '';
  document.getElementById('communityDesc').value = '';
  selectedIcon = null;
  selectedBanner = null;
}

function saveCommunity(){
  let name = document.getElementById('communityName').value.trim();
  let desc = document.getElementById('communityDesc').value.trim();

  if(!name ||!desc){
    alert('Please fill all fields');
    return;
  }

  let newComm = {
    id: Date.now(),
    name: name,
    desc: desc,
    members: 1,
    icon: null,
    banner: null,
    created: Date.now()
  };

  if(selectedIcon){
    let reader = new FileReader();
    reader.onload = function(e){
      newComm.icon = e.target.result;
      if(selectedBanner){
        let reader2 = new FileReader();
        reader2.onload = function(e2){
          newComm.banner = e2.target.result;
          finishCreate(newComm);
        }
        reader2.readAsDataURL(selectedBanner);
      } else {
        finishCreate(newComm);
      }
    }
    reader.readAsDataURL(selectedIcon);
  } else if(selectedBanner){
    let reader = new FileReader();
    reader.onload = function(e){
      newComm.banner = e.target.result;
      finishCreate(newComm);
    }
    reader.readAsDataURL(selectedBanner);
  } else {
    finishCreate(newComm);
  }
}

function finishCreate(comm){
  communities.unshift(comm);
  myCommunities.push(comm.id);
  localStorage.setItem('ruppy_communities', JSON.stringify(communities));
  localStorage.setItem('ruppy_my_communities', JSON.stringify(myCommunities));
  closeCreateCommunity();
  renderCommunities();
  renderMyCommunities();
  alert('Community created successfully!');
}
</script>

</body>
</html>
