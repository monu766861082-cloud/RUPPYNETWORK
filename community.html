<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RUPPY Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}
body{background:#0a0a0a;color:#fff;padding-bottom:70px}

/* Header - RUPPY Style */
.hub-header{position:sticky;top:0;background:linear-gradient(180deg,#0a0a0a 0%,#0a0a0a 80%,transparent 100%);backdrop-filter:blur(10px);padding:16px 20px;z-index:100;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1a1a}
.hub-logo{display:flex;align-items:center;gap:8px}
.hub-logo h1{font-size:24px;font-weight:800;background:linear-gradient(90deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hub-logo span{font-size:12px;color:#666;background:#1a1a1a;padding:2px 8px;border-radius:10px}
.create-btn{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:10px 16px;color:#000;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 4px 15px rgba(255,215,0,0.3)}

/* Stats Bar */
.stats-bar{display:flex;gap:10px;padding:16px 20px;overflow-x:auto}
.stats-bar::-webkit-scrollbar{display:none}
.stat-card{background:linear-gradient(135deg,#1a1a1a,#0d0d0d);border:1px solid #252525;border-radius:16px;padding:12px 16px;min-width:110px;flex-shrink:0;box-shadow:0 4px 10px rgba(0,0,0,0.5)}
.stat-card h3{font-size:20px;font-weight:700;color:#FFD700;margin-bottom:2px}
.stat-card p{font-size:11px;color:#888}

/* Create Post Card */
.create-card{margin:0 20px 16px;background:#111;border:1px solid #222;border-radius:20px;padding:16px;box-shadow:0 8px 20px rgba(0,0,0,0.4)}
.create-top{display:flex;gap:12px;align-items:center;margin-bottom:12px}
.create-avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:16px}
.create-card textarea{width:100%;background:#0a0a0a;border:1px solid #222;border-radius:12px;padding:12px;color:#fff;font-size:15px;resize:none;font-family:inherit;min-height:60px}
.create-card textarea::placeholder{color:#555}
.create-actions{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.create-actions.left{display:flex;gap:12px}
.icon-btn{background:#1a1a1a;border:1px solid #333;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer}
.post-btn{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:10px 24px;color:#000;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 4px 15px rgba(255,215,0,0.3)}
.post-btn:disabled{opacity:0.3;cursor:not-allowed}

/* Feed */
.feed{padding:0 20px}
.post-card{background:#111;border:1px solid #222;border-radius:24px;margin-bottom:16px;overflow:hidden;transition:0.3s;box-shadow:0 8px 25px rgba(0,0,0,0.6)}
.post-card:active{transform:scale(0.98)}
.post-card-head{padding:16px;display:flex;align-items:center;gap:12px}
.post-avatar{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:16px}
.post-info{flex:1}
.post-info h4{font-size:15px;font-weight:600;margin-bottom:2px}
.post-info p{font-size:12px;color:#666}
.post-more{background:#1a1a1a;border:none;border-radius:8px;width:32px;height:32px;color:#888;font-size:20px;cursor:pointer}

.post-content{padding:0 16px 16px;font-size:15px;line-height:1.5;color:#ddd}
.post-media{width:100%;max-height:400px;background:#0a0a0a;display:flex;align-items:center;justify-content:center;overflow:hidden}
.post-media img,.post-media video{width:100%;height:auto;display:block}

/* ROYAL LIKE COMMENT BAR - UPDATED */
.post-footer{
  padding:12px 16px;
  border-top:1px solid #222;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(180deg,#151515,#0f0f0f);
  box-shadow:inset 0 1px 0 rgba(255,215,0,0.1)
}

.post-stats{display:flex;gap:10px}

.stat-btn{
  background:linear-gradient(135deg,#FFD700,#FFA500);
  border:none;
  color:#000;
  display:flex;
  align-items:center;
  gap:6px;
  font-size:13px;
  font-weight:800;
  cursor:pointer;
  padding:9px 16px;
  border-radius:12px;
  transition:0.2s;
  box-shadow:0 3px 10px rgba(255,215,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3)
}

.stat-btn:active{transform:scale(0.92);box-shadow:0 1px 5px rgba(255,215,0,0.4)}

.stat-btn.liked{
  background:linear-gradient(135deg,#FF6B6B,#FF4757);
  color:#fff;
  box-shadow:0 3px 10px rgba(255,107,107,0.5), inset 0 1px 0 rgba(255,255,255,0.3)
}

.stat-btn.liked span{color:#fff}

.stat-btn svg{
  width:18px;
  height:18px;
  stroke:#000;
  fill:none;
  stroke-width:2.5
}

.stat-btn.liked svg{
  stroke:#fff;
  fill:#fff
}

.share-btn{
  background:#1a1a1a;
  border:1px solid #333;
  border-radius:12px;
  padding:9px 16px;
  color:#FFD700;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  transition:0.2s
}

.share-btn:active{transform:scale(0.92);background:#222}

/* Comments */
.comments-box{display:none;padding:16px;border-top:1px solid #1a1a1a;background:#0d0d0d;max-height:300px;overflow-y:auto}
.comment{display:flex;gap:10px;margin-bottom:14px}
.comment-avatar{width:32px;height:32px;border-radius:10px;background:#FFD700;color:#000;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.comment-body{flex:1;background:#1a1a1a;border-radius:12px;padding:10px 12px}
.comment-body b{font-size:13px;font-weight:600;display:block;margin-bottom:2px}
.comment-body span{font-size:14px;line-height:1.4;color:#ddd}
.comment-input{display:flex;gap:10px;padding:12px 16px;border-top:1px solid #1a1a1a}
.comment-input input{flex:1;background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:10px 14px;color:#fff;font-size:14px;outline:none}
.comment-input button{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:10px 16px;color:#000;font-weight:700;font-size:13px;cursor:pointer}

/* Bottom Nav - RUPPY Style */
.ruppy-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:1px solid #222;height:60px;display:flex;justify-content:space-around;align-items:center;z-index:999;padding:0 10px}
.nav-btn{background:none;border:none;color:#555;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px 12px;border-radius:12px;transition:0.2s}
.nav-btn.active{color:#FFD700;background:#1a1a1a}
.nav-btn svg{width:24px;height:24px}
.nav-btn span{font-size:10px;font-weight:600}

/* Empty */
.empty-hub{text-align:center;padding:80px 40px}
.empty-hub h3{font-size:24px;font-weight:800;margin-bottom:8px;background:linear-gradient(90deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.empty-hub p{font-size:14px;color:#666;margin-bottom:20px}
.empty-hub button{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:12px;padding:14px 28px;color:#000;font-weight:700;font-size:15px;cursor:pointer}

#fileInput{display:none}
</style>
</head>
<body>

<!-- Header -->
<div class="hub-header">
  <div class="hub-logo">
    <h1>RUPPY</h1>
    <span>HUB</span>
  </div>
  <button class="create-btn" onclick="openCreate()">
    <span>✨</span> Create
  </button>
</div>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat-card">
    <h3 id="totalPosts">0</h3>
    <p>Total Posts</p>
  </div>
  <div class="stat-card">
    <h3 id="totalLikes">0</h3>
    <p>Total Likes</p>
  </div>
  <div class="stat-card">
    <h3 id="activeUsers">1</h3>
    <p>Active Now</p>
  </div>
</div>

<!-- Create Card -->
<div class="create-card">
  <div class="create-top">
    <div class="create-avatar" id="userAvatar">U</div>
    <textarea id="postText" placeholder="Share your RUPPY update..." rows="2"></textarea>
  </div>
  <div class="create-actions">
    <div class="left">
      <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📷</button>
      <button class="icon-btn" onclick="addEmoji()">😊</button>
    </div>
    <button class="post-btn" id="postBtn" onclick="createPost()" disabled>Post</button>
  </div>
  <input type="file" id="fileInput" accept="image/*,video/*">
  <div id="preview" style="margin-top:12px;border-radius:12px;overflow:hidden;display:none"></div>
</div>

<!-- Feed -->
<div class="feed" id="feed"></div>

<!-- Bottom Nav -->
<div class="ruppy-nav">
  <button class="nav-btn" onclick="location.href='app.html'">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
    <span>Home</span>
  </button>
  <button class="nav-btn" onclick="location.href='tasks.html'">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
    <span>Tasks</span>
  </button>
  <button class="nav-btn active" onclick="location.href='community.html'">
    <svg fill="currentColor" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2.5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 0 01-2.343 5.657z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.879 16.121A3 3 0 1012.015 11L11 14H9c0.768.293 1.536.879 2.121z"></path></svg>
    <span>Hub</span>
  </button>
  <button class="nav-btn" onclick="location.href='ranking.html'">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
    <span>Rank</span>
  </button>
  <button class="nav-btn" onclick="location.href='settings.html'">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
    <span>Profile</span>
  </button>
</div>

<script>
// FILTER
const bannedWords = ['sex','porn','xxx','nude','fuck','bitch','chut','lund','randi','gand','boobs','dick','pussy','scam','betting','casino','gambling'];
function checkContent(text){
  let lower = text.toLowerCase();
  return bannedWords.some(word => lower.includes(word));
}

// DATA
let posts = JSON.parse(localStorage.getItem('ruppy_posts') || '[]');
let currentUser = localStorage.getItem('ruppy_username') || 'User'+Math.floor(Math.random()*999);
document.getElementById('userAvatar').textContent = currentUser[0].toUpperCase();

updateStats();

let selectedFile = null;
document.getElementById('postText').oninput = function(){
  document.getElementById('postBtn').disabled =!this.value.trim() &&!selectedFile;
}

document.getElementById('fileInput').onchange = function(e){
  selectedFile = e.target.files[0];
  if(selectedFile){
    let reader = new FileReader();
    reader.onload = function(e){
      let preview = document.getElementById('preview');
      preview.style.display = 'block';
      preview.innerHTML = selectedFile.type.includes('video')
    ? `<video src="${e.target.result}" controls style="width:100%;border-radius:12px"></video>`
        : `<img src="${e.target.result}" style="width:100%;border-radius:12px">`;
      document.getElementById('postBtn').disabled = false;
    }
    reader.readAsDataURL(selectedFile);
  }
}

function openCreate(){
  document.getElementById('postText').focus();
}

function addEmoji(){
  document.getElementById('postText').value += ' 🔥';
  document.getElementById('postBtn').disabled = false;
}

function createPost(){
  let text = document.getElementById('postText').value.trim();
  if(!text &&!selectedFile) return;
  if(checkContent(text)){
    alert('Inappropriate content detected');
    return;
  }

  let post = {
    id: Date.now(),
    user: currentUser,
    text: text,
    time: Date.now(),
    likes: 0,
    liked: false,
    comments: [],
    reports: 0
  };

  if(selectedFile){
    let reader = new FileReader();
    reader.onload = function(e){
      post.media = e.target.result;
      post.mediaType = selectedFile.type.includes('video')? 'video' : 'image';
      savePost(post);
    }
    reader.readAsDataURL(selectedFile);
  } else {
    savePost(post);
  }
}

function savePost(post){
  posts.unshift(post);
  localStorage.setItem('ruppy_posts', JSON.stringify(posts));
  document.getElementById('postText').value = '';
  document.getElementById('preview').style.display = 'none';
  document.getElementById('preview').innerHTML = '';
  document.getElementById('fileInput').value = '';
  document.getElementById('postBtn').disabled = true;
  selectedFile = null;
  renderFeed();
  updateStats();
}

function updateStats(){
  document.getElementById('totalPosts').textContent = posts.filter(p => p.reports < 3).length;
  document.getElementById('totalLikes').textContent = posts.reduce((sum,p) => sum + p.likes, 0);
}

function renderFeed(){
  let feed = document.getElementById('feed');
  let validPosts = posts.filter(p => p.reports < 3);

  if(validPosts.length === 0){
    feed.innerHTML = `
      <div class="empty-hub">
        <h3>Welcome to RUPPY Hub</h3>
        <p>Start the conversation. Share your first update!</p>
        <button onclick="openCreate()">Create Post</button>
      </div>`;
    return;
  }

  feed.innerHTML = '';
  validPosts.forEach(post => {
    let mediaHTML = '';
    if(post.media){
      if(post.mediaType === 'video'){
        mediaHTML = `<div class="post-media"><video src="${post.media}" controls></video></div>`;
      } else {
        mediaHTML = `<div class="post-media"><img src="${post.media}" ondblclick="likePost(${post.id})"></div>`;
      }
    }

    let timeAgo = getTimeAgo(post.time);

    feed.innerHTML += `
    <div class="post-card" id="post-${post.id}">
      <div class="post-card-head">
        <div class="post-avatar">${post.user[0].toUpperCase()}</div>
        <div class="post-info">
          <h4>${post.user}</h4>
          <p>${timeAgo}</p>
        </div>
        <button class="post-more" onclick="reportPost(${post.id})">⋯</button>
      </div>

      ${post.text? `<div class="post-content">${post.text}</div>` : ''}
      ${mediaHTML}

      <div class="post-footer">
        <div class="post-stats">
          <button class="stat-btn ${post.liked?'liked':''}" onclick="likePost(${post.id})">
            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
            <span>${post.likes}</span>
          </button>
          <button class="stat-btn" onclick="toggleComments(${post.id})">
            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
            <span>${post.comments.length}</span>
          </button>
        </div>
        <button class="share-btn" onclick="sharePost(${post.id})">Share</button>
      </div>

      <div class="comments-box" id="comments-${post.id}">
        ${post.comments.map(c => `
          <div class="comment">
            <div class="comment-avatar">${c.user[0].toUpperCase()}</div>
            <div class="comment-body">
              <b>${c.user}</b>
              <span>${c.text}</span>
            </div>
          </div>`).join('')}
        <div class="comment-input">
          <input type="text" placeholder="Add a comment..." id="commentInput-${post.id}" onkeypress="if(event.key==='Enter') addComment(${post.id})">
          <button onclick="addComment(${post.id})">Send</button>
        </div>
      </div>
    </div>`;
  });
}

function getTimeAgo(time){
  if(!time) return 'now';
  let seconds = Math.floor((Date.now() - Number(time)) / 1000);
  if(seconds < 60) return 'now';
  let minutes = Math.floor(seconds / 60);
  if(minutes < 60) return `${minutes}m ago`;
  let hours = Math.floor(minutes / 60);
  if(hours < 24) return `${hours}h ago`;
  let days = Math.floor(hours / 24);
  if(days < 7) return `${days}d ago`;
  return new Date(time).toLocaleDateString();
}

function likePost(id){
  let post = posts.find(p => p.id === id);
  post.liked =!post.liked;
  post.likes += post.liked? 1 : -1;
  localStorage.setItem('ruppy_posts', JSON.stringify(posts));
  renderFeed();
  updateStats();
}

function toggleComments(id){
  let box = document.getElementById(`comments-${id}`);
  box.style.display = box.style.display === 'block'? 'none' : 'block';
}

function addComment(id){
  let input = document.getElementById(`commentInput-${id}`);
  let text = input.value.trim();
  if(!text) return;
  if(checkContent(text)){
    alert('Inappropriate content');
    return;
  }

  let post = posts.find(p => p.id === id);
  post.comments.push({user: currentUser, text: text, time: Date.now()});
  localStorage.setItem('ruppy_posts', JSON.stringify(posts));
  input.value = '';
  renderFeed();
  document.getElementById(`comments-${id}`).style.display = 'block';
}

function sharePost(id){
  navigator.clipboard.writeText(window.location.href);
  alert('Link copied!');
}

function reportPost(id){
  if(confirm('Report this post?')){
    let post = posts.find(p => p.id === id);
    post.reports++;
    localStorage.setItem('ruppy_posts', JSON.stringify(posts));
    alert('Reported');
    renderFeed();
    updateStats();
  }
}

renderFeed();
</script>
</body>
</html>
