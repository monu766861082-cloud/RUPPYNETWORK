<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RUPPY Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}
body{background:#0a0a0a;color:#fff;padding-bottom:70px}

/* Header - RUPPY Style */
.hub-header{position:sticky;top:0;background:linear-gradient(180deg,#0a0a0a 0%,#0a0a0a 80%,transparent 100%);backdrop-filter:blur(10px);padding:16px 20px;z-index:100;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1a1a}
.hub-logo{display:flex;align-items:center;gap:8px}
.back-arrow{background:none;border:none;color:#FFD700;font-size:24px;cursor:pointer;padding:0 8px 0 0;margin-left:-8px}
.back-arrow:active{opacity:0.6}
.hub-logo h1{font-size:24px;font-weight:800;background:linear-gradient(90deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hub-logo span{font-size:12px;color:#666;background:#1a1a1a;padding:2px 8px;border-radius:10px}
.create-btn{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:10px 16px;color:#000;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 4px 15px rgba(255,215,0,0.3)}

/* Stats Bar */
.stats-bar{display:flex;gap:10px;padding:16px 20px;overflow-x:auto}
.stats-bar::-webkit-scrollbar{display:none}
.stat-card{background:linear-gradient(135deg,#1a1a1a,#0d0d0d);border:1px solid #252525;border-radius:16px;padding:12px 16px;min-width:110px;flex-shrink:0;box-shadow:0 4px 10px rgba(0,0,0,0.5)}
.stat-card h3{font-size:20px;font-weight:700;color:#FFD700;margin-bottom:2px}
.stat-card p{font-size:11px;color:#888}

/* Create Post Card */
.create-card{margin:0 20px 16px;background:#111;border:1px solid #222;border-radius:20px;padding:16px;box-shadow:0 8px 20px rgba(0,0,0,0.4)}
.create-top{display:flex;gap:12px;align-items:center;margin-bottom:12px}
.create-avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:16px;overflow:hidden}
.create-avatar img{width:100%;height:100%;object-fit:cover}
.create-card textarea{width:100%;background:#0a0a0a;border:1px solid #222;border-radius:12px;padding:12px;color:#fff;font-size:15px;resize:none;font-family:inherit;min-height:60px}
.create-card textarea::placeholder{color:#555}
.create-actions{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.create-actions.left{display:flex;gap:12px}
.icon-btn{background:#1a1a1a;border:1px solid #333;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer}
.post-btn{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:10px 24px;color:#000;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 4px 15px rgba(255,215,0,0.3)}
.post-btn:disabled{opacity:0.3;cursor:not-allowed}

/* Feed */
.feed{padding:0 20px}
.post-card{background:#111;border:1px solid #222;border-radius:24px;margin-bottom:16px;overflow:hidden;transition:0.3s;box-shadow:0 8px 25px rgba(0,0,0,0.6)}
.post-card:active{transform:scale(0.98)}
.post-card-head{padding:16px;display:flex;align-items:center;gap:12px}
.post-avatar{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:16px;overflow:hidden}
.post-avatar img{width:100%;height:100%;object-fit:cover}
.post-info{flex:1}
.post-info h4{font-size:15px;font-weight:600;margin-bottom:2px}
.post-info p{font-size:12px;color:#666}
.post-more{background:#1a1a1a;border:none;border-radius:8px;width:32px;height:32px;color:#888;font-size:20px;cursor:pointer}

.post-content{padding:0 16px 16px;font-size:15px;line-height:1.5;color:#ddd}
.post-media{width:100%;max-height:400px;background:#0a0a0a;display:flex;align-items:center;justify-content:center;overflow:hidden}
.post-media img,.post-media video{width:100%;height:auto;display:block}

/* ROYAL LIKE COMMENT SHARE BAR */
.post-footer{padding:12px 16px;border-top:1px solid #252525;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,#161616,#101010);box-shadow:inset 0 1px 0 rgba(255,215,0,0.15)}
.post-stats{display:flex;gap:10px}
.stat-btn{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;color:#000;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:800;cursor:pointer;padding:9px 16px;border-radius:12px;transition:0.2s;box-shadow:0 3px 12px rgba(255,215,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3)}
.stat-btn:active{transform:scale(0.92);box-shadow:0 1px 5px rgba(255,215,0,0.4)}
.stat-btn.liked{background:linear-gradient(135deg,#FF6B6B,#FF4757);color:#fff;box-shadow:0 3px 12px rgba(255,107,107,0.5), inset 0 1px 0 rgba(255,255,255,0.3)}
.stat-btn.liked span{color:#fff}
.stat-btn svg{width:18px;height:18px;stroke:#000;fill:none;stroke-width:2.5}
.stat-btn.liked svg{stroke:#fff;fill:#fff}
.share-btn{background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:9px 16px;color:#FFD700;font-size:13px;font-weight:700;cursor:pointer;transition:0.2s}
.share-btn:active{transform:scale(0.92);background:#222}

/* Comments */
.comments-box{display:none;padding:16px;border-top:1px solid #1a1a1a;background:#0d0d0d;max-height:300px;overflow-y:auto}
.view-more{color:#FFD700;font-size:13px;font-weight:600;padding:8px 0;cursor:pointer;text-align:center;margin-bottom:10px}
.comment{display:flex;gap:10px;margin-bottom:14px}
.comment-avatar{width:32px;height:32px;border-radius:10px;background:#FFD700;color:#000;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;overflow:hidden}
.comment-avatar img{width:100%;height:100%;object-fit:cover}
.comment-body{flex:1;background:#1a1a1a;border-radius:12px;padding:10px 12px}
.comment-body b{font-size:13px;font-weight:600;display:block;margin-bottom:2px}
.comment-body span{font-size:14px;line-height:1.4;color:#ddd}
.comment-input{display:flex;gap:10px;padding:12px 16px;border-top:1px solid #1a1a1a}
.comment-input input{flex:1;background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:10px 14px;color:#fff;font-size:14px;outline:none}
.comment-input button{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:10px 16px;color:#000;font-weight:700;font-size:13px;cursor:pointer}

/* TAB CONTENT */
.tab-content{display:none}
.tab-content.active{display:block}
.section-title{padding:16px 20px 8px;font-size:18px;font-weight:700;color:#FFD700}

/* FRIEND TAB */
.search-bar{margin:0 20px 16px;background:#111;border:1px solid #222;border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px}
.search-bar input{flex:1;background:none;border:none;color:#fff;font-size:14px;outline:none}
.user-card{background:#111;border:1px solid #222;border-radius:16px;padding:12px;margin:0 20px 12px;display:flex;align-items:center;gap:12px}
.user-card-avatar{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:18px;flex-shrink:0}
.user-card-btn{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:8px 16px;color:#000;font-weight:700;font-size:12px;cursor:pointer}

/* NOTIFICATION TAB */
.notif-card{background:#111;border:1px solid #222;border-radius:16px;padding:14px;margin:0 20px 12px;display:flex;gap:12px;align-items:flex-start}
.notif-icon{width:40px;height:40px;border-radius:12px;background:#FFD700;color:#000;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

/* PROFILE TAB */
.profile-cover{width:100%;height:140px;background:linear-gradient(135deg,#FFD700,#FFA500);position:relative}
.profile-dp{width:90px;height:90px;border-radius:24px;background:linear-gradient(135deg,#FFA500,#FFD700);border:4px solid #0a0a0a;position:absolute;bottom:-45px;left:20px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#000;font-size:32px;overflow:hidden}
.profile-dp img{width:100%;height:100%;object-fit:cover}
.profile-info{padding:55px 20px 16px}
.profile-info h2{font-size:24px;font-weight:800;margin-bottom:4px}
.profile-info p{font-size:14px;color:#888;line-height:1.5;margin-bottom:12px}
.profile-stats{display:flex;gap:20px;margin-bottom:16px}
.profile-stat h3{font-size:18px;font-weight:700;color:#FFD700}
.profile-btn{flex:1;background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:12px;padding:12px;color:#000;font-weight:700;font-size:14px;cursor:pointer}
.profile-btn.secondary{background:#1a1a1a;color:#FFD700;border:1px solid #333}

/* EDIT MODAL */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:2000;display:none;align-items:center;justify-content:center}
.edit-modal{background:#111;width:90%;max-width:400px;border-radius:24px;border:1px solid #333;padding:20px}
.edit-modal input, .edit-modal textarea{width:100%;background:#0a0a0a;border:1px solid #333;padding:12px;color:#fff;border-radius:12px;margin-bottom:10px;outline:none}

/* Nav */
.ruppy-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:1px solid #222;height:65px;display:flex;justify-content:space-around;align-items:center;z-index:999}
.nav-btn{background:none;border:none;color:#FFE55C;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;opacity:0.7}
.nav-btn.active{color:#FFD700;opacity:1}
.nav-btn svg{width:24px;height:24px;stroke-width:2;fill:none;stroke:currentColor}
</style>
</head>
<body>

<div class="hub-header">
  <div class="hub-logo"><button class="back-arrow" onclick="exitApp()">←</button><h1>RUPPY</h1><span>HUB</span></div>
  <button class="create-btn" onclick="openCreate()"><span>✨</span> Create</button>
</div>

<div id="hub-tab" class="tab-content active">
  <div class="stats-bar">
    <div class="stat-card"><h3 id="totalPosts">0</h3><p>Total Posts</p></div>
    <div class="stat-card"><h3 id="totalLikes">0</h3><p>Total Likes</p></div>
    <div class="stat-card"><h3>1</h3><p>Active Now</p></div>
  </div>
  <div class="create-card">
    <div class="create-top"><div class="create-avatar" id="userAvatar">U</div><textarea id="postText" placeholder="Share your RUPPY update..."></textarea></div>
    <div class="create-actions">
      <div class="left"><button class="icon-btn" onclick="document.getElementById('fileInput').click()">📷</button></div>
      <button class="post-btn" id="postBtn" onclick="createPost()" disabled>Post</button>
    </div>
    <input type="file" id="fileInput" accept="image/*,video/*" style="display:none">
    <div id="preview" style="display:none;margin-top:10px"></div>
  </div>
  <div class="feed" id="feed"></div>
</div>

<div id="friend-tab" class="tab-content">
  <div class="section-title">Friend Requests</div>
  <div class="user-card"><div class="user-card-avatar">R</div><div class="user-card-info"><h4>Rahul</h4><p>2 mutual</p></div><button class="user-card-btn">Accept</button></div>
</div>

<div id="notification-tab" class="tab-content">
  <div class="section-title">Notifications</div>
  <div class="notif-card"><div class="notif-icon">❤️</div><div class="notif-content"><p><b>Rahul</b> liked your post</p></div></div>
</div>

<div id="profile-tab" class="tab-content">
  <div class="profile-cover"><div class="profile-dp" id="profile-display-photo">U</div></div>
  <div class="profile-info">
    <h2 id="profile-display-name">User847</h2>
    <p id="profile-display-bio">Living life one post at a time ✨</p>
    <div class="profile-actions">
      <button class="profile-btn" onclick="openEditModal()">Edit Profile</button>
      <button class="profile-btn secondary">Share</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="edit-modal">
    <h3 style="color:#FFD700;margin-bottom:15px">Edit Profile</h3>
    <input type="file" id="edit-photo-input" accept="image/*">
    <input type="text" id="edit-name-input" placeholder="Your Name">
    <textarea id="edit-bio-input" placeholder="Your Bio"></textarea>
    <div style="display:flex;gap:10px">
      <button onclick="closeEditModal()" style="flex:1;padding:12px;background:#222;color:#fff;border-radius:12px;border:none">Cancel</button>
      <button onclick="saveProfile()" style="flex:1;padding:12px;background:#FFD700;color:#000;font-weight:700;border-radius:12px;border:none">Save</button>
    </div>
  </div>
</div>

<div class="ruppy-nav">
  <button class="nav-btn active" id="home-nav-btn" onclick="switchTab('hub')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path></svg><span>Home</span></button>
  <button class="nav-btn" id="friend-nav-btn" onclick="switchTab('friend')"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg><span>Friend</span></button>
  <button class="nav-btn" id="notification-nav-btn" onclick="switchTab('notification')"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"></path></svg><span>Notif</span></button>
  <button class="nav-btn" id="profile-nav-btn" onclick="switchTab('profile')"><svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"></circle><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path></svg><span>Profile</span></button>
</div>

<script>
// Logic
let posts = JSON.parse(localStorage.getItem('ruppy_posts') || '[]');
let userData = JSON.parse(localStorage.getItem('ruppy_user')) || { name: 'User847', bio: 'Living life one post at a time ✨', photo: '' };

function updateProfileUI() {
    document.getElementById('profile-display-name').textContent = userData.name;
    document.getElementById('profile-display-bio').textContent = userData.bio;
    document.getElementById('userAvatar').textContent = userData.name[0].toUpperCase();
    const dp = document.getElementById('profile-display-photo');
    if(userData.photo) {
        dp.innerHTML = `<img src="${userData.photo}">`;
        document.getElementById('userAvatar').innerHTML = `<img src="${userData.photo}">`;
    } else {
        dp.textContent = userData.name[0].toUpperCase();
    }
}

function openEditModal() {
    document.getElementById('editModal').style.display = 'flex';
    document.getElementById('edit-name-input').value = userData.name;
    document.getElementById('edit-bio-input').value = userData.bio;
}
function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }

function saveProfile() {
    userData.name = document.getElementById('edit-name-input').value;
    userData.bio = document.getElementById('edit-bio-input').value;
    const file = document.getElementById('edit-photo-input').files[0];
    if(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            userData.photo = e.target.result;
            finishSave();
        };
        reader.readAsDataURL(file);
    } else { finishSave(); }
}
function finishSave() {
    localStorage.setItem('ruppy_user', JSON.stringify(userData));
    updateProfileUI();
    closeEditModal();
}

function createPost() {
    let text = document.getElementById('postText').value.trim();
    let post = { id: Date.now(), user: userData.name, userPhoto: userData.photo, text: text, likes: 0, comments: [] };
    posts.unshift(post);
    localStorage.setItem('ruppy_posts', JSON.stringify(posts));
    document.getElementById('postText').value = '';
    renderFeed();
}

function renderFeed() {
    let feed = document.getElementById('feed');
    feed.innerHTML = '';
    posts.forEach(p => {
        let uImg = p.userPhoto ? `<img src="${p.userPhoto}">` : p.user[0].toUpperCase();
        feed.innerHTML += `<div class="post-card"><div class="post-card-head"><div class="post-avatar">${uImg}</div><div class="post-info"><h4>${p.user}</h4></div></div><div class="post-content">${p.text}</div></div>`;
    });
    document.getElementById('totalPosts').textContent = posts.length;
}

function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tab + '-tab').classList.add('active');
    document.getElementById(tab + '-nav-btn').classList.add('active');
}

document.getElementById('postText').oninput = function() { document.getElementById('postBtn').disabled = !this.value.trim(); }
updateProfileUI();
renderFeed();
</script>
</body>
</html>
