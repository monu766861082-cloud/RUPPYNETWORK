<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RUPPY Hub</title>
<script type="module" src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}
body{background:#0a0a0a;color:#fff;padding-bottom:70px}
.hub-header{position:sticky;top:0;background:linear-gradient(180deg,#0a0a0a 0%,#0a0a0a 80%,transparent 100%);backdrop-filter:blur(10px);padding:16px 20px;z-index:100;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1a1a}
.hub-logo{display:flex;align-items:center;gap:8px}
.hub-logo h1{font-size:24px;font-weight:800;background:linear-gradient(90deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hub-logo span{font-size:12px;color:#666;background:#1a1a1a;padding:2px 8px;border-radius:10px}
.create-btn{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:10px 16px;color:#000;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 4px 15px rgba(255,215,0,0.3)}
.stats-bar{display:flex;gap:10px;padding:16px 20px;overflow-x:auto}
.stats-bar::-webkit-scrollbar{display:none}
.stat-card{background:linear-gradient(135deg,#1a1a1a,#0d0d0d);border:1px solid #252525;border-radius:16px;padding:12px 16px;min-width:110px;flex-shrink:0;box-shadow:0 4px 10px rgba(0,0,0,0.5)}
.stat-card h3{font-size:20px;font-weight:700;color:#FFD700;margin-bottom:2px}
.stat-card p{font-size:11px;color:#888}
.stat-card.reward-card{min-width:160px;padding:14px 16px}
.stat-card.reward-card.reward-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.stat-card.reward-card.reward-top p{font-size:11px;color:#888}
.stat-card.reward-card.reward-top h3{font-size:20px;font-weight:700;color:#FFD700;margin:0}
.stat-card.reward-card.reward-bottom p{font-size:10px;color:#666;margin-bottom:2px}
.stat-card.reward-card.reward-bottom h3{font-size:24px;font-weight:800;color:#FFD700;line-height:1;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.stat-card.reward-card.reward-bottom span{font-size:11px;color:#FFD700;font-weight:700}

.r-coin {width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#FFB84D,#F3C774,#D4A017);display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:#000;box-shadow:0 0 8px rgba(243,199,116,0.6),inset 0 2px 4px rgba(255,255,255,0.3);border:1px solid #FFA500;position:relative;flex-shrink:0}
.r-coin::after {content:'';position:absolute;inset:-2px;border-radius:50%;background:radial-gradient(circle,#FF6B00 0%,transparent 70%);opacity:0.4;filter:blur(3px);z-index:-1}
.r-coin-lg {width:24px;height:24px;font-size:13px}

.reward-banner{margin:0 20px 16px;background:#FEF3C7;border:1px solid #FDE68A;border-radius:16px;padding:12px 16px;display:flex;align-items:center;gap:10px}
.reward-banner span{font-size:14px;color:#92400E;font-weight:700}
.create-card{margin:0 20px 16px;background:#111;border:1px solid #222;border-radius:20px;padding:16px;box-shadow:0 8px 20px rgba(0,0,0,0.4)}
.create-top{display:flex;gap:12px;align-items:center;margin-bottom:12px}
.create-avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:16px;overflow:hidden}
.create-avatar img{width:100%;height:100%;object-fit:cover}
.create-card textarea{width:100%;background:#0a0a0a;border:1px solid #222;border-radius:12px;padding:12px;color:#fff;font-size:15px;resize:none;font-family:inherit;min-height:60px}
.create-card textarea::placeholder{color:#555}
.create-actions{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.create-actions.left{display:flex;gap:12px}
.icon-btn{background:#1a1a1a;border:1px solid #333;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer}
.post-btn{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:10px 24px;color:#000;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 4px 15px rgba(255,215,0,0.3)}
.post-btn:disabled{opacity:0.3;cursor:not-allowed}
.feed{padding:0 20px}
.post-card{background:#111;border:1px solid #222;border-radius:24px;margin-bottom:16px;overflow:hidden;transition:0.3s;box-shadow:0 8px 25px rgba(0,0,0,0.6)}
.post-card:active{transform:scale(0.98)}
.post-card-head{padding:16px;display:flex;align-items:center;gap:12px}
.post-avatar{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:16px;overflow:hidden}
.post-avatar img{width:100%;height:100%;object-fit:cover}
.post-info{flex:1}
.post-info h4{font-size:15px;font-weight:600;margin-bottom:2px}
.post-info p{font-size:12px;color:#666}
.post-more{background:#1a1a1a;border:none;border-radius:8px;width:32px;height:32px;color:#888;font-size:20px;cursor:pointer}
.post-content{padding:0 16px 16px;font-size:15px;line-height:1.5;color:#ddd}
.post-media{width:100%;max-height:400px;background:#0a0a0a;display:flex;align-items:center;justify-content:center;overflow:hidden}
.post-media img,.post-media video{width:100%;height:auto;display:block}
.claim-btn{width:calc(100% - 32px);background:#22C55E;border:none;border-radius:12px;padding:12px;color:#ffffff;font-weight:700;font-size:14px;cursor:pointer;margin:0 16px 12px;box-shadow:0 4px 12px rgba(34,197,94,0.4);transition:all 0.2s}
.claim-btn:active{transform:scale(0.98)}
.claim-btn.claimed{background:#1a1a1a;color:#666;box-shadow:none;cursor:not-allowed;border:1px solid #333}
.post-footer{padding:12px 16px;border-top:1px solid #252525;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,#161616,#101010);box-shadow:inset 0 1px 0 rgba(255,215,0,0.15)}
.post-stats{display:flex;gap:8px}
.stat-btn{background:#FEF3C7;border:1px solid #FDE68A;border-radius:10px;padding:6px 14px;color:#000000;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;min-width:85px;box-shadow:0 0 10px rgba(251,191,36,0.4);transition:0.2s}
.stat-btn:active{transform:scale(0.96);background:#FDE68A}
.stat-btn.liked{background:#FEF3C7;border:1px solid #FDE68A;color:#000}
.share-btn{background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:9px 16px;color:#FFD700;font-size:13px;font-weight:700;cursor:pointer;transition:0.2s}
.share-btn:active{transform:scale(0.92);background:#222}
.comments-box{display:none;padding:16px;border-top:1px solid #1a1a1a;background:#0d0d0d;max-height:300px;overflow-y:auto}
.view-more{color:#FFD700;font-size:13px;font-weight:600;padding:8px 0;cursor:pointer;text-align:center;margin-bottom:10px}
.view-more:active{opacity:0.6}
.comment{display:flex;gap:10px;margin-bottom:14px}
.comment-avatar{width:32px;height:32px;border-radius:10px;background:#FFD700;color:#000;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;overflow:hidden}
.comment-avatar img{width:100%;height:100%;object-fit:cover}
.comment-body{flex:1;background:#1a1a1a;border-radius:12px;padding:10px 12px}
.comment-body b{font-size:13px;font-weight:600;display:block;margin-bottom:2px}
.comment-body span{font-size:14px;line-height:1.4;color:#ddd}
.comment-input{display:flex;gap:10px;padding:12px 16px;border-top:1px solid #1a1a1a}
.comment-input input{flex:1;background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:10px 14px;color:#fff;font-size:14px;outline:none}
.comment-input button{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:10px 16px;color:#000;font-weight:700;font-size:13px;cursor:pointer}
.ruppy-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:1px solid #222;height:60px;display:flex;justify-content:space-around;align-items:center;z-index:999;padding:0 10px}
.nav-btn{background:none;border:none;color:#555;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px 10px;border-radius:12px;transition:0.2s}
.nav-btn.active{color:#FFD700;background:#1a1a1a}
.nav-btn svg{width:22px;height:22px}
.nav-btn span{font-size:9px;font-weight:600}
.empty-hub{text-align:center;padding:80px 40px}
.empty-hub h3{font-size:24px;font-weight:800;margin-bottom:8px;background:linear-gradient(90deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.empty-hub p{font-size:14px;color:#666;margin-bottom:20px}
.empty-hub button{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:12px;padding:14px 28px;color:#000;font-weight:700;font-size:15px;cursor:pointer}
#fileInput{display:none}
.loading{text-align:center;padding:40px;color:#666}
</style>
</head>
<body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, get, child, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQC0WsVPr63y2xvFMSifnkjAB3TTVcIxU",
  authDomain: "ruppynetwork-50362.firebaseapp.com",
  databaseURL: "https://ruppynetwork-50362-default-rtdb.firebaseio.com",
  projectId: "ruppynetwork-50362",
  storageBucket: "ruppynetwork-50362.appspot.com",
  messagingSenderId: "132064610854",
  appId: "1:132064610854:web:3c217eaf3618007f5934e7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

var userData = window.userData;
let currentUser = 'User';

async function syncBalanceFromConfig(){
  let attempts = 0;
  while((!window.userData || window.userData.uid === null) && attempts < 50){
    await new Promise(r => setTimeout(r, 100));
    attempts++;
  }
  if(window.userData){
    userData = window.userData;
    currentUser = window.userData.name || window.userData.uid || 'User';
    document.getElementById('taskBalance').textContent = window.userData.taskBalance || 0;
    document.getElementById('totalBalance').textContent = window.userData.balance || 0;
    document.getElementById('userAvatar').textContent = (window.userData.name || 'U')[0].toUpperCase();
    if(window.userData.dp){
      document.getElementById('userAvatar').innerHTML = `<img src="${window.userData.dp}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;">`;
    }
  }
}
syncBalanceFromConfig();

const bannedWords = ['sex','porn','xxx','nude','fuck','bitch','chut','lund','randi','gand','boobs','dick','pussy','scam','betting','casino','gambling'];
function checkContent(text){
  let lower = text.toLowerCase();
  return bannedWords.some(word => lower.includes(word));
}

let todayPostCount = 0;
let todayPostsData = [];

function getTodayKey(){
  return new Date().toDateString();
}

async function getTodayPosts(){
  const today = new Date();
  today.setHours(0,0,0,0);
  const todayTimestamp = today.getTime();

  const postsRef = ref(db, 'posts');
  const userPostsQuery = query(postsRef, orderByChild('user'), equalTo(currentUser));
  const snapshot = await get(userPostsQuery);

  todayPostsData = [];
  if(snapshot.exists()){
    snapshot.forEach(child => {
      let post = {id: child.key,...child.val()};
      if(post.time >= todayTimestamp){
        todayPostsData.push(post);
      }
    });
  }
  todayPostCount = todayPostsData.length;
  return todayPostsData;
}

function getUnclaimedPost(){
  return todayPostsData.find(p =>!p.claimed);
}

async function markPostClaimed(postId){
  const postRef = ref(db, `posts/${postId}`);
  await update(postRef, { claimed: true });

  if(typeof window.userData!== 'undefined' && typeof window.saveRuppyData!== 'undefined'){
    window.userData.balance = Number(window.userData.balance) || 0;
    window.userData.balance += 10;
    window.userData.taskBalance = Number(window.userData.taskBalance) || 0;
    window.userData.taskBalance += 10;
    document.getElementById('taskBalance').textContent = window.userData.taskBalance;
    document.getElementById('totalBalance').textContent = window.userData.balance;
    await window.saveRuppyData(window.userData);
  }
}

function updateRewardBanner(){
  let count = todayPostCount;
  let unclaimed = getUnclaimedPost();
  let banner = document.getElementById('rewardBanner');
  let postBtn = document.getElementById('postBtn');

  if(count >= 3){
    banner.innerHTML = `<span>🎁 Daily limit reached. Come back tomorrow</span>`;
    postBtn.textContent = 'Daily limit reached 3/3';
    postBtn.disabled = true;
  } else if(unclaimed){
    let left = 3 - count;
    banner.innerHTML = `<span>⚠️ Claim Post | ${left}/3 left</span>`;
    postBtn.textContent = `Post ${count+1}/3`;
    postBtn.disabled = true;
  } else {
    let left = 3 - count;
    banner.innerHTML = `<span>🎁 +10 RUP COIN reward per post | ${left}/3 left</span>`;
    postBtn.textContent = `Post ${count+1}/3`;
    postBtn.disabled =!document.getElementById('postText').value.trim() &&!selectedFile;
  }
}

let selectedFile = null;
document.getElementById('postText').oninput = function(){
  updateRewardBanner();
}

document.getElementById('fileInput').onchange = function(e){
  selectedFile = e.target.files[0];
  if(selectedFile){
    let reader = new FileReader();
    reader.onload = function(e){
      let preview = document.getElementById('preview');
      preview.style.display = 'block';
      preview.innerHTML = selectedFile.type.includes('video')
? `<video src="${e.target.result}" controls style="width:100%;border-radius:12px"></video>`
        : `<img src="${e.target.result}" style="width:100%;border-radius:12px">`;
      updateRewardBanner();
    }
    reader.readAsDataURL(selectedFile);
  }
}

window.openCreate = function(){
  document.getElementById('postText').focus();
}

window.addEmoji = function(){
  document.getElementById('postText').value += ' 🔥';
  updateRewardBanner();
}

window.claimPost = async function(postId){
  await markPostClaimed(postId);
  alert('10 RUP COIN Claimed! 🎉');
  await getTodayPosts();
  updateRewardBanner();
  renderFeed(JSON.parse(localStorage.getItem('ruppy_last_posts') || '[]'));
}

window.createPost = async function(){
  await getTodayPosts();
  if(todayPostCount >= 3){
    alert('Daily limit reached. Come back tomorrow');
    return;
  }

  if(getUnclaimedPost()){
    alert('Claim Post');
    return;
  }

  let text = document.getElementById('postText').value.trim();
  if(!text &&!selectedFile) return;
  if(checkContent(text)){
    alert('Inappropriate content detected');
    return;
  }

  document.getElementById('postBtn').disabled = true;
  document.getElementById('postBtn').textContent = 'Posting...';

  let mediaUrl = null;
  let mediaType = null;

  try {
    if(selectedFile){
      document.getElementById('postBtn').textContent = 'Uploading...';
      const data = new FormData();
      data.append("file", selectedFile);
      data.append("upload_preset", "ruppy_posts");

      const res = await fetch(`https://api.cloudinary.com/v1_1/dr12i9orc/image/upload`, {
        method: "POST",
        body: data
      });

      const result = await res.json();
      mediaUrl = result.secure_url;
      mediaType = selectedFile.type.includes('video')? 'video' : 'image';
    }

    const newPostRef = await push(ref(db, 'posts'), {
      user: currentUser,
      userDp: (typeof window.userData!== 'undefined' && window.userData.dp)? window.userData.dp : null,
      text: text,
      media: mediaUrl,
      mediaType: mediaType,
      time: Date.now(),
      likes: 0,
      likedBy: {},
      comments: [],
      reports: 0,
      claimed: false
    });

    document.getElementById('postText').value = '';
    document.getElementById('preview').style.display = 'none';
    document.getElementById('preview').innerHTML = '';
    document.getElementById('fileInput').value = '';
    selectedFile = null;

  } catch (error) {
    alert('Error: ' + error.message);
    console.error(error);
  }

  await getTodayPosts();
  updateRewardBanner();
}

onValue(ref(db, 'posts'), async (snapshot) => {
  let posts = [];

  snapshot.forEach((childSnapshot) => {
    let post = { id: childSnapshot.key,...childSnapshot.val(), showAllComments: false };
    if(post.reports < 3) {
      posts.unshift(post);
    }
  });

  localStorage.setItem('ruppy_last_posts', JSON.stringify(posts));
  await getTodayPosts();
  renderFeed(posts);
  updateRewardBanner();
});

function renderFeed(posts){
  let feed = document.getElementById('feed');

  if(posts.length === 0){
    feed.innerHTML = `
      <div class="empty-hub">
        <h3>Welcome to RUPPY Hub</h3>
        <p>Start the conversation. Share your first update!</p>
        <button onclick="openCreate()">Create Post</button>
      </div>`;
    return;
  }

  feed.innerHTML = '';
  posts.forEach(post => {
    let mediaHTML = '';
    if(post.media){
      if(post.mediaType === 'video'){
        mediaHTML = `<div class="post-media"><video src="${post.media}" controls></video></div>`;
      } else {
        mediaHTML = `<div class="post-media"><img src="${post.media}" ondblclick="likePost('${post.id}')"></div>`;
      }
    }

    let timeAgo = getTimeAgo(post.time);
    let isLiked = post.likedBy && post.likedBy[currentUser];
    let commentsToShow = post.showAllComments? (post.comments || []) : (post.comments || []).slice(-2);
    let hiddenCount = (post.comments || []).length - commentsToShow.length;

    let claimBtnHTML = '';
    if(post.user === currentUser && post.claimed === false){
      claimBtnHTML = `<button class="claim-btn" onclick="claimPost('${post.id}')">Claim +10 RUP COIN</button>`;
    } else if(post.user === currentUser && post.claimed === true){
      claimBtnHTML = `<button class="claim-btn claimed" disabled>Claimed</button>`;
    }

    let postUserDp = post.userDp || post.user[0].toUpperCase();
    let postUserDpHTML = post.userDp? `<img src="${post.userDp}">` : post.user[0].toUpperCase();

    feed.innerHTML += `
    <div class="post-card" id="post-${post.id}">
      <div class="post-card-head">
        <div class="post-avatar">${postUserDpHTML}</div>
        <div class="post-info">
          <h4>${post.user}</h4>
          <p>${timeAgo}</p>
        </div>
        <button class="post-more" onclick="reportPost('${post.id}')">⋯</button>
      </div>

      ${post.text? `<div class="post-content">${post.text}</div>` : ''}
      ${mediaHTML}
      ${claimBtnHTML}

      <div class="post-footer">
        <div class="post-stats">
          <button class="stat-btn ${isLiked? 'liked' : ''}" onclick="likePost('${post.id}')">
            Like ❤️ ${post.likes || 0}
          </button>
          <button class="stat-btn" onclick="toggleComments('${post.id}')">
            Comment 💬 ${(post.comments || []).length}
          </button>
        </div>
        <button class="share-btn" onclick="sharePost('${post.id}')">Share</button>
      </div>

      <div class="comments-box" id="comments-${post.id}">
        ${hiddenCount > 0 &&!post.showAllComments? `<div class="view-more" onclick="showAllComments('${post.id}')">View ${hiddenCount} more comments</div>` : ''}

        ${commentsToShow.map(c => `
          <div class="comment">
            <div class="comment-avatar">${c.userDp? `<img src="${c.userDp}">` : c.user[0].toUpperCase()}</div>
            <div class="comment-body">
              <b>${c.user}</b>
              <span>${c.text}</span>
            </div>
          </div>`).join('')}

        <div class="comment-input">
          <input type="text" placeholder="Add a comment..." id="commentInput-${post.id}" onkeypress="if(event.key==='Enter') addComment('${post.id}')">
          <button onclick="addComment('${post.id}')">Send</button>
        </div>
      </div>
    </div>`;
  });
}
