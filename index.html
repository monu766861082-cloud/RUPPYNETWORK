<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ruppy Network</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;text-align:center}
.wrap{padding:22px}
.pill{border:1px solid #c28840;color:#c28840;padding:4px 12px;border-radius:14px;display:inline-block;font-size:12px;margin-bottom:18px}
.coin{width:170px;height:170px;margin:auto;border-radius:50%;background:#111;box-shadow:0 0 28px #f9a825;display:flex;align-items:center;justify-content:center;font-size:48px}
.btn{margin:18px auto;padding:12px 24px;background:#f9a825;color:#000;border:none;border-radius:24px;font-weight:bold;width:80%;max-width:260px;cursor:pointer}
h1{color:#f9a825;margin:12px 0 4px}
.sub{color:#aaa;font-size:13px;margin-bottom:20px}
.card{border:1px solid #333;border-radius:12px;padding:12px;margin:10px auto;max-width:300px;display:flex;gap:10px;text-align:left;align-items:flex-start}
.ci{width:38px;height:38px;background:#1e1e1e;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:20px}
.ft{font-size:11px;color:#666}
a{color:#aaa;text-decoration:none}
</style>
</head>
<body>

<div class="wrap">
<div class="pill">VIP PREMIUM</div>
<div class="coin"><span>R</span></div>

<button class="btn">BOOST MINING</button>

<h1>RUPPY NETWORK</h1>
<div class="sub">The premium Rupee mining experience</div>

<div class="card"><div class="ci">⛏️</div><div><b>Mining</b><p>Mine 20 Rupee every 4 hours</p></div></div>
<div class="card"><div class="ci">👥</div><div><b>Referral</b><p>Earn 40 Rupee per referral + 8% bonus</p></div></div>
<div class="card"><div class="ci">🛡️</div><div><b>Withdrawal</b><p>Secure withdrawals via Binance & more</p></div></div>

<div style="margin-top:10px">
  <input
    type="email"
    id="emailInput"
    placeholder="Enter Email"
    style="padding:12px;width:80%;max-width:260px;border-radius:24px;border:none;text-align:center;margin-bottom:10px"
  >
  <br>
  <button onclick="handleLogin()" class="btn" id="actionBtn">
    SEND OTP
  </button>
</div>

<div class="ft">

<a href="services.html">Services</a> •
<a href="terms.html">Terms</a><br>
By continuing, you agree to our Terms & Privacy Policy.
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL = 'https://fvvdurcxpslohndlsivpk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjZ2p1YnhmeGpha2dpY3VweXVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Mzk4NTIsImV4cCI6MjA5MTIxNTg1Mn0.QST9mZ7uup-H-s9P6DznbOVO14kJTCgYIIZxyTP1T24';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let step = "email";

  async function handleLogin(){
    const btn = document.getElementById("actionBtn");
    const input = document.getElementById("emailInput");
    const email = input.value.trim();

    if(step === "email"){
      if(!email || !email.includes('@')){
        alert("Enter valid email");
        return;
      }
      
      btn.innerText = "SENDING...";
      btn.disabled = true;

      const { error } = await supabase.auth.signInWithOtp({
        email: email,
        options: {
          shouldCreateUser: true
        }
      });

      btn.disabled = false;

      if(error){
        btn.innerText = "SEND OTP";
        alert("Error: " + error.message);
      }else{
        alert("OTP Sent. Check your email inbox and spam folder");
        input.value = "";
        input.placeholder = "Enter 8 Digit OTP";
        btn.innerText = "VERIFY OTP";
        step = "otp";
        window.savedEmail = email;
      }

    }else{
      const otp = input.value.trim();
      
      if(!otp){
        alert("Enter OTP");
        return;
      }

      btn.innerText = "VERIFYING...";
      btn.disabled = true;

      const { data, error } = await supabase.auth.verifyOtp({
        email: window.savedEmail,
        token: otp,
        type: 'email'
      });

      btn.disabled = false;

      if(error){
        btn.innerText = "VERIFY OTP";
        alert("Invalid OTP: " + error.message);
      }else{
        alert("Login Successful");
        window.location.href = '/dashboard.html';
      }
    }
  }
</script>

</body>
</html>
