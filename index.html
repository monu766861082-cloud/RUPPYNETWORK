<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ruppy Network - Login</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;display:flex;align-items:center;justify-content:center;min-height:100vh}
.wrap{padding:22px;width:100%;max-width:360px;text-align:center}
.pill{border:1px solid #c28840;color:#c28840;padding:4px 12px;border-radius:14px;display:inline-block;font-size:12px;margin-bottom:18px}
.coin{width:220px;height:220px;margin:10px auto;border-radius:50%;background:transparent;box-shadow:0 0 40px #f9a825;display:flex;align-items:center;justify-content:center}
.coin img{width:100%;height:100%;object-fit:cover;border-radius:50%}
h1{color:#f9a825;margin:12px 0 20px;font-size:28px}
.input-box{margin:12px 0;text-align:left}
.input-box label{color:#aaa;font-size:13px;display:block;margin-bottom:6px}
.input-box input{width:100%;padding:12px;border:1px solid #333;border-radius:10px;background:#111;color:#fff;font-size:15px;box-sizing:border-box}
.input-box input:focus{outline:none;border-color:#f9a825}
.btn{margin:18px auto;padding:12px 24px;background:#f9a825;color:#000;border:none;border-radius:24px;font-weight:bold;width:100%;cursor:pointer;font-size:15px}
.btn:disabled{background:#333;color:#666;cursor:not-allowed}
.btn-secondary{background:#1a1a1a;color:#f9a825;border:1px solid #f9a825}
.toggle{color:#aaa;font-size:13px;margin-top:15px;cursor:pointer}
.toggle span{color:#f9a825;text-decoration:underline}
.ft{font-size:11px;color:#666;margin-top:25px}
a{color:#aaa;text-decoration:none}
.error{color:#f33;font-size:13px;margin-top:10px;display:none}
</style>
</head>
<body>

<div class="wrap">
<div class="pill">VIP PREMIUM</div>
<div class="coin"><img src="cropped_circle_image.png" alt="Ruppy Logo"></div>
<h1>RUPPY NETWORK</h1>

<div id="loginForm">
  <div class="input-box">
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter your email">
  </div>
  <div class="input-box">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password">
  </div>
  <div class="error" id="errorMsg"></div>
  <button class="btn" onclick="handleLogin()" id="loginBtn">LOGIN</button>
  <div class="toggle">New user? <span onclick="showRegister()">Create Account</span></div>
</div>

<div id="registerForm" style="display:none">
  <div class="input-box">
    <label>Email</label>
    <input type="email" id="regEmail" placeholder="Enter your email">
  </div>
  <div class="input-box">
    <label>Password</label>
    <input type="password" id="regPassword" placeholder="Min 6 characters">
  </div>
  <div class="input-box">
    <label>Confirm Password</label>
    <input type="password" id="regConfirmPassword" placeholder="Re-enter password">
  </div>
  <div class="error" id="regErrorMsg"></div>
  <button class="btn" onclick="handleRegister()" id="registerBtn">CREATE ACCOUNT</button>
  <div class="toggle">Already have account? <span onclick="showLogin()">Login</span></div>
</div>

<div class="ft">
<a href="about.html">About</a> •
<a href="contact.html">Contact</a> •
<a href="privacy.html">Privacy</a> •
<a href="terms.html">Terms</a><br>
By continuing, you agree to our Terms & Privacy Policy.
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL = 'https://scgjubxfxjakgicupyuo.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjZ2p1YnhmeGpha2dpY3VweXVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Mzk4NTIsImV4cCI6MjA5MTIxNTg1Mn0.QST9mZ7uup-H-s9P6DznbOVO14kJTCgYIIZxyTP1T24';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // REFERRAL CODE START - Page Load पे URL से ref पकड़ो
  (function() {
    const urlParams = new URLSearchParams(window.location.search);
    const refCode = urlParams.get('ref');
    if(refCode) {
      localStorage.setItem('ruppy_referredBy', refCode);
      console.log('Referred by:', refCode);
    }
  })();
  // REFERRAL CODE END

  checkUser();

  async function checkUser() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      let userData = JSON.parse(localStorage.getItem('ruppy_user')) || {
        name: session.user.email.split('@')[0],
        balance: 0,
        lastMine: 0,
        lastGift: 0,
        boostCount: 0,
        boostResetTime: Date.now(),
        team: [],
        firstRewardTime: 0,
        ultraRewardTime: 0
      };
      localStorage.setItem('ruppy_user', JSON.stringify(userData));
      window.location.href = 'app.html';
    }
  }

  function showRegister() {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
  }

  function showLogin() {
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('regErrorMsg').style.display = 'none';
  }

  // REFERRAL FUNCTION START - Signup के बाद Team में Add करने का
  async function handleReferral(email) {
    let referredBy = localStorage.getItem('ruppy_referredBy');
    if(!referredBy || referredBy === 'null') return;

    try {
      // सभी Users लाओ LocalStorage से
      let allUsers = JSON.parse(localStorage.getItem('ruppy_allUsers')) || {};

      // Refer करने वाले को ढूंढो inviteCode से
      for(let userKey in allUsers) {
        let referrerData = allUsers[userKey];
        let referrerCode = 'RUPPY' + referrerData.name.substring(0,3).toUpperCase();

        if(referredBy.includes(referrerCode)) {
          if(!referrerData.team) referrerData.team = [];

          let newMemberName = email.split('@')[0];
          let alreadyExists = referrerData.team.some(t => t.name === newMemberName);

          if(!alreadyExists) {
            referrerData.team.push({
              name: newMemberName,
              joinDate: Date.now(),
              lastMine: 0,
              lastMinedAmount: 0
            });
            allUsers[userKey] = referrerData;
            localStorage.setItem('ruppy_allUsers', JSON.stringify(allUsers));
            console.log('Added to team:', referrerData.name);
          }
          break;
        }
      }
      localStorage.removeItem('ruppy_referredBy');
    } catch(e) {
      console.log('Referral error:', e);
    }
  }
  // REFERRAL FUNCTION END

  async function handleRegister() {
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirmPassword = document.getElementById('regConfirmPassword').value;
    const btn = document.getElementById('registerBtn');
    const errorEl = document.getElementById('regErrorMsg');

    errorEl.style.display = 'none';

    if (!email ||!email.includes('@')) {
      showError('regErrorMsg', 'Enter valid email');
      return;
    }
    if (password.length < 6) {
      showError('regErrorMsg', 'Password must be at least 6 characters');
      return;
    }
    if (password!== confirmPassword) {
      showError('regErrorMsg', 'Passwords do not match');
      return;
    }

    btn.innerText = 'CREATING...';
    btn.disabled = true;

    const { data, error } = await supabase.auth.signUp({
      email: email,
      password: password
    });

    btn.disabled = false;
    btn.innerText = 'CREATE ACCOUNT';

    if (error) {
      showError('regErrorMsg', error.message);
    } else {
      // REFERRAL CODE START - Signup Success के बाद Call
      await handleReferral(email);
      // REFERRAL CODE END

      alert('Account Created! You can now login.');
      showLogin();
      document.getElementById('email').value = email;
    }
  }

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const errorEl = document.getElementById('errorMsg');

    errorEl.style.display = 'none';

    if (!email ||!email.includes('@')) {
      showError('errorMsg', 'Enter valid email');
      return;
    }
    if (!password) {
      showError('errorMsg', 'Enter password');
      return;
    }

    btn.innerText = 'LOGGING IN...';
    btn.disabled = true;

    const { data, error } = await supabase.auth.signInWithPassword({
      email: email,
      password: password
    });

    btn.disabled = false;
    btn.innerText = 'LOGIN';

    if (error) {
      showError('errorMsg', 'Invalid email or password');
    } else {
      let userData = JSON.parse(localStorage.getItem('ruppy_user')) || {
        name: email.split('@')[0],
        balance: 0,
        lastMine: 0,
        lastGift: 0,
        boostCount: 0,
        boostResetTime: Date.now(),
        team: [],
        firstRewardTime: 0,
        ultraRewardTime: 0
      };
      localStorage.setItem('ruppy_user', JSON.stringify(userData));

      // REFERRAL CODE START - Login पे भी Check कर लो
      await handleReferral(email);
      // REFERRAL CODE END

      window.location.href = 'app.html';
    }
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.innerText = msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
