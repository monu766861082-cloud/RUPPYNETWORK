<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ruppy Network - Login</title>

<!-- PWA Manifest -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="/IMG_7725.png">

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;display:flex;align-items:center;justify-content:center;min-height:100vh}
.wrap{padding:22px;width:100%;max-width:360px;text-align:center}
.pill{border:1px solid #c28840;color:#c28840;padding:4px 12px;border-radius:14px;display:inline-block;font-size:12px;margin-bottom:18px}
.coin{width:220px;height:220px;margin:10px auto;border-radius:50%;background:transparent;box-shadow:0 0 40px #f9a825;display:flex;align-items:center;justify-content:center}
.coin img{width:100%;height:100%;object-fit:cover;border-radius:50%}
h1{color:#f9a825;margin:12px 0 20px;font-size:28px}
.input-box{margin:12px 0;text-align:left}
.input-box label{color:#aaa;font-size:13px;display:block;margin-bottom:6px}
.input-box input{width:100%;padding:12px;border:1px solid #333;border-radius:10px;background:#111;color:#fff;font-size:15px;box-sizing:border-box}
.input-box input:focus{outline:none;border-color:#f9a825}
.btn{margin:18px auto;padding:12px 24px;background:#f9a825;color:#000;border:none;border-radius:24px;font-weight:bold;width:100%;cursor:pointer;font-size:15px}
.btn:disabled{background:#333;color:#666;cursor:not-allowed}
.btn-guest{background:transparent;color:#888;border:1px solid #333;margin-top:10px} /* नया Add किया */
.btn-google{background:#fff;color:#000;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px} /* नया Add किया */
.toggle{color:#aaa;font-size:13px;margin-top:15px;cursor:pointer}
.toggle span{color:#f9a825;text-decoration:underline}
.ft{font-size:11px;color:#666;margin-top:25px}
a{color:#aaa;text-decoration:none}
.error{color:#f33;font-size:13px;margin-top:10px;display:none}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2718847163624444"
     crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

<div class="wrap">
<div class="pill">VIP PREMIUM</div>
<div class="coin"><img src="cropped_circle_image.png" alt="Ruppy Logo"></div>
<h1>RUPPY NETWORK</h1>

<div id="loginForm">
  <div class="input-box">
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter your email">
  </div>
  <div class="input-box">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password">
  </div>
  <div class="error" id="errorMsg"></div>
  <button class="btn" onclick="handleLogin()" id="loginBtn">LOGIN</button>

  <!-

  <!-- नया Add किया: Google Button -->
  <button class="btn btn-google" onclick="signInWithGoogle()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18">
    Sign in with Google
  </button>

  <div class="toggle">New user? <span onclick="showRegister()">Create Account</span></div>
</div>

<div id="registerForm" style="display:none">
  <div class="input-box">
    <label>Email</label>
    <input type="email" id="regEmail" placeholder="Enter your email">
  </div>
  <div class="input-box">
    <label>Password</label>
    <input type="password" id="regPassword" placeholder="Min 6 characters">
  </div>
  <div class="input-box">
    <label>Confirm Password</label>
    <input type="password" id="regConfirmPassword" placeholder="Re-enter password">
  </div>
  <div class="error" id="regErrorMsg"></div>
  <button class="btn" onclick="handleRegister()" id="registerBtn">CREATE ACCOUNT</button>
  <div class="toggle">Already have account? <span onclick="showLogin()">Login</span></div>
</div>

<div class="ft">
<a href="about.html">About</a> •
<a href="contact.html">Contact</a> •
<a href="privacy.html">Privacy</a> •
<a href="terms.html">Terms</a><br>

By continuing, you agree to our <a href="terms.html" style="color:#f9a825;">Terms</a> & <a href="privacy.html" style="color:#f9a825;">Privacy Policy</a>.
</div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDQC0WsVPr63y2xvFMSifnkjAB3TTVcIxU",
    authDomain: "ruppynetwork-50362.firebaseapp.com",
    databaseURL: "https://ruppynetwork-50362-default-rtdb.firebaseio.com",
    projectId: "ruppynetwork-50362",
    storageBucket: "ruppynetwork-50362.firebasestorage.app",
    messagingSenderId: "132064610854",
    appId: "1:132064610854:web:3c217eaf3618007f5934e7"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();
  // नया Add किया: Google Provider
  const provider = new firebase.auth.GoogleAuthProvider();

  (function() {
    const urlParams = new URLSearchParams(window.location.search);
    const refCode = urlParams.get('ref');
    if(refCode) localStorage.setItem('ruppy_referredBy', refCode);
  })();

  // नया Function: Guest Login
  window.continueAsGuest = function() {
    let guestData = {
      name: "Guest User",
      email: "guest@ruppynetwork.com",
      balance: 0,
      lastMine: 0,
      lastGift: 0,
      boostCount: 0,
      boostResetTime: Date.now(),
      team: [],
      firstRewardTime: 0,
      ultraRewardTime: 0,
      createdAt: Date.now(),
      isGuest: true
    };
    localStorage.setItem('ruppy_user', JSON.stringify(guestData));
    window.location.replace('app.html');
  }

  // नया Function: Google Sign In
  window.signInWithGoogle = async function() {
    try {
      const result = await auth.signInWithPopup(provider);
      const user = result.user;
      const snapshot = await db.ref('users/' + user.uid).get();
      let userData = snapshot.exists()? snapshot.val() : {
        name: user.displayName || user.email.split('@')[0],
        email: user.email,
        balance: 0,
        lastMine: 0,
        lastGift: 0,
        boostCount: 0,
        boostResetTime: Date.now(),
        team: [],
        firstRewardTime: 0,
        ultraRewardTime: 0,
        createdAt: Date.now()
      };
      await db.ref('users/' + user.uid).set(userData);
      localStorage.setItem('ruppy_user', JSON.stringify(userData));
      window.location.replace('app.html');
    } catch (error) {
      showError('errorMsg', error.message);
    }
  }

  window.showRegister = function() {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
  }

  window.showLogin = function() {
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('regErrorMsg').style.display = 'none';
  }

  window.handleRegister = async function() {
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirmPassword = document.getElementById('regConfirmPassword').value;
    const btn = document.getElementById('registerBtn');

    if (!email ||!email.includes('@')) return showError('regErrorMsg', 'Enter valid email');
    if (password.length < 6) return showError('regErrorMsg', 'Password must be at least 6 characters');
    if (password!== confirmPassword) return showError('regErrorMsg', 'Passwords do not match');

    btn.innerText = 'CREATING...';
    btn.disabled = true;

    try {
      const userCredential = await auth.createUserWithEmailAndPassword(email, password);
      let userData = {
        name: email.split('@')[0],
        email: email,
        balance: 0,
        lastMine: 0,
        lastGift: 0,
        boostCount: 0,
        boostResetTime: Date.now(),
        team: [],
        firstRewardTime: 0,
        ultraRewardTime: 0,
        createdAt: Date.now()
      };
      await db.ref('users/' + auth.currentUser.uid).set(userData);
      localStorage.setItem('ruppy_user', JSON.stringify(userData));
      window.location.replace('app.html');
    } catch (error) {
      showError('regErrorMsg', error.message);
      btn.disabled = false;
      btn.innerText = 'CREATE ACCOUNT';
    }
  }

  window.handleLogin = async function() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    if (!email ||!email.includes('@')) return showError('errorMsg', 'Enter valid email');
    if (!password) return showError('errorMsg', 'Enter password');

    btn.innerText = 'LOGGING IN...';
    btn.disabled = true;

    try {
      await auth.signInWithEmailAndPassword(email, password);
      const snapshot = await db.ref('users/' + auth.currentUser.uid).get();
      let userData = snapshot.exists()? snapshot.val() : {
        name: email.split('@')[0],
        email: email,
        balance: 0,
        lastMine: 0,
        lastGift: 0,
        boostCount: 0,
        boostResetTime: Date.now(),
        team: [],
        firstRewardTime: 0,
        ultraRewardTime: 0,
        createdAt: Date.now()
      };
      localStorage.setItem('ruppy_user', JSON.stringify(userData));
      window.location.replace('app.html');
    } catch (error) {
      showError('errorMsg', 'Invalid email or password');
      btn.disabled = false;
      btn.innerText = 'LOGIN';
    }
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.innerText = msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
