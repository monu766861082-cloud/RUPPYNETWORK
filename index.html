<script>
  const SUPABASE_URL = 'https://scgjubxfxjakgicupyuo.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjZ2p1YnhmeGpha2dpY3VweXVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Mzk4NTIsImV4cCI6MjA5MTIxNTg1Mn0.QST9mZ7uup-H-s9P6DznbOVO14kJTCgYIIZxyTP1T24';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function handleSignup(){
    const email = document.getElementById("emailInput").value.trim();
    const password = document.getElementById("passwordInput").value.trim();
    
    if(!email || !password){
      alert("Email और Password दोनों डाल");
      return;
    }
    if(password.length < 6){
      alert("Password कम से कम 6 का होना चाहिए");
      return;
    }
    
    const { data, error } = await supabase.auth.signUp({
      email: email,
      password: password
    });
    
    if(error){
      alert("Error: " + error.message);
    }else{
      alert("Account बन गया! अब Login करो");
    }
  }

  async function handleLogin(){
    const email = document.getElementById("emailInput").value.trim();
    const password = document.getElementById("passwordInput").value.trim();
    
    if(!email || !password){
      alert("Email और Password दोनों डाल");
      return;
    }
    
    const { data, error } = await supabase.auth.signInWithPassword({
      email: email,
      password: password
    });
    
    if(error){
      alert("गलत Email या Password");
    }else{
      alert("Login Successful! Welcome " + data.user.email);

  }
