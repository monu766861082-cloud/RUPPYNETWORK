<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ruppy Network</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;text-align:center}
.wrap{padding:22px}
.pill{border:1px solid #c28840;color:#c28840;padding:4px 12px;border-radius:14px;display:inline-block;font-size:12px;margin-bottom:18px}
.coin{width:170px;height:170px;margin:auto;border-radius:50%;background:#111;box-shadow:0 0 28px #f9a825;display:flex;align-items:center;justify-content:center;font-size:48px}
.btn{margin:8px auto;padding:12px 24px;background:#f9a825;color:#000;border:none;border-radius:24px;font-weight:bold;width:80%;max-width:260px;cursor:pointer}
h1{color:#f9a825;margin:12px 0 4px}
.sub{color:#aaa;font-size:13px;margin-bottom:20px}
.card{border:1px solid #333;border-radius:12px;padding:12px;margin:10px auto;max-width:300px;display:flex;gap:10px;text-align:left;align-items:flex-start}
.ci{width:38px;height:38px;background:#1e1e1e;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:20px}
.ft{font-size:11px;color:#666}
a{color:#aaa;text-decoration:none}
</style>
</head>
<body>

<div class="wrap">
<div class="pill">VIP PREMIUM</div>
<div class="coin"><span>R</span></div>

<button class="btn">BOOST MINING</button>

<h1>RUPPY NETWORK</h1>
<div class="sub">The premium Rupee mining experience</div>

<div class="card"><div class="ci">⛏️</div><div><b>Mining</b><p>Mine 20 Rupee every 4 hours</p></div></div>
<div class="card"><div class="ci">👥</div><div><b>Referral</b><p>Earn 40 Rupee per referral + 8% bonus</p></div></div>
<div class="card"><div class="ci">🛡️</div><div><b>Withdrawal</b><p>Secure withdrawals via Binance & more</p></div></div>

<div style="margin-top:10px" id="authBox">
  <input
    type="email"
    id="emailInput"
    placeholder="Enter Email"
    style="padding:12px;width:80%;max-width:260px;border-radius:24px;border:none;text-align:center;margin-bottom:10px"
  >
  <br>
  <input
    type="password"
    id="passwordInput"
    placeholder="Enter Password"
    style="padding:12px;width:80%;max-width:260px;border-radius:24px;border:none;text-align:center;margin-bottom:10px"
  >
  <br>
  <button onclick="handleLogin()" class="btn" id="loginBtn">
    LOGIN
  </button>
  <button onclick="handleSignup()" class="btn" id="signupBtn">
    CREATE ACCOUNT
  </button>
  <p id="msg" style="color:#f9a825;font-size:13px;height:15px;"></p>
</div>

<div class="ft">
<a href="privacy.html">Privacy</a> •
<a href="services.html">Services</a> •
<a href="terms.html">Terms</a><br>
By continuing, you agree to our Terms & Privacy Policy.
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL = 'https://scgjubxfxjakgicupyuo.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjZ2p1YnhmeGpha2dpY3VweXVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Mzk4NTIsImV4cCI6MjA5MTIxNTg1Mn0.QST9mZ7uup-H-s9P6DznbOVO14kJTCgYIIZxyTP1T24';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const msg = document.getElementById("msg");

  // Fix 1: Page खुलते ही Check कर, पर Box मत छुपा
  async function checkUser() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      window.location.href = "/dashboard.html";
    }
  }
  checkUser();

  async function handleSignup(){
    const email = document.getElementById("emailInput").value.trim();
    const password = document.getElementById("passwordInput").value.trim();
    
    if(!email || !password){
      msg.innerText = "Email और Password दोनों डाल";
      return;
    }
    if(password.length < 6){
      msg.innerText = "Password कम से कम 6 का होना चाहिए";
      return;
    }
    
    msg.innerText = "Account बन रहा है...";
    
    const { data, error } = await supabase.auth.signUp({
      email: email,
      password: password
    });
    
    if(error){
      msg.innerText = "Error: " + error.message;
    }else{
      // Fix 2: Signup के बाद सीधा अंदर भेज दे, क्योंकि User Auto-Login हो गया
      msg.innerText = "Account बन गया! Redirecting...";
      window.location.href = "/dashboard.html";
    }
  }

  async function handleLogin(){
    const email = document.getElementById("emailInput").value.trim();
    const password = document.getElementById("passwordInput").value.trim();
    
    if(!email || !password){
      msg.innerText = "Email और Password दोनों डाल";
      return;
    }
    
    msg.innerText = "Login हो रहा है...";
    
    const { data, error } = await supabase.auth.signInWithPassword({
      email: email,
      password: password
    });
    
    if(error){
      msg.innerText = "गलत Email या Password";
    }else{
      msg.innerText = "Login Success!";
      window.location.href = "/dashboard.html";
    }
  }
</script>
</body>
</html>
