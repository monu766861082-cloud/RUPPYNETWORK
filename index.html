<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ruppy Network</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;text-align:center}
.wrap{padding:22px}
.pill{border:1px solid #c28840;color:#c28840;padding:4px 12px;border-radius:14px;display:inline-block;font-size:12px;margin-bottom:18px}
.coin{width:170px;height:170px;margin:auto;border-radius:50%;background:#111;box-shadow:0 0 28px #f9a825;display:flex;align-items:center;justify-content:center;font-size:48px}
.btn{margin:18px auto;padding:12px 24px;background:#f9a825;color:#000;border:none;border-radius:24px;font-weight:bold;width:80%;max-width:260px;cursor:pointer}
h1{color:#f9a825;margin:12px 0 4px}
.sub{color:#aaa;font-size:13px;margin-bottom:20px}
.card{border:1px solid #333;border-radius:12px;padding:12px;margin:10px auto;max-width:300px;display:flex;gap:10px;text-align:left;align-items:flex-start}
.ci{width:38px;height:38px;background:#1e1e1e;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:20px}
.gb{margin:10px auto;width:85%;max-width:280px}
.ft{font-size:11px;color:#666;margin-top:20px}
a{color:#aaa;text-decoration:none}
input{padding:10px;border-radius:6px;border:1px solid #333;background:#1e1e1e;color:#fff;width:80%;max-width:260px;margin:5px}
.loginBtn{background:#4285F4;color:#fff;border:none;font-weight:bold;padding:12px;border-radius:6px;width:85%;max-width:280px;margin:5px;cursor:pointer}
#appSection{display:none}
#loginSection{display:block}
.userInfo{color:#4CAF50;font-size:14px;margin:10px 0}
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  const supabase = createClient('https://fvvdurcxpslohndlsivpk.supabase.co','sb_publishable_gu6EROzroBcU5be4H33c0Q_K2ajxrpD')
  window.supabase = supabase;
</script>
</head>
<body>
<div class="wrap">
<div class="pill">VIP PREMIUM •</div>
<div class="coin"><span>R</span></div>
<h1>RUPPY NETWORK</h1>
<div class="sub">The premium Rupee mining experience</div>

<!-- LOGIN SECTION -->
<div id="loginSection">
  <input id="mobile" type="tel" placeholder="मोबाइल नंबर डालो" maxlength="10">
  <button onclick="sendOTP()" class="loginBtn">Send OTP</button>

  <div id="otpDiv" style="display:none">
    <input id="otpInput" type="tel" placeholder="4-अंक OTP डालो" maxlength="4">
    <button onclick="verifyOTP()" class="loginBtn" style="background:#4CAF50">Verify OTP</button>
  </div>

  <div style="color:#666;margin:15px 0;font-size:12px">या</div>

  <div id="g_id_onload" data-client_id="791994103117-0qnp7laoeppcsf7h8c4h865u6e5ei3bc.apps.googleusercontent.com" data-callback="onSignIn"></div>
  <div class="g_id_signin gb" data-type="standard"></div>
  <button onclick="fbLogin()" class="gb" style="background:#1877F2;color:#fff;border:none;font-weight:bold;padding:12px;border-radius:6px;cursor:pointer">LOGIN WITH FACEBOOK</button>
</div>

<!-- APP SECTION - लॉगिन के बाद दिखेगा -->
<div id="appSection">
  <div class="userInfo" id="userInfo"></div>
  <button class="btn" onclick="boostMining()">BOOST MINING</button>

  <div class="card"><div class="ci">⛏️</div><div><b>Mining</b><p>Mine 20 Rupee every 4 hours</p></div></div>
  <div class="card"><div class="ci">👥</div><div><b>Referral</b><p>Earn 40 Rupee per referral + 8% bonus</p></div></div>
  <div class="card"><div class="ci">🛡️</div><div><b>Withdrawal</b><p>Secure withdrawals via Binance & more</p></div></div>
  <button onclick="logout()" style="background:#333;color:#fff;border:none;padding:8px 16px;border-radius:6px;margin-top:10px;cursor:pointer">Logout</button>
</div>

<div class="ft">
<a href="privacy.html">Privacy</a> • <a href="services.html">Services</a> • <a href="terms.html">Terms</a><br>
By continuing, you agree to our Terms & Privacy Policy.
</div>
</div>

<script>
let generatedOTP = '';

function sendOTP(){
  const num = document.getElementById('mobile').value;
  if(num.length!== 10 || isNaN(num)){
    alert('सही 10-अंक का नंबर डालो');
    return;
  }
  generatedOTP = Math.floor(1000 + Math.random() * 9000).toString();
  alert('Demo OTP: ' + generatedOTP + '\nअसली ऐप में ये SMS से आएगा');
  document.getElementById('otpDiv').style.display = 'block';
}

function verifyOTP(){
  const entered = document.getElementById('otpInput').value;
  if(entered === generatedOTP){
    const num = document.getElementById('mobile').value;
    loginSuccess('+91 ' + num);
  } else {
    alert('गलत OTP, फिर से कोशिश करो');
  }
}

function onSignIn(r){
  try{
    const p = JSON.parse(atob(r.credential.split('.')[1]));
    if(p.email) loginSuccess(p.email);
  }catch(e){}
}

function fbLogin(){
  window.supabase.auth.signInWithOAuth({ provider: 'facebook' });
}

function loginSuccess(user){
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('appSection').style.display = 'block';
  document.getElementById('userInfo').innerText = 'Logged in: ' + user;
}

function logout(){
  document.getElementById('loginSection').style.display = 'block';
  document.getElementById('appSection').style.display = 'none';
  document.getElementById('mobile').value = '';
  document.getElementById('otpInput').value = '';
  document.getElementById('otpDiv').style.display = 'none';
}

function boostMining(){
  alert('Mining Boosted! +20 Rupee');
}
</script>
</body>
</html>
