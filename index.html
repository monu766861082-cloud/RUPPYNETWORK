<script>
function onSignIn(r){
  try{
    const p=JSON.parse(atob(r.credential.split('.')[1]));
    if(p.email) alert('Signed in: '+p.email);
  }catch(e){}
}

function fbLogin(){
  supabase.auth.signInWithOAuth({ provider: 'facebook' });
}

/* ✅ EMAIL OTP FLOW - यही लगाना है */
let step = "email";

async function handleLogin(){
  const input = document.getElementById("emailInput").value;

  if(step === "email"){
    if(!input.includes('@')){
      alert("Sahi email daal");
      return;
    }

    // 👇 यही वो लाइन है जो OTP भेजेगी
    const { error } = await supabase.auth.signInWithOtp({
      email: input
    });

    if(error){
      alert(error.message);
    }else{
      alert("OTP Sent ✅ Mail चेक करो");

      document.getElementById("emailInput").value = "";
      document.getElementById("emailInput").placeholder = "Enter 8 Digit OTP";
      document.getElementById("actionBtn").innerText = "VERIFY OTP";

      step = "otp";
      window.savedEmail = input;
    }

  }else{

    // 👇 यही वो लाइन है जो OTP वेरिफाई करेगी
    const { error } = await supabase.auth.verifyOtp({
      email: window.savedEmail,
      token: input,
      type: 'email'
    });

    if(error){
      alert("Invalid OTP ❌ " + error.message);
    }else{
      alert("Login Successful ✅");
      // यहां home page पे भेज दे
      // window.location.href = '/dashboard.html'
    }
  }
}
</script>
