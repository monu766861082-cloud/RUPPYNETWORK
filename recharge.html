<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mobile Recharge</title>
<script type="module" src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0B0B0C;--card:#161617;--border:#2A2A2C;--gold:#F3C774;--muted:#9CA3AF;--purple:#7C3AED;--green:#24C464}
*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif}
body{background:var(--bg);color:#fff;padding:0 0 90px 0}
.header{background:var(--card);padding:16px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.back{font-size:24px;cursor:pointer}
.title{font-size:18px;font-weight:600}
.container{padding:20px}
.mobile-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:20px}
.mobile-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.operator-logo{width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg,#ED1C24,#FF6B6B);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px}
.mobile-info{flex:1}
.mobile-num{font-size:16px;font-weight:600}
.mobile-meta{font-size:12px;color:var(--muted)}
.change-btn{color:var(--gold);font-size:13px;font-weight:600;cursor:pointer}
.input-box{position:relative}
.input-box input{width:100%;padding:14px 14px 14px 50px;background:var(--bg);border:1px solid var(--border);border-radius:12px;color:#fff;font-size:16px}
.input-box input:focus{outline:none;border-color:var(--gold)}
.input-prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px}
.section-title{font-size:14px;font-weight:600;color:var(--muted);margin:20px 0 12px 0}
.suggested-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.plan-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;cursor:pointer;transition:all 0.2s;position:relative}
.plan-card:active{transform:scale(0.98);border-color:var(--gold)}
.plan-card.selected{border-color:var(--gold);background:rgba(243,199,116,0.05)}
.plan-price{font-size:22px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.plan-arrow{width:24px;height:24px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:14px}
.plan-type{font-size:12px;color:var(--muted);margin-bottom:8px}
.plan-data{font-size:13px;font-weight:500;margin-bottom:4px}
.plan-details{font-size:12px;color:var(--gold);cursor:pointer}
.search-box{position:relative;margin-bottom:16px}
.search-box input{width:100%;padding:12px 12px 12px 40px;background:var(--card);border:1px solid var(--border);border-radius:12px;color:#fff;font-size:14px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
.filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:16px}
.filter-chip{padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:20px;font-size:13px;white-space:nowrap;cursor:pointer}
.filter-chip.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:600}
.plan-list{display:flex;flex-direction:column;gap:12px}
.list-plan{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;cursor:pointer;transition:all 0.2s}
.list-plan:active{border-color:var(--gold)}
.list-plan.selected{border-color:var(--gold);background:rgba(243,199,116,0.05)}
.list-top{display:flex;justify-content:space-between;align-items:start;margin-bottom:8px}
.list-price{font-size:20px;font-weight:700}
.list-meta{display:flex;gap:20px;margin-bottom:8px}
.meta-item{font-size:12px}
.meta-label{color:var(--muted);margin-bottom:2px}
.meta-value{font-weight:600}
.list-desc{font-size:12px;color:var(--muted);line-height:1.5}
.list-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.badge{background:var(--purple);color:#fff;font-size:10px;padding:4px 8px;border-radius:6px;font-weight:600}
.popular-badge{position:absolute;top:-8px;right:12px;background:var(--green);color:#000;font-size:9px;padding:3px 8px;border-radius:6px;font-weight:700}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:16px 20px}
.recharge-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--gold),#FFA500);border:none;border-radius:12px;color:#000;font-weight:700;font-size:16px;cursor:pointer}
.recharge-btn:disabled{opacity:0.5;cursor:not-allowed}
.loader{text-align:center;padding:40px;color:var(--muted)}
</style>
</head>
<body>

<div class="header">
  <div class="back" onclick="history.back()">←</div>
  <div class="title">Select a recharge plan</div>
</div>

<div class="container">
  <div class="mobile-box">
    <div id="mobileDisplay" style="display:none">
      <div class="mobile-row">
        <div class="operator-logo" id="opLogo">VI</div>
        <div class="mobile-info">
          <div class="mobile-num" id="mobileNum">Loading...</div>
          <div class="mobile-meta" id="mobileMeta">Prepaid • Detecting...</div>
        </div>
        <div class="change-btn" onclick="changeNumber()">Change</div>
      </div>
    </div>
    
    <div class="input-box" id="mobileInput">
      <span class="input-prefix">+91</span>
      <input type="tel" id="mobileField" placeholder="Enter mobile number" maxlength="10" oninput="detectOperator(this.value)">
    </div>
  </div>

  <div id="plansSection" style="display:none">
    <div class="section-title">Suggested Plans</div>
    <div class="suggested-grid" id="suggestedPlans"></div>

    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Search for a plan, eg 365 or 28 days" oninput="filterPlans(this.value)">
    </div>

    <div class="filters">
      <div class="filter-chip active" onclick="setFilter('all')">All</div>
      <div class="filter-chip" onclick="setFilter('talk')">Talk Time</div>
      <div class="filter-chip" onclick="setFilter('1gb')">1GB/Day</div>
      <div class="filter-chip" onclick="setFilter('1.5gb')">1.5GB/Day</div>
      <div class="filter-chip" onclick="setFilter('2gb')">2GB/Day</div>
      <div class="filter-chip" onclick="setFilter('long')">Long Validity</div>
    </div>

    <div class="plan-list" id="planList"></div>
  </div>

  <div id="loader" class="loader" style="display:none">Loading plans...</div>
</div>

<div class="bottom-bar" id="bottomBar" style="display:none">
  <button class="recharge-btn" id="rechargeBtn" onclick="doRecharge()" disabled>Select a plan</button>
</div>

window.detectOperator = function(num) {
  if(num.length === 10) {
    currentNumber = num;
    const first = num[0];
    
    if(['6','7','8','9'].includes(first)) {
      if(num.startsWith('9') || num.startsWith('8')) currentOperator = 'Jio';
      else if(num.startsWith('7')) currentOperator = 'Airtel';
      else if(num.startsWith('6')) currentOperator = 'Vi';
      else currentOperator = 'BSNL';
      
      document.getElementById('mobileInput').style.display = 'none';
      document.getElementById('mobileDisplay').style.display = 'block';
      document.getElementById('mobileNum').innerText = num;
      document.getElementById('mobileMeta').innerText = `${currentOperator} Prepaid • Uttar Pradesh West`;
      document.getElementById('opLogo').innerText = currentOperator.substring(0,2).toUpperCase();
      document.getElementById('plansSection').style.display = 'block';
      document.getElementById('bottomBar').style.display = 'block';
      
      loadPlans(currentOperator);
    }
  }
}

window.changeNumber = function() {
  document.getElementById('mobileInput').style.display = 'block';
  document.getElementById('mobileDisplay').style.display = 'none';
  document.getElementById('plansSection').style.display = 'none';
  document.getElementById('bottomBar').style.display = 'none';
  document.getElementById('mobileField').value = '';
  selectedPlan = null;
}

function loadPlans(operator) {
  allPlans = plansData[operator] || [];
  renderPlans(allPlans);
}

function renderPlans(plans) {
  const suggested = plans.filter(p => p.popular).slice(0, 2);
  if(suggested.length === 0) suggested.push(...plans.slice(0, 2));
  
  document.getElementById('suggestedPlans').innerHTML = suggested.map((p, i) => `
    <div class="plan-card" onclick='selectPlan(${JSON.stringify(p)})'>
      ${p.popular? '<div class="popular-badge">POPULAR</div>' : ''}
      <div class="plan-price">
        ₹${p.price}
        <div class="plan-arrow">›</div>
      </div>
      <div class="plan-type">${p.type}</div>
      <div class="plan-data">${p.data} • ${p.validity}</div>
      <div class="plan-details">Details</div>
    </div>
  `).join('');
  
  document.getElementById('planList').innerHTML = plans.map((p, i) => `
    <div class="list-plan" onclick='selectPlan(${JSON.stringify(p)})'>
      <div class="list-top">
        <div class="list-price">₹${p.price}</div>
        <div style="color:var(--muted)">›</div>
      </div>
      <div class="list-meta">
        <div class="meta-item">
          <div class="meta-label">Validity</div>
          <div class="meta-value">${p.validity}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Data</div>
          <div class="meta-value">${p.data}</div>
        </div>
      </div>
      <div class="list-desc">${p.desc}</div>
      ${p.type === 'Data Plan'? '<div class="list-bottom"><div class="badge">DATA ONLY</div><div class="plan-details">Details</div></div>' : ''}
    </div>
  `).join('');
}

window.selectPlan = function(plan) {
  selectedPlan = plan;
  document.querySelectorAll('.plan-card,.list-plan').forEach(el => el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  document.getElementById('rechargeBtn').disabled = false;
  document.getElementById('rechargeBtn').innerText = `Recharge ₹${plan.price}`;
}

window.setFilter = function(type) {
  document.querySelectorAll('.filter-chip').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  
  let filtered = allPlans;
  if(type === 'talk') filtered = allPlans.filter(p => p.type === 'Talk Time');
  else if(type === '1gb') filtered = allPlans.filter(p => p.data.includes('1GB/Day') &&!p.data.includes('1.5'));
  else if(type === '1.5gb') filtered = allPlans.filter(p => p.data.includes('1.5GB/Day'));
  else if(type === '2gb') filtered = allPlans.filter(p => p.data.includes('2GB/Day') &&!p.data.includes('2.5'));
  else if(type === 'long') filtered = allPlans.filter(p => p.validity.includes('84') || p.validity.includes('365') || p.validity.includes('180'));
  
  renderPlans(filtered);
}

window.filterPlans = function(query) {
  if(!query) {
    renderPlans(allPlans);
    return;
  }
  const filtered = allPlans.filter(p => 
    p.price.toString().includes(query) || 
    p.validity.toLowerCase().includes(query.toLowerCase()) ||
    p.data.toLowerCase().includes(query.toLowerCase())
  );
  renderPlans(filtered);
}

window.doRecharge = async function() {
  if(!selectedPlan) return;
  
  // ✅ 10000 RUP = 300 Rs | 1 Rs = 33.33 RUP
  let tokensNeeded;
  if(selectedPlan.price === 300) {
    tokensNeeded = 10000; // 300 Rs = 10000 RUP Fixed
  } else {
    tokensNeeded = Math.round(selectedPlan.price * 10000 / 300); // बाकी सब: 1 Rs = 33.33 RUP
  }
  
  if(!window.userData?.uid) {
    alert('Please login first');
    return;
  }
  
  if(window.userData.balance < tokensNeeded) {
    alert(`Insufficient balance\nNeed: ${tokensNeeded} RUP\nYou have: ${window.userData.balance} RUP`);
    return;
  }
  
  if(!confirm(`Confirm Recharge:\n\nMobile: ${currentNumber}\nOperator: ${currentOperator}\nPlan: ₹${selectedPlan.price}\nData: ${selectedPlan.data}\nValidity: ${selectedPlan.validity}\nTokens: ${tokensNeeded} RUP\n\nProceed?`)) {
    return;
  }
  
  try {
    window.userData.balance -= tokensNeeded;
    await window.saveRuppyData(window.userData);
    
    const { getDatabase, ref, push } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js");
    const db = getDatabase();
    
    await push(ref(db, 'recharge_requests'), {
      uid: window.userData.uid,
      name: window.userData.name || 'User',
      mobile: currentNumber,
      operator: currentOperator,
      amount: selectedPlan.price,
      plan: selectedPlan.data,
      validity: selectedPlan.validity,
      type: selectedPlan.type,
      tokens: tokensNeeded,
      status: 'pending',
      time: Date.now()
    });
    
    alert(`✅ Success!\n₹${selectedPlan.price} ${currentOperator} Recharge\n${currentNumber} पे 10 मिनट में हो जाएगा`);
    history.back();
    
  } catch(error) {
    alert('Error: ' + error.message);
    window.userData.balance += tokensNeeded;
  }
}
</script>
